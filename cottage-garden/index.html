<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cottage Garden Oracle</title>

<style>
body {
  font-family: Georgia, serif;
  text-align: center;
  color: white;
  background: url('cottage-bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

h1 {
  margin-top: 20px;
}

.buttons {
  margin: 20px;
}

button {
  padding: 10px 18px;
  margin: 5px;
  border-radius: 20px;
  border: none;
  background: #b78b6a;
  color: white;
  cursor: pointer;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 200px;
  height: 350px;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s;
}

.card.flipped .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  backface-visibility: hidden;
}

.back {
  background: url('card-back.jpg') center/cover;
}

.front {
  transform: rotateY(180deg);
}

.front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 15px;
}
</style>
</head>

<body>

<h1>Cottage Garden Oracle</h1>

<div class="buttons">
  <button onclick="drawCards()">Cottage Garden Cross</button>
</div>

<div class="cards" id="cards"></div>

<script>
const deck = [
  "bloom.jpg",
  "flow.jpg",
  "moon.jpg",
  "hidden.jpg",
  "hawthorn.jpg",
  "primrose.jpg",
  "ladder.jpg"
];

function drawCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  let shuffled = [...deck].sort(() => 0.5 - Math.random()).slice(0,5);

  shuffled.forEach((img, i) => {
    const card = document.createElement("div");
    card.className = "card";

    const inner = document.createElement("div");
    inner.className = "inner";

    const back = document.createElement("div");
    back.className = "back";

    const front = document.createElement("div");
    front.className = "front";

    const image = document.createElement("img");
    image.src = img;

    front.appendChild(image);
    inner.appendChild(back);
    inner.appendChild(front);
    card.appendChild(inner);

    card.onclick = () => card.classList.toggle("flipped");

    container.appendChild(card);
  });
}
</script>

</body>
</html>
