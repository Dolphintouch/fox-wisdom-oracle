<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cottage Garden Oracle</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      font-family: Georgia, serif;
      text-align: center;
      color: #f5ecd9;
      background:
        linear-gradient(rgba(28,34,24,0.55), rgba(28,34,24,0.85)),
        url("../cottage-garden-bg.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.6rem;
      margin: 8px 0 10px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .blessing {
      max-width: 760px;
      margin: 0 auto 18px;
      line-height: 1.7;
    }

    .welcome-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 18px;
    }

    .welcome-flip {
      width: 300px;
      max-width: 80vw;
      perspective: 1200px;
      cursor: pointer;
    }

    .welcome-inner {
      position: relative;
      width: 100%;
      height: 420px;
      transform-style: preserve-3d;
      transition: transform 1.2s ease;
    }

    .welcome-flip.flipped .welcome-inner {
      transform: rotateY(180deg);
    }

    .welcome-front,
    .welcome-back {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow:
        0 0 30px rgba(255,215,140,0.25),
        0 12px 28px rgba(0,0,0,0.4);
    }

    .welcome-front img,
    .welcome-back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .welcome-back {
      transform: rotateY(180deg);
    }

    .tap-note {
      margin-top: 10px;
      color: #fff0dc;
      animation: pulseText 2s infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .button-row,
    .shop-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin: 20px auto;
      max-width: 1000px;
    }

    button,
    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 20px;
      border-radius: 30px;
      border: none;
      color: white;
      background: #9f775d;
      cursor: pointer;
      text-decoration: none;
      font-family: Georgia, serif;
      font-size: 1rem;
      line-height: 1.2;
      white-space: normal;
      text-align: center;
    }

    .link-button {
      background: #4a442d;
    }

    .glow {
      box-shadow: 0 0 15px rgba(255,215,140,0.5);
    }

    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 8px;
    }

    .card-slot {
      width: 200px;
    }

    .card-slot h4 {
      margin: 0 0 10px;
      min-height: 2.8em;
    }

    .flip-card {
      width: 100%;
      perspective: 1000px;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 320px;
      transform-style: preserve-3d;
      transition: transform 1.3s ease;
    }

    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-front,
    .flip-back {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    }

    .flip-back {
      transform: rotateY(180deg);
    }

    .flip-front img,
    .flip-back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .scroll-note {
      margin-top: 22px;
      color: #fff0dc;
      display: none;
      opacity: 0;
    }

    .scroll-note.show {
      display: block;
      animation: fadeWhisper 1.5s forwards;
    }

    @keyframes fadeWhisper {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-box {
      display: none;
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 15px;
      white-space: pre-line;
    }

    .message-box.show {
      display: block;
    }

    @media (max-width: 700px) {
      .welcome-inner {
        height: 360px;
      }

      .flip-card-inner {
        height: 300px;
      }

      .card-slot {
        width: 190px;
      }

      button,
      .link-button {
        width: 100%;
        max-width: 360px;
      }
    }
  </style>
</head>
<body>

  <div class="page-wrap">

    <h1>Cottage Garden Oracle</h1>

    <div class="blessing">
      Draw from the garden… let the old ways whisper to you.
    </div>

    <div class="welcome-area">
      <div class="welcome-flip" id="welcomeFlip" onclick="drawFromWelcomeCard()">
        <div class="welcome-inner">
          <div class="welcome-front">
            <img src="../cottage-card-back.jpg" alt="Cottage card back">
          </div>
          <div class="welcome-back">
            <img id="welcomeRevealImage" src="../cottage-card-back.jpg" alt="Revealed card">
          </div>
        </div>
      </div>
      <div class="tap-note">Tap the card to reveal your message</div>
    </div>

    <div class="button-row">
      <button type="button" onclick="startReading('daily')">Daily Message</button>
      <button type="button" onclick="startReading('three')">3 Card Spread</button>
      <button type="button" onclick="startReading('cross')">Cottage Cross</button>
      <button type="button" onclick="window.location.href='../index.html'">Fox Oracle</button>
    </div>

    <div class="shop-links">
      <a class="link-button glow" href="https://www.printerstudio.com/sell/designs/curses-charms-and-cottage-gard.html" target="_blank" rel="noopener noreferrer">Buy Deck</a>
      <a class="link-button glow" href="https://www.amazon.com/dp/B0DWL4MHQJ" target="_blank" rel="noopener noreferrer">Read Book</a>
      <a class="link-button" href="https://dolphintouch.etsy.com" target="_blank" rel="noopener noreferrer">Etsy Shop</a>
    </div>

    <div id="cards" class="cards-grid"></div>

    <div id="scrollNote" class="scroll-note">
      The path continues below… scroll down to reveal your reading
    </div>

    <div id="messageBox" class="message-box">
      <h3 id="title"></h3>
      <p id="message"></p>
    </div>

  </div>

  <script>
    const CARD_BACK = "../cottage-card-back.jpg";

    const cards = [
      { title:"Hawthorn Magic", image:"../hawthorn-magic.jpg", message:"Protect what is sacred while staying open to wonder." },
      { title:"Hearing an Owl Call", image:"../hearing-an-owl-call.jpg", message:"Wisdom calls from the dark edges." },
      { title:"Herbal Remedies", image:"../herbal-remedies.jpg", message:"Healing may be simpler than you think." },
      { title:"Primrose Paths", image:"../primrose-paths.jpg", message:"A gentler path is opening." },
      { title:"Spilled Salt", image:"../spilled-salt.jpg", message:"Bless the moment and move on." },
      { title:"Tea and Reflection", image:"../tea-and-reflection.jpg", message:"Stillness holds answers." }
    ];

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function drawFromWelcomeCard() {
      const welcome = document.getElementById("welcomeFlip");
      const welcomeRevealImage = document.getElementById("welcomeRevealImage");

      const draw = shuffle(cards).slice(0, 1);
      const card = draw[0];

      welcome.classList.remove("flipped");
      welcomeRevealImage.src = card.image;
      welcomeRevealImage.alt = card.title;

      setTimeout(() => {
        welcome.classList.add("flipped");
      }, 30);

      setTimeout(() => {
        showCards(draw, "daily");
      }, 1200);
    }

    function startReading(type) {
      let draw = [];

      if (type === "daily") draw = shuffle(cards).slice(0, 1);
      if (type === "three") draw = shuffle(cards).slice(0, 3);
      if (type === "cross") draw = shuffle(cards).slice(0, 5);

      if (!draw.length) return;
      showCards(draw, type);
    }

    function showCards(draw, type) {
      const container = document.getElementById("cards");
      const scrollNote = document.getElementById("scrollNote");
      const box = document.getElementById("messageBox");
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const welcomeRevealImage = document.getElementById("welcomeRevealImage");

      container.innerHTML = "";
      scrollNote.classList.remove("show");
      scrollNote.style.display = "none";

      if (type === "daily" && welcomeRevealImage) {
        welcomeRevealImage.src = draw[0].image;
        welcomeRevealImage.alt = draw[0].title;
      }

      draw.forEach((c, i) => {
        let label = c.title;

        if (type === "three") {
          label = ["Past", "Present", "Hidden Path"][i];
        }

        if (type === "cross") {
          label = [
            "Where you stand",
            "What is hidden",
            "What nurtures you",
            "What needs tending",
            "Where the garden opens"
          ][i];
        }

        container.innerHTML += `
          <div class="card-slot">
            <h4>${label}</h4>
            <div class="flip-card" id="flip-${i}">
              <div class="flip-card-inner">
                <div class="flip-front">
                  <img src="${CARD_BACK}" alt="Card back">
                </div>
                <div class="flip-back">
                  <img src="${c.image}" alt="${c.title}">
                </div>
              </div>
            </div>
          </div>
        `;
      });

      draw.forEach((_, i) => {
        setTimeout(() => {
          const el = document.getElementById("flip-" + i);
          if (el) el.classList.add("flipped");
        }, 350 + (i * 350));
      });

      setTimeout(() => {
        scrollNote.style.display = "block";
        scrollNote.classList.add("show");
      }, 1100 + (draw.length * 300));

      box.classList.add("show");

      if (type === "daily") {
        title.innerText = draw[0].title;
        message.innerText = draw[0].message;
      } else {
        title.innerText = type === "three" ? "Your Three Card Reading" : "Your Cottage Cross";
        message.innerText = draw.map((c, i) => {
          const labels = type === "three"
            ? ["Past", "Present", "Hidden Path"]
            : ["Where you stand", "What is hidden", "What nurtures you", "What needs tending", "Where the garden opens"];
          return `${labels[i]} — ${c.title}\n${c.message}`;
        }).join("\n\n");
      }

      window.scrollTo({ top: 320, behavior: "smooth" });
    }
  </script>

</body>
</html>
