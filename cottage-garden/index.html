<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cottage Garden Oracle</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
padding:16px;
font-family:Georgia,serif;
text-align:center;
color:#f5ecd9;
background:
linear-gradient(rgba(28,34,24,0.55), rgba(28,34,24,0.85)),
url("../cottage-garden-bg.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.page-wrap{max-width:1100px;margin:auto;}

h1{font-size:2.6rem;}

.welcome-card{
width:300px;
max-width:80vw;
border-radius:20px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 30px rgba(255,215,140,0.3);
animation:pulse 4s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.03);}
}

.tap-note{animation:pulseText 2s infinite;}

@keyframes pulseText{
0%,100%{opacity:0.6;}
50%{opacity:1;}
}

button,.link-button{
padding:12px 20px;
border-radius:30px;
border:none;
color:white;
background:#9f775d;
cursor:pointer;
margin:6px;
}

.link-button{background:#4a442d;}

.cards-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card-slot{width:200px;}

.flip-card{
width:100%;
perspective:1000px;
}

.flip-card-inner{
position:relative;
width:100%;
height:320px;
transform-style:preserve-3d;
transition:transform 1.4s ease;
}

.flip-card.flipped .flip-card-inner{
transform:rotateY(180deg);
}

.flip-front,.flip-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:15px;
overflow:hidden;
}

.flip-back{transform:rotateY(180deg);}

.flip-front img,.flip-back img{
width:100%;
height:100%;
object-fit:cover;
}

.scroll-note{
margin-top:20px;
display:none;
opacity:0;
}

.scroll-note.show{
display:block;
animation:fadeIn 2s forwards, float 3s infinite 2s;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(4px);}
}

.message-box{
display:none;
margin-top:20px;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
white-space:pre-line;
}

.message-box.show{display:block;}
</style>
</head>

<body>

<div class="page-wrap">

<h1>Cottage Garden Oracle</h1>

<div onclick="startReading('daily')">
<img src="../cottage-card-back.jpg" class="welcome-card">
</div>

<div class="tap-note">Tap the card to reveal your message</div>

<div>
<button onclick="startReading('daily')">Daily Message</button>
<button onclick="startReading('three')">3 Card Spread</button>
<button onclick="startReading('cross')">Cottage Cross</button>
<button onclick="window.location.href='../index.html'">Fox Oracle</button>
</div>

<div>
<a class="link-button" href="https://www.printerstudio.com/sell/designs/curses-charms-and-cottage-gard.html" target="_blank">Buy Deck</a>
<a class="link-button" href="https://www.amazon.com/dp/B0DWL4MHQJ" target="_blank">Read Book</a>
</div>

<div id="cards" class="cards-grid"></div>

<div id="scrollNote" class="scroll-note">
The path continues below… scroll down to reveal your reading
</div>

<div id="messageBox" class="message-box">
<h3 id="title"></h3>
<p id="message"></p>
</div>

</div>

<script>

const CARD_BACK = "../cottage-card-back.jpg";

const cards = [
{ title:"Hawthorn Magic", image:"../hawthorn-magic.jpg", message:"Protect what is sacred while staying open to wonder."},
{ title:"Hearing an Owl Call", image:"../hearing-an-owl-call.jpg", message:"Wisdom calls from the dark edges."},
{ title:"Herbal Remedies", image:"../herbal-remedies.jpg", message:"Healing may be simpler than you think."},
{ title:"Primrose Paths", image:"../primrose-paths.jpg", message:"A gentler path is opening."},
{ title:"Spilled Salt", image:"../spilled-salt.jpg", message:"Bless the moment and move on."},
{ title:"Tea and Reflection", image:"../tea-and-reflection.jpg", message:"Stillness holds answers."}
];

function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}

function startReading(type){

let draw=[];

if(type==="daily") draw=shuffle([...cards]).slice(0,1);
if(type==="three") draw=shuffle([...cards]).slice(0,3);
if(type==="cross") draw=shuffle([...cards]).slice(0,5);

showCards(draw,type);
}

function showCards(draw,type){

const container=document.getElementById("cards");
const scrollNote=document.getElementById("scrollNote");

container.innerHTML="";

draw.forEach((c,i)=>{

let label=c.title;

if(type==="three"){
label=["Past","Present","Hidden Path"][i];
}

if(type==="cross"){
label=[
"Where you stand",
"What is hidden",
"What nurtures you",
"What needs tending",
"Where the garden opens"
][i];
}

container.innerHTML+=`
<div class="card-slot">
<h4>${label}</h4>
<div class="flip-card" id="flip-${i}">
<div class="flip-card-inner">
<div class="flip-front">
<img src="${CARD_BACK}">
</div>
<div class="flip-back">
<img src="${c.image}">
</div>
</div>
</div>
</div>`;
});

draw.forEach((_,i)=>{
setTimeout(()=>{
document.getElementById("flip-"+i).classList.add("flipped");
},400+(i*400));
});

setTimeout(()=>{
scrollNote.classList.add("show");
},1200);

const box=document.getElementById("messageBox");
box.classList.add("show");

if(type==="daily"){
title.innerText=draw[0].title;
message.innerText=draw[0].message;
}else{
title.innerText="Your Reading";
message.innerText=draw.map(c=>c.title+" — "+c.message).join("\n\n");
}
}

</script>

</body>
</html>
