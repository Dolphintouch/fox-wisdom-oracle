<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cottage Garden Oracle</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  padding:16px;
  font-family:Georgia,serif;
  text-align:center;
  color:#f5ecd9;
  background:
    linear-gradient(rgba(28,34,24,0.55), rgba(28,34,24,0.8)),
    url("../cottage-garden-bg.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

.page-wrap{max-width:1100px;margin:auto;}

h1{font-size:2.6rem;}

.blessing{
  margin-bottom:20px;
}

/* 🌿 CARD BACK WELCOME */
.welcome-card{
  width:300px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:
    0 0 20px rgba(255,215,140,0.2),
    0 12px 28px rgba(0,0,0,0.4);
}

.welcome-card:hover{
  transform:scale(1.05);
}

.tap-note{
  margin-top:10px;
  color:#fff0dc;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.6;}
  50%{opacity:1;}
}

/* 🌿 BUTTONS */
.button-row, .shop-links{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}

button, .link-button{
  padding:12px 20px;
  border-radius:30px;
  border:none;
  text-decoration:none;
  color:white;
  background:#9f775d;
  cursor:pointer;
}

.link-button{
  background:#4a442d;
}

/* ✨ GLOW BUTTON */
.glow{
  box-shadow:0 0 15px rgba(255,215,140,0.5);
}

/* 🌿 CARDS */
.cards-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card-slot{width:200px;}

.card-slot img{
  width:100%;
  border-radius:15px;
}

/* 🌿 MESSAGE */
.message-box{
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  display:none;
}

.message-box.show{
  display:block;
}

/* 🌿 SCROLL MESSAGE */
.scroll-note{
  margin-top:20px;
  color:#fff0dc;
  animation:pulse 2s infinite;
  display:none;
}

</style>
</head>

<body>

<div class="page-wrap">

<h1>Cottage Garden Oracle</h1>

<div class="blessing">
Draw from the garden… let the old ways whisper to you.
</div>

<!-- 🌿 CARD BACK -->
<div onclick="startReading('daily')">
  <img src="../card-back.jpg" class="welcome-card">
</div>
<div class="tap-note">Tap the card to reveal your message</div>

<!-- 🌿 BUTTONS -->
<div class="button-row">
  <button onclick="startReading('daily')">Daily Message</button>
  <button onclick="startReading('three')">3 Card Spread</button>
  <button onclick="startReading('cross')">Cottage Cross</button>
  <button onclick="window.location.href='../index.html'">Fox Oracle</button>
</div>

<!-- 🌿 LINKS -->
<div class="shop-links">
  <a class="link-button glow" href="https://www.printerstudio.com/sell/designs/curses-charms-and-cottage-gard.html" target="_blank">
    Buy the Cottage Deck
  </a>

  <a class="link-button glow" href="https://www.amazon.com/dp/B0DWL4MHQJ" target="_blank">
    Read the Book
  </a>

  <a class="link-button" href="https://dolphintouch.etsy.com" target="_blank">
    Etsy Shop
  </a>
</div>

<!-- 🌿 CARDS -->
<div id="cards" class="cards-grid"></div>

<div id="scrollNote" class="scroll-note">
The path continues below… scroll down to reveal your reading
</div>

<div id="messageBox" class="message-box">
  <h3 id="title"></h3>
  <p id="message"></p>
</div>

</div>

<script>

const cards = [
  {title:"Hawthorn Magic",image:"../hawthorn-magic.jpg",message:"Protect what is sacred while staying open to wonder."},
  {title:"Hearing an Owl Call",image:"../hearing-an-owl-call.jpg",message:"Wisdom calls from the dark edges."},
  {title:"Herbal Remedies",image:"../herbal-remedies.jpg",message:"Healing may be simpler than you think."},
  {title:"Horseshoes Over Doorways",image:"../horseshoes-over-doorways.jpg",message:"Guard your threshold."},
  {title:"Primrose Paths",image:"../primrose-paths.jpg",message:"A gentler path is opening."},
  {title:"Spilled Salt",image:"../spilled-salt.jpg",message:"Bless the moment and move on."},
  {title:"Tea and Reflection",image:"../tea-and-reflection.jpg",message:"Stillness holds answers."}
];

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function startReading(type){
  let draw=[];

  if(type==="daily") draw=shuffle([...cards]).slice(0,1);
  if(type==="three") draw=shuffle([...cards]).slice(0,3);
  if(type==="cross") draw=shuffle([...cards]).slice(0,5);

  showCards(draw);
}

function showCards(draw){
  const container=document.getElementById("cards");
  container.innerHTML="";

  draw.forEach(c=>{
    container.innerHTML+=`
      <div class="card-slot">
        <img src="${c.image}">
        <h4>${c.title}</h4>
      </div>`;
  });

  document.getElementById("scrollNote").style.display="block";

  document.getElementById("messageBox").classList.add("show");
  document.getElementById("title").innerText=draw[0].title;
  document.getElementById("message").innerText=draw[0].message;

  window.scrollTo({top:300,behavior:"smooth"});
}

</script>

</body>
</html>
