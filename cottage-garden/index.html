<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cottage Garden Oracle</title>

<style>
body{
  font-family:Georgia, serif;
  text-align:center;
  background:
    linear-gradient(rgba(30,40,28,0.6), rgba(30,40,28,0.85)),
    url("../cottage-garden-bg.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:#f3eadc;
  margin:0;
  padding:20px;
}

h1{
  font-size:3rem;
  margin-top:10px;
}

.sub{
  font-style:italic;
  margin-bottom:20px;
}

.welcome{
  max-width:300px;
  border-radius:20px;
  box-shadow:0 0 25px rgba(255,220,150,0.3);
  cursor:pointer;
  transition:0.3s;
}

.welcome:hover{
  transform:scale(1.05);
}

.button-row{
  margin-top:20px;
}

button{
  padding:12px 20px;
  margin:5px;
  border-radius:20px;
  border:none;
  background:#7a8f6a;
  color:white;
  cursor:pointer;
}

.card{
  margin-top:30px;
}

.card img{
  max-width:260px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(255,220,150,0.3);
}

.message{
  margin-top:20px;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
}

.back{
  margin-top:30px;
  display:inline-block;
  color:#f3eadc;
  text-decoration:underline;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🌿 Cottage Garden Oracle</h1>

<div class="sub">
Step through the archway…<br>
and listen to what blooms for you.
</div>

<img src="../welcome-archway.jpg" class="welcome" onclick="drawCard()">

<div class="button-row">
<button onclick="drawCard()">Draw a Card</button>
<button onclick="goBack()">Return to Forest</button>
</div>

<div class="card" id="cardArea"></div>

<div class="message" id="message"></div>

<script>
const cards = [
  {
    title:"The Hidden Herb",
    image:"../hidden-herb.jpg",
    message:"Something small holds quiet power. Do not overlook what grows gently."
  },
  {
    title:"Garden Gate",
    image:"../garden-gate.jpg",
    message:"A new path is opening. Step through with trust."
  },
  {
    title:"The Old Teacup",
    image:"../old-teacup.jpg",
    message:"Memories carry messages. Sit, reflect, and listen."
  }
];

function drawCard(){
  const card = cards[Math.floor(Math.random()*cards.length)];

  document.getElementById("cardArea").innerHTML =
    `<img src="${card.image}">`;

  document.getElementById("message").innerHTML =
    `<h3>${card.title}</h3><p>${card.message}</p>`;
}

function goBack(){
  window.location.href="../index.html";
}
</script>

</body>
</html>
