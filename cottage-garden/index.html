<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cottage Garden Oracle</title>

<style>
*{box-sizing:border-box;}

body{
  font-family: Georgia, serif;
  text-align:center;
  background-image:
    linear-gradient(rgba(28,34,24,0.52), rgba(28,34,24,0.74)),
    url("../cottage-garden-bg.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  margin:0;
  padding:16px;
  color:#f5ecd9;
}

.page-wrap{
  max-width:1100px;
  margin:auto;
}

h1{
  font-size:3rem;
}

.welcome-card{
  width:280px;
  border-radius:20px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.button-row{
  margin:20px 0;
}

button{
  padding:12px 20px;
  border-radius:30px;
  border:none;
  margin:5px;
  background:#9f775d;
  color:white;
  cursor:pointer;
}

.cards-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.card-slot{
  width:200px;
}

.card-slot img{
  width:100%;
  border-radius:15px;
}

.message-box{
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  display:none;
}
</style>
</head>

<body>

<div class="page-wrap">

<h1>Cottage Garden Oracle</h1>

<img
  src="../welcome-archwa.jpg"
  class="welcome-card"
  onclick="drawDaily()"
/>

<div class="button-row">
  <button onclick="drawDaily()">Daily Garden Message</button>
  <button onclick="drawThree()">Three Card Spread</button>
  <button onclick="drawCross()">Cottage Cross</button>
  <button onclick="window.location.href='../index.html'">🦊 Fox Wisdom Oracle</button>
</div>

<div id="cards" class="cards-grid"></div>

<div id="messageBox" class="message-box">
  <h3 id="title"></h3>
  <p id="message"></p>
</div>

</div>

<script>

const deck = [
{title:"Hawthorn Magic",image:"../hawthorn-magic.jpg",message:"Protect what is sacred while staying open to wonder."},
{title:"Hearing an Owl Call",image:"../hearing-an-owl-call.jpg",message:"Wisdom calls from the dark edges."},
{title:"Herbal Remedies",image:"../herbal-remedies.jpg",message:"Healing may be simpler and closer than you think."},
{title:"Horseshoes Over Doorways",image:"../horseshoes-over-doorways.jpg",message:"Guard your threshold."},
{title:"Ill Wind",image:"../ill-wind.jpg",message:"Not every change is trouble."},
{title:"Knocking on Wood",image:"../knocking-on-wood.jpg",message:"Small acts bring protection."},
{title:"Ladybird Landing on You",image:"../ladybird-landing-on-you.jpg",message:"A small blessing has found you."},
{title:"Magpie Superstition",image:"../magpie-superstition.jpg",message:"Meaning depends on belief."},
{title:"Midsummer’s Eve",image:"../midsummers-eve.jpg",message:"The veil is thin."},
{title:"Rowan Tree Protection",image:"../rowan-tree-protection.jpg",message:"You are protected."},
{title:"Spilled Salt",image:"../spilled-salt.jpg",message:"Release the moment and move on."},
{title:"Tea and Reflection",image:"../tea-and-reflection.jpg",message:"Sit with stillness."}
];

function randomCard(){
  return deck[Math.floor(Math.random()*deck.length)];
}

function drawDaily(){
  const card = randomCard();
  showCards([card]);
}

function drawThree(){
  showCards([randomCard(),randomCard(),randomCard()]);
}

function drawCross(){
  showCards([
    randomCard(),
    randomCard(),
    randomCard(),
    randomCard(),
    randomCard()
  ]);
}

function showCards(cards){
  const container = document.getElementById("cards");
  container.innerHTML = "";

  cards.forEach(c=>{
    container.innerHTML += `
      <div class="card-slot">
        <img src="${c.image}">
        <h4>${c.title}</h4>
      </div>
    `;
  });

  const main = cards[0];
  document.getElementById("messageBox").style.display="block";
  document.getElementById("title").innerText = main.title;
  document.getElementById("message").innerText = main.message;
}

</script>

</body>
</html>
