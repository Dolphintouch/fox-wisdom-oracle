<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cottage Garden Oracle</title>

<style>
*{box-sizing:border-box;}

body{
  font-family: Georgia, serif;
  text-align:center;
  background:
    linear-gradient(rgba(28,34,24,0.55), rgba(28,34,24,0.8)),
    url("../cottage-garden-bg.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  margin:0;
  padding:16px;
  color:#f5ecd9;
}

.page-wrap{max-width:1100px;margin:auto;}

h1{font-size:2.6rem;}

.welcome-card{
  width:280px;
  border-radius:20px;
  cursor:pointer;
  box-shadow:0 12px 28px rgba(0,0,0,0.35);
}

.button-row{margin:20px 0;}

button{
  padding:12px 20px;
  border-radius:30px;
  border:none;
  margin:5px;
  background:#9f775d;
  color:white;
  cursor:pointer;
}

.shop-links{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin:15px 0 25px;
}

.link-button{
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  background:linear-gradient(to bottom,#7d7350,#4a442d);
  color:#f8f4e6;
  border:1px solid rgba(210,190,126,0.4);
}

.cards-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card-slot{width:200px;}

.card-slot img{
  width:100%;
  border-radius:15px;
}

.message-box{
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  display:none;
}
</style>
</head>

<body>

<div class="page-wrap">

<h1>Cottage Garden Oracle</h1>

<img src="../welcome-archwa.jpg" class="welcome-card" onclick="startReading('daily')">

<div class="button-row">
  <button onclick="startReading('daily')">Daily Garden Message</button>
  <button onclick="startReading('three')">Three Card Spread</button>
  <button onclick="startReading('cross')">Cottage Cross</button>
  <button onclick="window.location.href='../index.html'">🦊 Fox Wisdom Oracle</button>
</div>

<div class="shop-links">

  <a class="link-button" href="https://www.printerstudio.com/sell/designs/fox-wisdom-oracle.html" target="_blank">
    🦊 Buy the Fox Wisdom Oracle Deck
  </a>

  <a class="link-button" href="https://www.amazon.com.au/dp/YOURBOOKID" target="_blank">
    📖 Read the Guidebook on Amazon
  </a>

  <a class="link-button" href="https://dolphintouch.etsy.com" target="_blank">
    ✨ Visit My Etsy Shop
  </a>

  <a class="link-button" href="../whispers-of-nature.html">🌿 Whispers of Nature</a>
  <a class="link-button" href="../fungal-realms.html">🍄 Fungal Realms</a>

</div>

<div id="cards" class="cards-grid"></div>

<div id="messageBox" class="message-box">
  <h3 id="title"></h3>
  <p id="message"></p>
</div>

</div>

<script>

const deck = [/* KEEP YOUR FULL CARD LIST HERE EXACTLY AS YOU HAD IT */];

function shuffle(deck){
  let arr=[...deck];
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startReading(type){
  let draw;

  if(type==="daily") draw=shuffle(deck).slice(0,1);
  if(type==="three") draw=shuffle(deck).slice(0,3);
  if(type==="cross") draw=shuffle(deck).slice(0,5);

  display(draw);
}

function display(cards){
  const container=document.getElementById("cards");
  container.innerHTML="";

  cards.forEach(c=>{
    container.innerHTML+=`
      <div class="card-slot">
        <img src="${c.image}">
        <h4>${c.title}</h4>
      </div>`;
  });

  const main=cards[0];
  document.getElementById("messageBox").style.display="block";
  document.getElementById("title").innerText=main.title;
  document.getElementById("message").innerText=main.message;
}

</script>

</body>
</html>
