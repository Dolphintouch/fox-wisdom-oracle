<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fox Wisdom Guidebook</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Georgia, serif;
      text-align:center;
      background-image:
        linear-gradient(rgba(16,22,16,0.60), rgba(16,22,16,0.82)),
        url("forest-bg.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      color:#f5e9c8;
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
      padding:20px 14px 50px;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,220,140,0.06), transparent 20%),
        radial-gradient(circle at 80% 25%, rgba(255,230,170,0.05), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(255,240,190,0.04), transparent 24%);
      pointer-events:none;
      z-index:0;
    }

    .fireflies{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:1;
    }

    .firefly{
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:rgba(255,230,160,0.95);
      box-shadow:0 0 10px rgba(255,220,130,0.95);
      opacity:0;
      animation:floatFirefly linear infinite;
    }

    .firefly:nth-child(1){ left:10%; top:78%; animation-duration:12s; animation-delay:0s; }
    .firefly:nth-child(2){ left:18%; top:65%; animation-duration:15s; animation-delay:2s; }
    .firefly:nth-child(3){ left:26%; top:82%; animation-duration:14s; animation-delay:4s; }
    .firefly:nth-child(4){ left:40%; top:72%; animation-duration:13s; animation-delay:1s; }
    .firefly:nth-child(5){ left:58%; top:80%; animation-duration:16s; animation-delay:3s; }
    .firefly:nth-child(6){ left:70%; top:68%; animation-duration:14s; animation-delay:5s; }
    .firefly:nth-child(7){ left:82%; top:77%; animation-duration:15s; animation-delay:2.5s; }
    .firefly:nth-child(8){ left:62%; top:55%; animation-duration:17s; animation-delay:6s; }

    @keyframes floatFirefly{
      0%{
        transform:translateY(0) translateX(0) scale(0.7);
        opacity:0;
      }
      20%{
        opacity:0.7;
      }
      70%{
        opacity:0.85;
      }
      100%{
        transform:translateY(-180px) translateX(28px) scale(1.2);
        opacity:0;
      }
    }

    .page-wrap{
      position:relative;
      z-index:2;
      max-width:1000px;
      margin:0 auto;
    }

    h1{
      margin:8px 0 10px;
      font-size:clamp(2rem, 5vw, 3.6rem);
      color:#f2dfcb;
      text-shadow:0 2px 8px rgba(0,0,0,0.35);
    }

    .intro{
      max-width:760px;
      margin:0 auto 20px;
      line-height:1.7;
      font-size:1.08rem;
      color:#f6ead8;
      text-shadow:0 1px 4px rgba(0,0,0,0.35);
    }

    .book-shell{
      position:relative;
      width:min(84vw, 660px);
      margin:20px auto 0;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .book-glow{
      position:absolute;
      width:92%;
      height:92%;
      border-radius:24px;
      background:radial-gradient(circle, rgba(255,223,160,0.18) 0%, rgba(255,223,160,0.06) 40%, transparent 72%);
      filter:blur(24px);
      animation:glowPulse 6s ease-in-out infinite;
      pointer-events:none;
      z-index:1;
    }

    @keyframes glowPulse{
      0%{
        opacity:0.45;
        transform:scale(0.96);
      }
      50%{
        opacity:0.85;
        transform:scale(1.03);
      }
      100%{
        opacity:0.45;
        transform:scale(0.96);
      }
    }

    .flip-stage{
      position:relative;
      z-index:2;
      width:min(80vw, 620px);
      aspect-ratio: 0.707 / 1;
      perspective:1800px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .page-card{
      position:absolute;
      inset:0;
      border-radius:18px;
      overflow:hidden;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.35),
        0 0 0 1px rgba(255,255,255,0.08);
      background:transparent;
      transform-origin:left center;
      backface-visibility:hidden;
    }

    .page-card img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      border-radius:18px;
    }

    .page-card.turning-next{
      animation:turnNext 0.9s ease forwards;
      z-index:5;
    }

    .page-card.turning-prev{
      animation:turnPrev 0.9s ease forwards;
      z-index:5;
    }

    @keyframes turnNext{
      0%{
        transform:rotateY(0deg) translateX(0);
        opacity:1;
      }
      100%{
        transform:rotateY(-75deg) translateX(-20px);
        opacity:0;
      }
    }

    @keyframes turnPrev{
      0%{
        transform:rotateY(75deg) translateX(20px);
        opacity:0;
      }
      100%{
        transform:rotateY(0deg) translateX(0);
        opacity:1;
      }
    }

    .controls{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    button{
      border:none;
      padding:13px 20px;
      border-radius:999px;
      background:linear-gradient(to bottom, #c99278, #b77d64);
      color:#fff4eb;
      font-family:Georgia, serif;
      font-size:1rem;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(255,255,255,0.22);
      transition:transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 14px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.24);
    }

    .page-count{
      margin-top:14px;
      color:#f3e4d0;
      font-size:1rem;
      text-shadow:0 1px 3px rgba(0,0,0,0.35);
    }

    .tip{
      margin-top:10px;
      color:#ead8c8;
      font-size:0.96rem;
      opacity:0.95;
    }

    @media (max-width:800px){
      .book-shell{
        width:min(92vw, 520px);
      }

      .flip-stage{
        width:min(88vw, 500px);
      }
    }
  </style>
</head>
<body>

  <div class="fireflies">
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
    <div class="firefly"></div>
  </div>

  <div class="page-wrap">
    <h1>Fox Wisdom Guidebook</h1>

    <div class="intro">
      Turn the pages like a woodland grimoire and step softly into the wisdom of the fox.
    </div>

    <div class="book-shell">
      <div class="book-glow"></div>

      <div class="flip-stage" id="flipStage">
        <div class="page-card" id="currentPageCard">
          <img id="currentPageImage" src="fox_guidebook_page_1.jpg" alt="Guidebook page 1">
        </div>
      </div>
    </div>

    <div class="controls">
      <button onclick="prevPage()">Previous Page</button>
      <button onclick="nextPage()">Next Page</button>
      <button onclick="window.location.href='index.html'">Return to Oracle</button>
    </div>

    <div class="page-count" id="pageCount">Page 1 of 5</div>
    <div class="tip">Tip: Use the buttons to turn through the guidebook.</div>
  </div>

  <script>
    const pages = [
      "fox_guidebook_page_1.jpg",
      "fox_guidebook_page_2.jpg",
      "fox_guidebook_page_3.jpg",
      "fox_guidebook_page_4.jpg",
      "fox_guidebook_page_5.jpg"
    ];

    let currentPage = 0;
    let isTurning = false;

    const flipStage = document.getElementById("flipStage");
    const currentPageCard = document.getElementById("currentPageCard");
    const currentPageImage = document.getElementById("currentPageImage");
    const pageCount = document.getElementById("pageCount");

    function updatePageDisplay() {
      currentPageImage.src = pages[currentPage];
      currentPageImage.alt = `Guidebook page ${currentPage + 1}`;
      pageCount.textContent = `Page ${currentPage + 1} of ${pages.length}`;
    }

    function nextPage() {
      if (isTurning || currentPage >= pages.length - 1) return;
      isTurning = true;

      const oldCard = currentPageCard.cloneNode(true);
      oldCard.id = "";
      oldCard.classList.add("turning-next");
      oldCard.querySelector("img").src = pages[currentPage];
      flipStage.appendChild(oldCard);

      currentPage++;
      updatePageDisplay();

      setTimeout(() => {
        oldCard.remove();
        isTurning = false;
      }, 900);
    }

    function prevPage() {
      if (isTurning || currentPage <= 0) return;
      isTurning = true;

      currentPage--;

      const newCard = currentPageCard.cloneNode(true);
      newCard.id = "";
      newCard.classList.add("turning-prev");
      newCard.querySelector("img").src = pages[currentPage];
      flipStage.appendChild(newCard);

      currentPageImage.src = pages[currentPage];
      currentPageImage.alt = `Guidebook page ${currentPage + 1}`;
      pageCount.textContent = `Page ${currentPage + 1} of ${pages.length}`;

      setTimeout(() => {
        newCard.remove();
        isTurning = false;
      }, 900);
    }

    updatePageDisplay();
  </script>

</body>
</html>
