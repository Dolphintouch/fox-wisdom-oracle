<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The In-Between Moments Oracle</title>

<style>
body {
  font-family: Georgia, serif;
  text-align: center;

  /* ✅ FIXED BACKGROUND */
  background-image:
    linear-gradient(rgba(34, 24, 36, 0.5), rgba(22, 16, 28, 0.7)),
    url("forest-bg-new.jpg");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  color: #fff;
  margin: 0;
  padding: 20px;
}

/* ✨ soft glow overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,200,230,0.12), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(255,220,240,0.08), transparent 30%);
  pointer-events: none;
}

/* ✨ title */
h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

/* ✨ subtitle */
.blessing {
  font-style: italic;
  margin-bottom: 30px;
  color: #ffeef8;
}

/* ✨ main card */
.welcome-card {
  width: 260px;
  border-radius: 18px;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,200,230,0.3);
  transition: transform 0.5s ease;
}

.welcome-card:hover {
  transform: scale(1.05);
}

/* ✨ buttons */
.button-row {
  margin: 30px 0;
}

button {
  margin: 6px;
  padding: 12px 20px;
  border-radius: 30px;
  border: none;
  background: #c89bb8;
  color: white;
  cursor: pointer;
  font-family: Georgia, serif;
}

button:hover {
  background: #d8a8c6;
}

/* ✨ spread layout */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 200px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(255,200,230,0.25);
}

/* ✨ message */
.message-box {
  margin-top: 30px;
  padding: 20px;
  background: rgba(50,40,60,0.6);
  border-radius: 20px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}
</style>
</head>

<body>

<h1>The In-Between Moments Oracle</h1>

<div class="blessing">
In the quiet spaces between moments…<br>
something waits to be felt.
</div>

<img id="mainCard" class="welcome-card"
src="in-between-card-back.jpg"
onclick="drawCard()">

<div class="button-row">
<button onclick="drawCard()">Daily Card</button>
<button onclick="drawThree()">3 Card Spread</button>
<button onclick="location.href='index.html'">Back to Fox</button>
</div>

<div id="cards" class="cards"></div>

<div id="message" class="message-box"></div>

<script>
const cards = [
{title:"A Moment for Yourself",image:"a-moment-for-yourself.jpg",message:"Step back. You deserve softness."},
{title:"The Quiet Pause",image:"the-quiet-pause.jpg",message:"Not all pauses are setbacks."},
{title:"Held in Gentle Light",image:"held-in-gentle-light.jpg",message:"You are supported more than you know."},
{title:"You Can Breathe Again",image:"you-can-breathe-again.jpg",message:"Relief is entering your life."},
{title:"Let Go Gracefully",image:"let-go-gracefully.jpg",message:"Release gently."},
{title:"The Love That Never Ends",image:"the-love-that-never-ends.jpg",message:"Love continues."}
];

function randomCard(){
return cards[Math.floor(Math.random()*cards.length)];
}

function drawCard(){
const card=randomCard();

document.getElementById("mainCard").src=card.image;

document.getElementById("message").innerHTML=
"<h2>"+card.title+"</h2><p>"+card.message+"</p>";

document.getElementById("cards").innerHTML="";
}

function drawThree(){
let selected=[];

while(selected.length<3){
let c=randomCard();
if(!selected.includes(c)) selected.push(c);
}

let html="";
selected.forEach(c=>{
html+=`<div>
<img class="card" src="${c.image}">
<p>${c.title}</p>
</div>`;
});

document.getElementById("cards").innerHTML=html;

document.getElementById("message").innerHTML="";
}
</script>

</body>
</html>
