<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxfire Forest Platform Adventure</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  overflow: hidden;
  font-family: Georgia, serif;
  background:
    linear-gradient(rgba(7,18,12,0.55), rgba(7,18,12,0.9)),
    url("forest-bg.jpg");
  background-size: cover;
  background-position: center;
  color: #ffe9bd;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#game::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,220,120,0.18), transparent 20%),
    radial-gradient(circle at 75% 60%, rgba(180,255,190,0.12), transparent 25%);
  pointer-events: none;
}

.title {
  position: absolute;
  top: 18px;
  width: 100%;
  text-align: center;
  z-index: 20;
  font-size: clamp(2.2rem, 6vw, 4.5rem);
  color: #f7dfaa;
  text-shadow:
    0 0 18px rgba(255,220,130,0.4),
    0 5px 14px rgba(0,0,0,0.75);
  pointer-events: none;
}

.top-ui {
  position: absolute;
  top: 18px;
  left: 18px;
  z-index: 30;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.back-btn,
.ui-pill {
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(15,35,22,0.84);
  border: 1px solid rgba(255,220,140,0.45);
  color: #ffe9bd;
  text-decoration: none;
  box-shadow: 0 0 16px rgba(255,210,120,0.16);
}

#fox {
  position: absolute;
  width: 135px;
  left: 90px;
  bottom: 80px;
  z-index: 12;
  transform: scaleX(1);
  filter:
    drop-shadow(0 12px 12px rgba(0,0,0,0.5))
    drop-shadow(0 0 18px rgba(255,190,90,0.5))
    brightness(1.08);
  user-select: none;
  pointer-events: none;
}

#fox.left {
  transform: scaleX(-1);
}

.platform {
  position: absolute;
  height: 24px;
  background: linear-gradient(#5b3b20, #2b190e);
  border-radius: 16px;
  box-shadow:
    0 8px 12px rgba(0,0,0,0.5),
    inset 0 3px 3px rgba(255,220,150,0.22);
}

.platform::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: -12px;
  height: 18px;
  border-radius: 18px 18px 8px 8px;
  background: linear-gradient(#406f38, #203d22);
  box-shadow: 0 0 14px rgba(150,255,150,0.15);
}

.collectible {
  position: absolute;
  width: 54px;
  height: 54px;
  background-image: url("dandelion-new.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  filter:
    drop-shadow(0 0 10px rgba(255,240,180,0.9))
    drop-shadow(0 0 22px rgba(255,210,110,0.5));
  animation: floatWish 2s ease-in-out infinite alternate;
  z-index: 8;
}

@keyframes floatWish {
  from {
    transform: translateY(0) rotate(-4deg);
  }
  to {
    transform: translateY(-12px) rotate(5deg);
  }
}

.rock {
  position: absolute;
  width: 70px;
  height: 60px;
  background-image: url("rock-new.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  filter: drop-shadow(0 8px 10px rgba(0,0,0,0.55));
  z-index: 8;
}

#goal {
  position: absolute;
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff6ba, #ffd95d 55%, rgba(255,217,93,0.1) 70%);
  box-shadow:
    0 0 22px #ffe27a,
    0 0 48px rgba(255,220,100,0.65);
  animation: pulse 2s ease-in-out infinite alternate;
  z-index: 7;
}

@keyframes pulse {
  from {
    transform: scale(1);
  }
  to {
    transform: scale(1.16);
  }
}

.firefly {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #ffe7a1;
  border-radius: 50%;
  box-shadow: 0 0 12px #ffe7a1, 0 0 22px rgba(255,220,130,0.6);
  animation: firefly 6s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes firefly {
  from {
    transform: translateY(0) translateX(0);
    opacity: 0.35;
  }
  to {
    transform: translateY(-35px) translateX(22px);
    opacity: 1;
  }
}

.choice-screen {
  position: fixed;
  inset: 0;
  z-index: 100;
  background:
    radial-gradient(circle at center, rgba(255,220,130,0.14), transparent 35%),
    rgba(4,12,8,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.choice-box {
  width: min(820px, 94vw);
  padding: 28px;
  border-radius: 28px;
  background: rgba(22,34,20,0.94);
  border: 1px solid rgba(255,220,140,0.45);
  box-shadow: 0 0 35px rgba(255,210,120,0.18);
  text-align: center;
}

.choice-box h1 {
  margin: 0 0 10px;
  font-size: clamp(2.2rem, 6vw, 3.4rem);
  color: #f8dfaa;
}

.choice-box p {
  margin: 0 0 24px;
  color: #fff0d0;
}

.fox-choice-wrap {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.fox-card {
  width: 260px;
  padding: 18px;
  border-radius: 24px;
  background: rgba(255,240,190,0.08);
  border: 1px solid rgba(255,220,140,0.3);
  cursor: pointer;
  color: #ffe9bd;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.fox-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 26px rgba(255,220,120,0.25);
}

.fox-card img {
  width: 210px;
  height: 150px;
  object-fit: contain;
}

.fox-card h2 {
  margin: 8px 0 0;
}

.message {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 20px;
  border-radius: 999px;
  background: rgba(15,35,22,0.84);
  border: 1px solid rgba(255,220,140,0.35);
  color: #ffe9bd;
  z-index: 30;
  text-align: center;
  box-shadow: 0 0 18px rgba(255,220,130,0.14);
}

@media (max-width: 700px) {
  #fox {
    width: 110px;
  }

  .title {
    top: 70px;
  }
}
</style>
</head>

<body>

<div id="game">
  <div class="title">Foxfire Forest</div>

  <div class="top-ui">
    <a class="back-btn" href="fox-game.html">← Back</a>
    <div class="ui-pill">Wishes: <span id="wishCount">0</span>/6</div>
  </div>

  <div class="firefly" style="left:18%; top:45%; animation-delay:.4s;"></div>
  <div class="firefly" style="left:48%; top:25%; animation-delay:1.5s;"></div>
  <div class="firefly" style="left:75%; top:60%; animation-delay:2.4s;"></div>
  <div class="firefly" style="left:88%; top:35%; animation-delay:1s;"></div>

  <img id="fox" src="girl-fox.png" alt="Fox player">

  <div class="platform" style="left:0px; bottom:0px; width:100%; height:42px;"></div>
  <div class="platform" style="left:210px; bottom:150px; width:240px;"></div>
  <div class="platform" style="left:520px; bottom:250px; width:220px;"></div>
  <div class="platform" style="left:820px; bottom:170px; width:250px;"></div>
  <div class="platform" style="left:1120px; bottom:300px; width:260px;"></div>

  <div class="collectible" style="left:260px; bottom:210px;"></div>
  <div class="collectible" style="left:585px; bottom:310px;"></div>
  <div class="collectible" style="left:890px; bottom:230px;"></div>
  <div class="collectible" style="left:1195px; bottom:360px;"></div>
  <div class="collectible" style="left:470px; bottom:70px;"></div>
  <div class="collectible" style="left:1030px; bottom:70px;"></div>

  <div class="rock" style="left:700px; bottom:42px;"></div>
  <div class="rock" style="left:980px; bottom:42px;"></div>

  <div id="goal" style="left:1320px; bottom:380px;"></div>

  <div class="message" id="message">Choose your fox to begin.</div>
</div>

<div class="choice-screen" id="choiceScreen">
  <div class="choice-box">
    <h1>Choose Your Fox</h1>
    <p>Who will follow the glowing forest path?</p>

    <div class="fox-choice-wrap">
      <div class="fox-card" onclick="chooseFox('boy-fox.png')">
        <img src="boy-fox.png" alt="Boy fox">
        <h2>Boy Fox</h2>
      </div>

      <div class="fox-card" onclick="chooseFox('girl-fox.png')">
        <img src="girl-fox.png" alt="Girl fox">
        <h2>Girl Fox</h2>
      </div>
    </div>
  </div>
</div>

<script>
const game = document.getElementById("game");
const fox = document.getElementById("fox");
const platforms = document.querySelectorAll(".platform");
const collectibles = document.querySelectorAll(".collectible");
const rocks = document.querySelectorAll(".rock");
const goal = document.getElementById("goal");
const wishCount = document.getElementById("wishCount");
const message = document.getElementById("message");
const choiceScreen = document.getElementById("choiceScreen");

let x = 90;
let y = 80;
let velocityY = 0;
let onGround = false;
let wishes = 0;
let facing = "right";
let gameStarted = false;
let keys = {};

const cleanCache = {};

function cleanImage(src, callback) {
  if (cleanCache[src]) {
    callback(cleanCache[src]);
    return;
  }

  const img = new Image();
  img.src = src;

  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;

    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = canvas.width;
    const h = canvas.height;

    function isBackgroundPixel(px, py) {
      const i = (py * w + px) * 4;
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const avg = (r + g + b) / 3;

      const pureWhite = r > 245 && g > 245 && b > 245;
      const paleGrey = avg > 150 && max - min < 28;

      return pureWhite || paleGrey;
    }

    const visited = new Uint8Array(w * h);
    const queue = [];

    function add(px, py) {
      if (px < 0 || py < 0 || px >= w || py >= h) return;

      const index = py * w + px;
      if (visited[index]) return;

      visited[index] = 1;

      if (isBackgroundPixel(px, py)) {
        queue.push([px, py]);
      }
    }

    for (let px = 0; px < w; px++) {
      add(px, 0);
      add(px, h - 1);
    }

    for (let py = 0; py < h; py++) {
      add(0, py);
      add(w - 1, py);
    }

    while (queue.length) {
      const [px, py] = queue.pop();
      const i = (py * w + px) * 4;

      data[i + 3] = 0;

      add(px + 1, py);
      add(px - 1, py);
      add(px, py + 1);
      add(px, py - 1);
    }

    ctx.putImageData(imageData, 0, 0);

    const cleaned = canvas.toDataURL("image/png");
    cleanCache[src] = cleaned;
    callback(cleaned);
  };

  img.onerror = () => {
    callback(src);
  };
}

function chooseFox(src) {
  cleanImage(src, cleaned => {
    fox.src = cleaned;
  });

  choiceScreen.style.display = "none";
  message.textContent = "Use arrow keys to run and space to jump.";
  gameStarted = true;
}

cleanImage("girl-fox.png", cleaned => {
  fox.src = cleaned;
});

document.addEventListener("keydown", event => {
  keys[event.key] = true;

  if (event.key === " " && onGround && gameStarted) {
    velocityY = 16;
    onGround = false;
  }
});

document.addEventListener("keyup", event => {
  keys[event.key] = false;
});

function rectsOverlap(a, b) {
  return (
    a.left < b.right &&
    a.right > b.left &&
    a.top < b.bottom &&
    a.bottom > b.top
  );
}

function resetFox() {
  x = 90;
  y = 80;
  velocityY = 0;
  message.textContent = "Careful, little fox. Try again.";
}

function gameLoop() {
  if (gameStarted) {
    if (keys["ArrowLeft"]) {
      x -= 6;
      facing = "left";
    }

    if (keys["ArrowRight"]) {
      x += 6;
      facing = "right";
    }

    velocityY -= 0.75;
    y += velocityY;

    onGround = false;

    fox.style.left = x + "px";
    fox.style.bottom = y + "px";
    fox.classList.toggle("left", facing === "left");

    const foxRect = fox.getBoundingClientRect();

    platforms.forEach(platform => {
      const p = platform.getBoundingClientRect();

      if (
        foxRect.bottom <= p.top + 18 &&
        foxRect.bottom >= p.top - 18 &&
        foxRect.right > p.left + 10 &&
        foxRect.left < p.right - 10 &&
        velocityY <= 0
      ) {
        y = window.innerHeight - p.top;
        velocityY = 0;
        onGround = true;
      }
    });

    collectibles.forEach(item => {
      if (item.dataset.collected === "true") return;

      if (rectsOverlap(fox.getBoundingClientRect(), item.getBoundingClientRect())) {
        item.dataset.collected = "true";
        item.style.display = "none";
        wishes++;
        wishCount.textContent = wishes;
        message.textContent = "A dandelion wish was gathered ✨";
      }
    });

    rocks.forEach(rock => {
      if (rectsOverlap(fox.getBoundingClientRect(), rock.getBoundingClientRect())) {
        resetFox();
      }
    });

    if (rectsOverlap(fox.getBoundingClientRect(), goal.getBoundingClientRect())) {
      if (wishes >= 6) {
        message.textContent = "The forest clearing opens for you 🌙";

        setTimeout(() => {
          alert("✨ Level 1 Complete!");
          window.location.href = "fox-game.html";
        }, 300);
      } else {
        message.textContent = "Collect all 6 wishes before entering the clearing.";
      }
    }

    if (y < -120) {
      resetFox();
    }

    x = Math.max(0, Math.min(x, window.innerWidth - 140));
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
