<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxfire Forest Platform Adventure</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  overflow: hidden;
  font-family: Georgia, serif;
  color: #ffe9bd;
  background:
    radial-gradient(circle at 70% 20%, rgba(255,220,120,0.14), transparent 35%),
    linear-gradient(rgba(7,18,12,0.58), rgba(7,18,12,0.95)),
    url("forest-bg.jpg");
  background-size: cover;
  background-position: center;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#game.day {
  background:
    radial-gradient(circle at 70% 20%, rgba(255,220,120,0.17), transparent 35%),
    linear-gradient(rgba(9,35,18,0.35), rgba(5,20,12,0.9)),
    url("forest-bg.jpg");
  background-size: cover;
  background-position: center;
}

#game.dusk {
  background:
    radial-gradient(circle at 65% 25%, rgba(255,150,80,0.2), transparent 35%),
    linear-gradient(rgba(70,28,40,0.48), rgba(6,13,22,0.95)),
    url("forest-bg.jpg");
  background-size: cover;
  background-position: center;
}

#game.spirit {
  background:
    radial-gradient(circle at 60% 20%, rgba(190,255,230,0.2), transparent 35%),
    linear-gradient(rgba(12,20,40,0.45), rgba(3,8,20,0.96)),
    url("forest-bg.jpg");
  background-size: cover;
  background-position: center;
}

#game::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 15% 80%, rgba(255,220,120,0.08), transparent 28%),
    radial-gradient(circle at 75% 45%, rgba(180,255,190,0.09), transparent 28%),
    linear-gradient(to top, rgba(0,0,0,0.35), transparent 35%);
  pointer-events: none;
  z-index: 1;
}

#game::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle, rgba(255,232,160,0.7) 0 2px, transparent 3px),
    radial-gradient(circle, rgba(255,245,190,0.4) 0 1.5px, transparent 3px);
  background-size: 140px 160px, 210px 230px;
  animation: sparkleDrift 16s linear infinite;
  opacity: 0.45;
  pointer-events: none;
  z-index: 2;
}

@keyframes sparkleDrift {
  from { background-position: 0 0, 80px 40px; }
  to { background-position: 140px -180px, 260px -160px; }
}

.title {
  position: absolute;
  top: 16px;
  width: 100%;
  text-align: center;
  z-index: 30;
  font-size: clamp(2.3rem, 5vw, 4.5rem);
  color: #f8dfaa;
  text-shadow:
    0 0 18px rgba(255,220,130,0.42),
    0 5px 16px rgba(0,0,0,0.75);
  pointer-events: none;
}

.subtitle {
  position: absolute;
  top: 88px;
  width: 100%;
  text-align: center;
  z-index: 30;
  color: #cde9a6;
  font-size: clamp(1rem, 2vw, 1.5rem);
  text-shadow: 0 3px 10px rgba(0,0,0,0.7);
  pointer-events: none;
}

.top-ui {
  position: absolute;
  top: 18px;
  left: 18px;
  z-index: 45;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  max-width: 62vw;
}

.back-btn,
.ui-pill,
button.ui-pill {
  padding: 9px 14px;
  border-radius: 999px;
  background: rgba(15,35,22,0.86);
  border: 1px solid rgba(255,220,140,0.45);
  color: #ffe9bd;
  text-decoration: none;
  box-shadow: 0 0 16px rgba(255,210,120,0.16);
  font-family: Georgia, serif;
  font-size: 15px;
}

button.ui-pill {
  cursor: pointer;
}

button.ui-pill:hover,
.back-btn:hover {
  background: rgba(40,65,34,0.92);
}

.side-oracle {
  position: absolute;
  top: 118px;
  right: 18px;
  width: 285px;
  max-width: 31vw;
  z-index: 44;
  padding: 18px;
  border-radius: 24px;
  background:
    radial-gradient(circle at top, rgba(255,224,150,0.16), transparent 45%),
    rgba(10,25,17,0.88);
  border: 1px solid rgba(255,220,140,0.38);
  box-shadow:
    0 0 26px rgba(255,210,120,0.18),
    inset 0 0 18px rgba(255,255,255,0.04);
}

.side-oracle h2 {
  margin: 0 0 8px;
  color: #ffe3a3;
  font-size: 1.25rem;
}

.side-oracle .praise {
  margin: 0 0 12px;
  color: #d8f2b8;
  font-size: 1rem;
  line-height: 1.35;
}

.side-oracle .oracle-card {
  padding: 14px;
  border-radius: 18px;
  background: rgba(255,240,190,0.08);
  border: 1px solid rgba(255,220,140,0.2);
}

.side-oracle .oracle-title {
  margin: 0 0 6px;
  color: #fff0c7;
  font-weight: bold;
}

.side-oracle .oracle-message {
  margin: 0;
  color: #f7deb1;
  line-height: 1.4;
  font-size: 0.98rem;
}

.level-name {
  position: absolute;
  top: 145px;
  left: 18px;
  z-index: 42;
  padding: 10px 16px;
  border-radius: 18px;
  background: rgba(10,25,17,0.82);
  border: 1px solid rgba(255,220,140,0.28);
  box-shadow: 0 0 16px rgba(255,210,120,0.11);
}

#fox {
  position: absolute;
  width: 132px;
  left: 90px;
  bottom: 80px;
  z-index: 20;
  transform: scaleX(1);
  filter:
    drop-shadow(0 12px 12px rgba(0,0,0,0.55))
    drop-shadow(0 0 18px rgba(255,190,90,0.5))
    brightness(1.08);
  user-select: none;
  pointer-events: none;
  animation: foxIdle 1.8s ease-in-out infinite alternate;
}

@keyframes foxIdle {
  from { translate: 0 0; }
  to { translate: 0 -4px; }
}

#fox.left {
  transform: scaleX(-1);
}

#fox.jump {
  filter:
    drop-shadow(0 12px 12px rgba(0,0,0,0.55))
    drop-shadow(0 0 26px rgba(255,220,120,0.72))
    brightness(1.14);
}

.sparkle-trail {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ffe7a1;
  box-shadow: 0 0 12px #ffe7a1;
  z-index: 17;
  pointer-events: none;
  animation: trailFade 0.8s ease forwards;
}

@keyframes trailFade {
  from { opacity: 0.95; transform: scale(1); }
  to { opacity: 0; transform: scale(0.2) translateY(12px); }
}

.platform {
  position: absolute;
  height: 34px;
  border-radius: 22px;
  background:
    linear-gradient(#4f7f3d 0 28%, #5b3a20 30%, #2b180d 100%);
  box-shadow:
    0 12px 18px rgba(0,0,0,0.65),
    0 0 24px rgba(170,255,120,0.16),
    inset 0 4px 4px rgba(255,230,160,0.18);
  z-index: 8;
}

.platform::before {
  content: "";
  position: absolute;
  left: -10px;
  right: -10px;
  top: -19px;
  height: 30px;
  border-radius: 55% 55% 18px 18px;
