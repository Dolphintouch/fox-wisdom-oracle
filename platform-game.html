<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxfire Forest Platform Adventure</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#06110b;
  color:#ffe8a8;
  font-family:Georgia;
}

#world{
  position:absolute;
  width:1792px;
  height:100vh;
  background-size:cover;
  background-position:bottom;
}

#fox{
  position:absolute;
  width:110px;
  height:110px;
  background-size:contain;
  background-repeat:no-repeat;
}

.sprite{
  position:absolute;
  background-size:contain;
  background-repeat:no-repeat;
}

/* simple glow */
.wish{filter:drop-shadow(0 0 10px gold);}
.portal{
  width:90px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle,white,green,transparent);
}
  </style>
</head>
<body>

<div id="world"></div>
<div id="fox"></div>

<script>

const world = document.getElementById("world");
const fox = document.getElementById("fox");

let x = 100;
let y = 300;
let vx = 0;
let vy = 0;

let gravity = 0.7;
let onGround = false;

let keys = {};

let level = {
  bg:"level-misty-meadows.png",

  platforms:[
    {x:0,y:50,w:1792},
    {x:300,y:300,w:300},
    {x:800,y:400,w:300},
    {x:1300,y:550,w:300}
  ],

  wishes:[
    {x:350,y:350},
    {x:900,y:450},
    {x:1400,y:600}
  ],

  portal:{x:1500,y:600}
}; function buildLevel(){
  world.style.backgroundImage = `url(${level.bg})`;

  document.querySelectorAll(".sprite").forEach(e=>e.remove());

  // platforms
  level.platforms.forEach(p=>{
    let el=document.createElement("div");
    el.className="platform sprite";
    el.style.left=p.x+"px";
    el.style.bottom=p.y+"px";
    el.style.width=p.w+"px";
    el.style.height="20px";
    world.appendChild(el);
  });

  // wishes (few only)
  level.wishes.forEach(w=>{
    let el=document.createElement("div");
    el.className="sprite wish";
    el.style.left=w.x+"px";
    el.style.bottom=w.y+"px";
    el.style.width="40px";
    el.style.height="60px";
    el.style.backgroundImage="url(dandelion.png)";
    world.appendChild(el);
  });

  // portal aligned
  let portal=document.createElement("div");
  portal.className="sprite portal";
  portal.style.left=level.portal.x+"px";
  portal.style.bottom=level.portal.y+"px";
  portal.id="portal";
  world.appendChild(portal);
}function update(){

  // movement
  if(keys["ArrowLeft"]) vx=-5;
  else if(keys["ArrowRight"]) vx=5;
  else vx*=0.8;

  // jump
  if(keys[" "] && onGround){
    vy=12;
    onGround=false;
  }

  vy-=gravity;

  x+=vx;
  y+=vy;

  onGround=false;

  // platform collision (aligned)
  document.querySelectorAll(".platform").forEach(p=>{
    let px=p.offsetLeft;
    let py=parseInt(p.style.bottom);
    let pw=p.offsetWidth;

    if(x+80>px && x+20<px+pw){
      if(y<=py+10 && y>=py-20 && vy<=0){
        y=py;
        vy=0;
        onGround=true;
      }
    }
  });

  if(y<0){
    x=100;
    y=300;
  }

  fox.style.left=x+"px";
  fox.style.bottom=y+"px";

  requestAnimationFrame(update);
}// FOX IMAGE (with white background fix via CSS trick)
fox.style.backgroundImage="url(female-fox.png)";
fox.style.filter="drop-shadow(0 0 12px gold)";

// SOUND FIX
let music = new Audio("forest.mp3");
music.loop=true;

document.addEventListener("click",()=>{
  music.play().catch(()=>{});
},{once:true});

// controls
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

// start
buildLevel();
update();

</script>
</body>
</html>
