<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxfire Forest Platform Adventure</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  overflow: hidden;
  font-family: Georgia, serif;
  color: #ffe9bd;
  background:
    radial-gradient(circle at 70% 20%, rgba(255,220,120,0.14), transparent 35%),
    linear-gradient(rgba(7,18,12,0.58), rgba(7,18,12,0.95)),
    url("forest-bg.jpg");
  background-size: cover;
  background-position: center;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#game::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 15% 80%, rgba(255,220,120,0.08), transparent 28%),
    radial-gradient(circle at 75% 45%, rgba(180,255,190,0.09), transparent 28%),
    linear-gradient(to top, rgba(0,0,0,0.35), transparent 35%);
  pointer-events: none;
  z-index: 1;
}

#game::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle, rgba(255,232,160,0.7) 0 2px, transparent 3px),
    radial-gradient(circle, rgba(255,245,190,0.4) 0 1.5px, transparent 3px);
  background-size: 140px 160px, 210px 230px;
  animation: sparkleDrift 16s linear infinite;
  opacity: 0.45;
  pointer-events: none;
  z-index: 2;
}

@keyframes sparkleDrift {
  from { background-position: 0 0, 80px 40px; }
  to { background-position: 140px -180px, 260px -160px; }
}

.title {
  position: absolute;
  top: 16px;
  width: 100%;
  text-align: center;
  z-index: 30;
  font-size: clamp(2.4rem, 6vw, 4.8rem);
  color: #f8dfaa;
  text-shadow:
    0 0 18px rgba(255,220,130,0.42),
    0 5px 16px rgba(0,0,0,0.75);
  pointer-events: none;
}

.subtitle {
  position: absolute;
  top: 92px;
  width: 100%;
  text-align: center;
  z-index: 30;
  color: #cde9a6;
  font-size: clamp(1.1rem, 2vw, 1.6rem);
  text-shadow: 0 3px 10px rgba(0,0,0,0.7);
  pointer-events: none;
}

.top-ui {
  position: absolute;
  top: 18px;
  left: 18px;
  z-index: 40;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.back-btn,
.ui-pill {
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(15,35,22,0.86);
  border: 1px solid rgba(255,220,140,0.45);
  color: #ffe9bd;
  text-decoration: none;
  box-shadow: 0 0 16px rgba(255,210,120,0.16);
}

#fox {
  position: absolute;
  width: 135px;
  left: 90px;
  bottom: 80px;
  z-index: 20;
  transform: scaleX(1);
  filter:
    drop-shadow(0 12px 12px rgba(0,0,0,0.55))
    drop-shadow(0 0 18px rgba(255,190,90,0.5))
    brightness(1.08);
  user-select: none;
  pointer-events: none;
}

#fox.left {
  transform: scaleX(-1);
}

#fox.jump {
  filter:
    drop-shadow(0 12px 12px rgba(0,0,0,0.55))
    drop-shadow(0 0 26px rgba(255,220,120,0.72))
    brightness(1.14);
}

.platform {
  position: absolute;
  height: 34px;
  border-radius: 22px;
  background:
    linear-gradient(#4f7f3d 0 28%, #5b3a20 30%, #2b180d 100%);
  box-shadow:
    0 12px 18px rgba(0,0,0,0.65),
    0 0 24px rgba(170,255,120,0.16),
    inset 0 4px 4px rgba(255,230,160,0.18);
  z-index: 8;
}

.platform::before {
  content: "";
  position: absolute;
  left: -10px;
  right: -10px;
  top: -19px;
  height: 30px;
  border-radius: 55% 55% 18px 18px;
  background:
    radial-gradient(circle at 18% 44%, #9bdd76 0 9%, transparent 11%),
    radial-gradient(circle at 42% 30%, #75bf58 0 12%, transparent 14%),
    radial-gradient(circle at 76% 42%, #8bd76a 0 10%, transparent 12%),
    linear-gradient(#4f8b43, #24451f);
  box-shadow:
    0 0 18px rgba(170,255,120,0.16),
    inset 0 4px 3px rgba(255,255,210,0.08);
}

.platform::after {
  content: "";
  position: absolute;
  left: 18px;
  right: 18px;
  bottom: -14px;
  height: 14px;
  background:
    linear-gradient(90deg, transparent, rgba(87,49,25,0.75), transparent);
  filter: blur(1px);
  opacity: 0.7;
}

.collectible,
.rock,
.sheep {
  position: absolute;
  z-index: 18;
  object-fit: contain;
  user-select: none;
  pointer-events: none;
}

.collectible {
  width: 56px;
  animation: floatWish 2s ease-in-out infinite alternate;
  filter:
    drop-shadow(0 0 12px rgba(255,240,180,0.95))
    drop-shadow(0 0 28px rgba(255,220,120,0.65));
}

@keyframes floatWish {
  from { transform: translateY(0) rotate(-4deg); }
  to { transform: translateY(-13px) rotate(5deg); }
}

.rock {
  width: 68px;
  filter:
    drop-shadow(0 10px 12px rgba(0,0,0,0.65))
    brightness(0.95);
}

.sheep {
  width: 76px;
  animation: sheepBob 1.8s ease-in-out infinite alternate;
  filter:
    drop-shadow(0 8px 12px rgba(0,0,0,0.35))
    drop-shadow(0 0 12px rgba(255,245,220,0.35));
}

@keyframes sheepBob {
  from { transform: translateY(0); }
  to { transform: translateY(-7px); }
}

#goal {
  position: absolute;
  width: 78px;
  height: 78px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff7c0, #ffd95d 55%, rgba(255,217,93,0.1) 72%);
  box-shadow:
    0 0 26px #ffe27a,
    0 0 56px rgba(255,220,100,0.68);
  animation: pulse 2s ease-in-out infinite alternate;
  z-index: 12;
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.16); }
}

.lantern {
  position: absolute;
  width: 24px;
  height: 36px;
  border-radius: 10px 10px 14px 14px;
  background: radial-gradient(circle, #ffe391, #c87b32 60%, #48270f 72%);
  box-shadow:
    0 0 26px rgba(255,190,80,0.72),
    0 0 52px rgba(255,190,80,0.22);
  z-index: 6;
}

.mushroom {
  position: absolute;
  width: 42px;
  height: 34px;
  z-index: 6;
}

.mushroom::before {
  content: "";
  position: absolute;
  left: 4px;
  top: 0;
  width: 34px;
  height: 20px;
  border-radius: 22px 22px 8px 8px;
  background: radial-gradient(circle at 30% 30%, #fff2c4 0 10%, transparent 12%), #d88445;
  box-shadow: 0 0 14px rgba(255,190,100,0.28);
}

.mushroom::after {
  content: "";
  position: absolute;
  left: 16px;
  top: 16px;
  width: 10px;
  height: 18px;
  border-radius: 8px;
  background: #f2d6a3;
}

.firefly {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #ffe7a1;
  border-radius: 50%;
  box-shadow: 0 0 12px #ffe7a1, 0 0 22px rgba(255,220,130,0.6);
  animation: firefly 6s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 5;
}

@keyframes firefly {
  from { transform: translateY(0) translateX(0); opacity: 0.35; }
  to { transform: translateY(-38px) translateX(24px); opacity: 1; }
}

.vine {
  position: absolute;
  width: 16px;
  height: 130px;
  border-left: 3px solid rgba(83,130,61,0.65);
  border-radius: 50%;
  z-index: 4;
  opacity: 0.55;
}

.message {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 22px;
  border-radius: 999px;
  background: rgba(15,35,22,0.88);
  border: 1px solid rgba(255,220,140,0.35);
  color: #ffe9bd;
  z-index: 40;
  text-align: center;
  box-shadow: 0 0 18px rgba(255,220,130,0.14);
}

.choice-screen {
  position: fixed;
  inset: 0;
  z-index: 100;
  background:
    radial-gradient(circle at center, rgba(255,220,130,0.14), transparent 35%),
    rgba(4,12,8,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.choice-box {
  width: min(860px, 94vw);
  padding: 30px;
  border-radius: 30px;
  background: rgba(22,34,20,0.94);
  border: 1px solid rgba(255,220,140,0.45);
  box-shadow: 0 0 38px rgba(255,210,120,0.2);
  text-align: center;
}

.choice-box h1 {
  margin: 0 0 10px;
  font-size: clamp(2.4rem, 6vw, 3.6rem);
  color: #f8dfaa;
}

.choice-box p {
  margin: 0 0 24px;
  color: #fff0d0;
}

.fox-choice-wrap {
  display: flex;
  justify-content: center;
  gap: 22px;
  flex-wrap: wrap;
}

.fox-card {
  width: 270px;
  padding: 18px;
  border-radius: 24px;
  background: rgba(255,240,190,0.08);
  border: 1px solid rgba(255,220,140,0.32);
  cursor: pointer;
  color: #ffe9bd;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.fox-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 28px rgba(255,220,120,0.28);
}

.fox-card img {
  width: 220px;
  height: 150px;
  object-fit: contain;
}

.fox-card h2 {
  margin: 8px 0 0;
}

.sparkle-pop {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ffe7a1;
  box-shadow:
    0 0 10px #ffe7a1,
    18px -8px 0 -2px rgba(255,231,161,0.9),
    -16px -10px 0 -3px rgba(255,231,161,0.8),
    12px 16px 0 -3px rgba(255,231,161,0.75);
  pointer-events: none;
  z-index: 50;
  animation: pop 0.7s ease forwards;
}

@keyframes pop {
  from { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
  to { opacity: 0; transform: translate(-50%, -50%) scale(2.8); }
}

@media (max-width: 760px) {
  #fox { width: 112px; }
  .title { top: 70px; font-size: 2.8rem; }
  .subtitle { display: none; }
}
</style>
</head>

<body>

<div id="game">
  <div class="title">Foxfire Forest</div>
  <div class="subtitle">Platform Adventure</div>

  <div class="top-ui">
    <a class="back-btn" href="fox-game.html">← Back</a>
    <div class="ui-pill">Wishes: <span id="wishCount">0</span>/6</div>
    <div class="ui-pill">Sheep: <span id="sheepCount">0</span>/1</div>
  </div>

  <div class="vine" style="left:110px; top:0;"></div>
  <div class="vine" style="left:760px; top:0; height:170px;"></div>
  <div class="vine" style="left:1180px; top:0; height:150px;"></div>

  <div class="lantern" style="left:150px; bottom:420px;"></div>
  <div class="lantern" style="left:780px; bottom:145px;"></div>
  <div class="lantern" style="left:1250px; bottom:245px;"></div>

  <div class="mushroom" style="left:455px; bottom:42px;"></div>
  <div class="mushroom" style="left:735px; bottom:314px;"></div>
  <div class="mushroom" style="left:1100px; bottom:235px;"></div>

  <div class="firefly" style="left:14%; top:44%; animation-delay:.4s;"></div>
  <div class="firefly" style="left:35%; top:50%; animation-delay:1.1s;"></div>
  <div class="firefly" style="left:55%; top:28%; animation-delay:1.8s;"></div>
  <div class="firefly" style="left:76%; top:58%; animation-delay:2.3s;"></div>
  <div class="firefly" style="left:90%; top:36%; animation-delay:.9s;"></div>

  <img id="fox" src="girl-fox.png" alt="Fox player">

  <div class="platform" style="left:0px; bottom:0px; width:100%; height:42px;"></div>
  <div class="platform" style="left:175px; bottom:118px; width:250px;"></div>
  <div class="platform" style="left:500px; bottom:210px; width:230px;"></div>
  <div class="platform" style="left:805px; bottom:122px; width:250px;"></div>
  <div class="platform" style="left:1100px; bottom:260px; width:260px;"></div>
  <div class="platform" style="left:1390px; bottom:370px; width:260px;"></div>

  <img class="collectible" data-clean-src="dandelion-new.png" style="left:250px; bottom:188px;" alt="Dandelion wish">
  <img class="collectible" data-clean-src="dandelion-new.png" style="left:560px; bottom:280px;" alt="Dandelion wish">
  <img class="collectible" data-clean-src="dandelion-new.png" style="left:875px; bottom:190px;" alt="Dandelion wish">
  <img class="collectible" data-clean-src="dandelion-new.png" style="left:1190px; bottom:330px;" alt="Dandelion wish">
  <img class="collectible" data-clean-src="dandelion-new.png" style="left:1470px; bottom:438px;" alt="Dandelion wish">
  <img class="collectible" data-clean-src="dandelion-new.png" style="left:480px; bottom:68px;" alt="Dandelion wish">

  <img class="sheep" data-clean-src="sheep-new.png" style="left:1450px; bottom:425px;" alt="Fluffy sheep">

  <img class="rock" data-clean-src="rock-new.png" style="left:680px; bottom:42px;" alt="Rock hazard">
  <img class="rock" data-clean-src="rock-new.png" style="left:980px; bottom:42px;" alt="Rock hazard">

  <div id="goal" style="left:1580px; bottom:452px;"></div>

  <div class="message" id="message">Choose your fox to begin.</div>
</div>

<div class="choice-screen" id="choiceScreen">
  <div class="choice-box">
    <h1>Choose Your Fox</h1>
    <p>Who will follow the glowing forest path?</p>

    <div class="fox-choice-wrap">
      <div class="fox-card" onclick="chooseFox('boy-fox.png')">
        <img id="boyPreview" src="boy-fox.png" alt="Boy fox">
        <h2>Boy Fox</h2>
      </div>

      <div class="fox-card" onclick="chooseFox('girl-fox.png')">
        <img id="girlPreview" src="girl-fox.png" alt="Girl fox">
        <h2>Girl Fox</h2>
      </div>
    </div>
  </div>
</div>

<script>
const game = document.getElementById("game");
const fox = document.getElementById("fox");
const platforms = document.querySelectorAll(".platform");
const collectibles = document.querySelectorAll(".collectible");
const rocks = document.querySelectorAll(".rock");
const sheepItems = document.querySelectorAll(".sheep");
const goal = document.getElementById("goal");
const wishCount = document.getElementById("wishCount");
const sheepCount = document.getElementById("sheepCount");
const message = document.getElementById("message");
const choiceScreen = document.getElementById("choiceScreen");
const boyPreview = document.getElementById("boyPreview");
const girlPreview = document.getElementById("girlPreview");

let x = 90;
let y = 80;
let velocityY = 0;
let onGround = false;
let wishes = 0;
let sheepSaved = 0;
let facing = "right";
let gameStarted = false;
let keys = {};

const cleanCache = {};

function cleanImage(src, callback) {
  if (cleanCache[src]) {
    callback(cleanCache[src]);
    return;
  }

  const img = new Image();
  img.src = src;

  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;

    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = canvas.width;
    const h = canvas.height;

    function isBackgroundPixel(px, py) {
      const i = (py * w + px) * 4;
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const avg = (r + g + b) / 3;

      return (r > 245 && g > 245 && b > 245) || (avg > 150 && max - min < 28);
    }

    const visited = new Uint8Array(w * h);
    const queue = [];

    function add(px, py) {
      if (px < 0 || py < 0 || px >= w || py >= h) return;
      const index = py * w + px;
      if (visited[index]) return;
      visited[index] = 1;
      if (isBackgroundPixel(px, py)) queue.push([px, py]);
    }

    for (let px = 0; px < w; px++) {
      add(px, 0);
      add(px, h - 1);
    }

    for (let py = 0; py < h; py++) {
      add(0, py);
      add(w - 1, py);
    }

    while (queue.length) {
      const [px, py] = queue.pop();
      const i = (py * w + px) * 4;
      data[i + 3] = 0;
      add(px + 1, py);
      add(px - 1, py);
      add(px, py + 1);
      add(px, py - 1);
    }

    ctx.putImageData(imageData, 0, 0);

    const cleaned = canvas.toDataURL("image/png");
    cleanCache[src] = cleaned;
    callback(cleaned);
  };

  img.onerror = () => callback(src);
}

function setCleanImage(el, src) {
  cleanImage(src, cleaned => {
    el.src = cleaned;
  });
}

document.querySelectorAll("[data-clean-src]").forEach(el => {
  setCleanImage(el, el.dataset.cleanSrc);
});

setCleanImage(boyPreview, "boy-fox.png");
setCleanImage(girlPreview, "girl-fox.png");
setCleanImage(fox, "girl-fox.png");

function chooseFox(src) {
  setCleanImage(fox, src);
  choiceScreen.style.display = "none";
  message.textContent = "Use arrow keys to run and space to jump.";
  gameStarted = true;
}

document.addEventListener("keydown", event => {
  keys[event.key] = true;

  if (event.key === " " && onGround && gameStarted) {
    velocityY = 16;
    onGround = false;
    fox.classList.add("jump");
  }
});

document.addEventListener("keyup", event => {
  keys[event.key] = false;
});

function rectsOverlap(a, b) {
  return (
    a.left < b.right &&
    a.right > b.left &&
    a.top < b.bottom &&
    a.bottom > b.top
  );
}

function resetFox() {
  x = 90;
  y = 80;
  velocityY = 0;
  message.textContent = "Careful, little fox. Try again.";
}

function sparklePop(xPos, yPos) {
  const sparkle = document.createElement("div");
  sparkle.className = "sparkle-pop";
  sparkle.style.left = xPos + "px";
  sparkle.style.top = yPos + "px";
  game.appendChild(sparkle);
  setTimeout(() => sparkle.remove(), 750);
}

function gameLoop() {
  if (gameStarted) {
    if (keys["ArrowLeft"]) {
      x -= 6;
      facing = "left";
    }

    if (keys["ArrowRight"]) {
      x += 6;
      facing = "right";
    }

    velocityY -= 0.75;
    y += velocityY;

    onGround = false;

    fox.style.left = x + "px";
    fox.style.bottom = y + "px";
    fox.classList.toggle("left", facing === "left");

    const foxRect = fox.getBoundingClientRect();

    platforms.forEach(platform => {
      const p = platform.getBoundingClientRect();

      if (
        foxRect.bottom <= p.top + 20 &&
        foxRect.bottom >= p.top - 20 &&
        foxRect.right > p.left + 12 &&
        foxRect.left < p.right - 12 &&
        velocityY <= 0
      ) {
        y = window.innerHeight - p.top;
        velocityY = 0;
        onGround = true;
        fox.classList.remove("jump");
      }
    });

    collectibles.forEach(item => {
      if (item.dataset.collected === "true") return;

      if (rectsOverlap(fox.getBoundingClientRect(), item.getBoundingClientRect())) {
        item.dataset.collected = "true";
        item.style.display = "none";
        wishes++;
        wishCount.textContent = wishes;
        message.textContent = "A dandelion wish was gathered ✨";

        const r = item.getBoundingClientRect();
        sparklePop(r.left + r.width / 2, r.top + r.height / 2);
      }
    });

    sheepItems.forEach(item => {
      if (item.dataset.collected === "true") return;

      if (rectsOverlap(fox.getBoundingClientRect(), item.getBoundingClientRect())) {
        item.dataset.collected = "true";
        item.style.display = "none";
        sheepSaved++;
        sheepCount.textContent = sheepSaved;
        message.textContent = "You rescued a fluffy sheep 🐑";

        const r = item.getBoundingClientRect();
        sparklePop(r.left + r.width / 2, r.top + r.height / 2);
      }
    });

    rocks.forEach(rock => {
      if (rectsOverlap(fox.getBoundingClientRect(), rock.getBoundingClientRect())) {
        resetFox();
      }
    });

    if (rectsOverlap(fox.getBoundingClientRect(), goal.getBoundingClientRect())) {
      if (wishes >= 6 && sheepSaved >= 1) {
        message.textContent = "The forest clearing opens for you 🌙";

        setTimeout(() => {
          alert("✨ Level 1 Complete!");
          window.location.href = "fox-game.html";
        }, 300);
      } else {
        message.textContent = "Collect all wishes and rescue the sheep first.";
      }
    }

    if (y < -140) {
      resetFox();
    }

    x = Math.max(0, Math.min(x, window.innerWidth - 130));
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
