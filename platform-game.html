<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Foxfire Forest</title>
<style>
body{margin:0;overflow:hidden;background:#06110b}
#world{position:absolute;width:1792px;height:100vh;background:url('level-misty-meadows.png') no-repeat left bottom;background-size:1792px 100vh}
#fox{position:absolute;width:100px;bottom:200px;left:100px;z-index:10}
.item,.sheep,.mushroom,.npc,.goal{position:absolute;object-fit:contain;background:transparent!important}
.item{width:58px;filter:drop-shadow(0 0 12px gold);animation:f 3s infinite alternate}
@keyframes f{from{transform:translateY(0)}to{transform:translateY(-20px)}}
.sheep{width:80px;animation:b 1s infinite}
@keyframes b{0%{transform:translateY(0)}50%{transform:translateY(-20px)}100%{transform:translateY(0)}}
</style>
</head>
<body>
<div id="world"></div>
<img id="fox" src="foxy-player-idle.png">

<script>
// sounds
const sounds={
 ambient:new Audio("foxglow-glade.mp3"),
 collect:new Audio("sparkle-chime.mp3"),
 sheep:new Audio("sheep-baa.mp3"),
 jump:new Audio("soft-poof.mp3")
};
sounds.ambient.loop=true;
sounds.ambient.volume=0.35;

let fox=document.getElementById("fox");
let x=100,y=200,vy=0,onGround=false;
let keys={};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

document.body.addEventListener("click",()=>{sounds.ambient.play().catch(()=>{});},{once:true});

// cleaner
function clean(img){
 let c=document.createElement("canvas"),ctx=c.getContext("2d");
 img.onload=()=>{
  c.width=img.width;c.height=img.height;
  ctx.drawImage(img,0,0);
  let d=ctx.getImageData(0,0,c.width,c.height);
  for(let i=0;i<d.data.length;i+=4){
   if(d.data[i]>220&&d.data[i+1]>220&&d.data[i+2]>220){d.data[i+3]=0;}
  }
  ctx.putImageData(d,0,0);
  img.src=c.toDataURL();
 };
}

// dandelions
for(let i=0;i<10;i++){
 let d=document.createElement("img");
 d.src="dandelion-magical.png";
 d.className="item";
 d.style.left=(300+i*120)+"px";
 d.style.bottom=(250+Math.random()*200)+"px";
 document.body.appendChild(d);
 clean(d);
}

// sheep
for(let i=0;i<3;i++){
 let s=document.createElement("img");
 s.src="sheep-fluffy-glow.png";
 s.className="sheep";
 s.style.left=(500+i*300)+"px";
 s.style.bottom="200px";
 document.body.appendChild(s);
 clean(s);
}

// mushrooms
function m(x,y,src){
 let e=document.createElement("img");
 e.src=src;
 e.className="mushroom";
 e.style.left=x+"px";
 e.style.bottom=y+"px";
 document.body.appendChild(e);
 clean(e);
}
m(800,200,"mushroom-baby.png");
m(1000,200,"mushroom-elder.png");

// loop
function game(){
 if(keys["ArrowRight"]) x+=5;
 if(keys["ArrowLeft"]) x-=5;
 if(keys[" "]&&onGround){vy=15;onGround=false;sounds.jump.play();}
 vy-=0.7;y+=vy;
 if(y<200){y=200;vy=0;onGround=true;}
 fox.style.left=x+"px";
 fox.style.bottom=y+"px";
 requestAnimationFrame(game);
}
game();
</script>
</body>
</html>
