<!DOCTYPE html>

<html>
<head>
<title>Foxfire Forest</title>
<style>
body{margin:0;background:#0b1d13;overflow:hidden;font-family:Georgia;color:#ffe8a8;}
#game{position:relative;width:100vw;height:100vh;overflow:hidden;}

#fox{
position:absolute;
bottom:20px;
left:50%;
width:160px;
transform:translateX(-50%);
z-index:50;
}

.item{
position:absolute;
width:80px;
pointer-events:none;
}

.side{
position:absolute;
right:10px;
top:10px;
width:260px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:15px;
}

</style>
</head>

<body>
<div id="game">

<img id="fox" src="foxy-player.png">

<div class="side">
  <div id="speech">Catch the glowing wishes ✨</div>
  <div id="oracle"></div>
</div>

</div>

<script>

// --- CLEAN IMAGE (removes white backgrounds)
function clean(src, cb){
  let img=new Image();
  img.src=src;
  img.onload=()=>{
    let c=document.createElement("canvas");
    c.width=img.width;
    c.height=img.height;
    let ctx=c.getContext("2d");
    ctx.drawImage(img,0,0);
    let d=ctx.getImageData(0,0,c.width,c.height);

    for(let i=0;i<d.data.length;i+=4){
      let r=d.data[i],g=d.data[i+1],b=d.data[i+2];
      if((r+g+b)/3>200)d.data[i+3]=0;
    }

    ctx.putImageData(d,0,0);
    cb(c.toDataURL());
  }
}

// --- GAME
let game=document.getElementById("game");
let fox=document.getElementById("fox");

let x=window.innerWidth/2;

document.addEventListener("mousemove",e=>{
  x=e.clientX;
  fox.style.left=x+"px";
});

// --- SPAWN ITEMS
function spawn(type){
  let el=document.createElement("img");
  el.className="item";

  if(type==="d"){
    clean("dandelion-magical.png",src=>el.src=src);
    el.dataset.type="d";
  }
  if(type==="s"){
    clean("sheep-golden.png",src=>el.src=src);
    el.dataset.type="s";
  }
  if(type==="m"){
    clean("mushroom-young.png",src=>el.src=src);
    el.dataset.type="m";
  }

  el.style.left=Math.random()*window.innerWidth+"px";
  el.style.top="-100px";

  game.appendChild(el);

  let fall=setInterval(()=>{
    el.style.top=(el.offsetTop+2)+"px";

    // collision
    let f=fox.getBoundingClientRect();
    let i=el.getBoundingClientRect();

    if(i.bottom>f.top && i.left<f.right && i.right>f.left){

      if(el.dataset.type==="d"){
        document.getElementById("speech").innerText="✨ beautiful catch!";
      }

      if(el.dataset.type==="s"){
        document.getElementById("speech").innerText="🐑 rescued sheep!";
      }

      if(el.dataset.type==="m"){
        document.getElementById("speech").innerText="🍄 puff! it moves away";
      }

      el.remove();
      clearInterval(fall);
    }

    if(el.offsetTop>window.innerHeight){
      el.remove();
      clearInterval(fall);
    }

  },16);
}

// --- LOOP
setInterval(()=>{
  let r=Math.random();

  if(r<0.6)spawn("d");
  else if(r<0.85)spawn("s");
  else spawn("m");

},1200);

// --- ORACLE
let msgs=[
 "You are doing amazing ✨",
 "Keep going 🌿",
 "Magic follows you 🦊",
 "The forest sees you 🌙"
];

setInterval(()=>{
 document.getElementById("oracle").innerText=
   msgs[Math.floor(Math.random()*msgs.length)];
},4000);

</script>

</body>
</html>
