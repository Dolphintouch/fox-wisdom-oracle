<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fox Platform Adventure</title>
<style>
body { margin:0; overflow:hidden; background:#102414; font-family:Georgia; color:#fff; }

#sidebar {
  position:absolute; left:0; top:0; bottom:0; width:250px;
  background:#0c1d12; padding:15px; z-index:10;
}

#game {
  position:absolute; left:250px; right:0; top:0; bottom:0;
  overflow:hidden;
}

.platform {
  position:absolute;
  height:30px;
  background:#4a6b2a;
  border-radius:20px;
  box-shadow:0 0 10px #000;
}

#fox {
  position:absolute;
  width:80px;
  height:80px;
  background:url("fox-chibi.png") center/contain no-repeat;
}

.overlay {
  position:absolute; inset:0;
  background:rgba(0,0,0,0.7);
  display:flex; justify-content:center; align-items:center;
}

.box {
  background:#123; padding:20px; border-radius:15px;
}
</style>
</head>

<body>

<div id="sidebar">
  <h2>Fox Platform</h2>
  <button onclick="openFox()">Choose Fox</button>
</div>

<div id="game" tabindex="0">
  <div id="fox"></div>

  <div class="platform" style="left:50px; top:500px; width:600px;"></div>
  <div class="platform" style="left:200px; top:350px; width:200px;"></div>
  <div class="platform" style="left:500px; top:250px; width:200px;"></div>

  <div id="overlay" class="overlay">
    <div class="box">
      <h3>Choose Fox</h3>
      <button onclick="chooseFox()">Start</button>
    </div>
  </div>
</div>

<script>
let fox = {x:100, y:100, vx:0, vy:0, grounded:false};

let keys = {};

document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

function chooseFox(){
  document.getElementById("overlay").style.display="none";
  document.getElementById("game").focus();
}

function openFox(){
  document.getElementById("overlay").style.display="flex";
}

function loop(){
  let el = document.getElementById("fox");

  // movement
  if(keys["ArrowLeft"]) fox.vx -=0.5;
  if(keys["ArrowRight"]) fox.vx +=0.5;

  if(keys[" "] && fox.grounded){
    fox.vy = -12;
    fox.grounded=false;
  }

  fox.vx *=0.9;
  fox.vy +=0.6;

  fox.x += fox.vx;
  fox.y += fox.vy;

  fox.grounded=false;

  document.querySelectorAll(".platform").forEach(p=>{
    let r = p.getBoundingClientRect();
    let f = el.getBoundingClientRect();

    if(f.bottom <= r.top+10 && f.bottom+fox.vy >= r.top &&
       f.right > r.left && f.left < r.right){
        fox.y = r.top - 80;
        fox.vy=0;
        fox.grounded=true;
    }
  });

  el.style.left = fox.x+"px";
  el.style.top = fox.y+"px";

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
