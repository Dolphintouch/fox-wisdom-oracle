<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Foxfire Forest Drop Game</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  overflow: hidden;
  font-family: Georgia, serif;
  background: #102014 url("forest-bg.jpg") center/cover no-repeat fixed;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#game::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 70%, rgba(255,210,120,.18), transparent 35%),
    linear-gradient(to bottom, rgba(6,18,12,.15), rgba(5,12,8,.65));
  pointer-events: none;
}

#ui {
  position: absolute;
  top: 14px;
  left: 14px;
  z-index: 20;
  color: #fff6d6;
  text-shadow: 0 0 8px #000;
  font-size: 18px;
  line-height: 1.5;
}

#buttons {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 20;
  display: flex;
  gap: 8px;
}

button {
  border: 1px solid rgba(255,255,255,.35);
  background: rgba(20,45,28,.75);
  color: #fff6d6;
  padding: 9px 12px;
  border-radius: 18px;
  font-family: Georgia, serif;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(255,220,120,.25);
}

button:hover {
  background: rgba(45,75,42,.9);
}

#fox {
  position: absolute;
  bottom: 22px;
  left: 50%;
  width: 120px;
  transform: translateX(-50%);
  z-index: 12;
  pointer-events: none;
  filter:
    drop-shadow(0 0 8px rgba(255,190,80,.8))
    drop-shadow(0 0 18px rgba(255,150,40,.35));
}

.item {
  position: absolute;
  z-index: 10;
  pointer-events: none;
  object-fit: contain;
  filter: drop-shadow(0 0 8px rgba(255,220,140,.35));
}

.dandelion {
  width: 62px;
  animation: twinkle 1.2s infinite alternate ease-in-out, sway 2.8s infinite ease-in-out;
  filter:
    drop-shadow(0 0 8px rgba(255,255,190,.9))
    drop-shadow(0 0 18px rgba(255,240,140,.55));
}

.rock {
  width: 66px;
  filter: drop-shadow(0 0 8px rgba(30,20,10,.8));
}

.sheep {
  width: 82px;
  filter:
    drop-shadow(0 0 7px rgba(255,255,255,.75))
    drop-shadow(0 0 16px rgba(255,220,150,.35));
}

.goldSheep {
  width: 88px;
  filter:
    drop-shadow(0 0 10px rgba(255,220,70,.95))
    drop-shadow(0 0 22px rgba(255,190,40,.7));
}

.glowSheep {
  width: 92px;
  filter:
    drop-shadow(0 0 12px rgba(150,255,220,.95))
    drop-shadow(0 0 28px rgba(120,255,220,.65));
}

.rareSheep {
  width: 98px;
  animation: rarePulse .9s infinite alternate ease-in-out;
  filter:
    drop-shadow(0 0 14px rgba(230,180,255,.95))
    drop-shadow(0 0 30px rgba(255,190,255,.75));
}

.sparkle {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff9c9, rgba(255,230,120,.4), transparent);
  pointer-events: none;
  z-index: 8;
  animation: sparkleFade .65s forwards;
}

.popSparkle {
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: radial-gradient(circle, #fffbe8, rgba(255,236,120,.75), transparent);
  z-index: 15;
  pointer-events: none;
  animation: popSpark .55s forwards ease-out;
}

.floatingText {
  position: absolute;
  z-index: 30;
  color: #fff7cf;
  font-size: 22px;
  text-shadow: 0 0 8px #000;
  animation: floatUp 1s forwards ease-out;
  pointer-events: none;
}

@keyframes twinkle {
  from { transform: scale(.96) rotate(-2deg); opacity: .82; }
  to { transform: scale(1.08) rotate(2deg); opacity: 1; }
}

@keyframes sway {
  0%,100% { margin-left: -8px; }
  50% { margin-left: 8px; }
}

@keyframes rarePulse {
  from { transform: scale(1); }
  to { transform: scale(1.08); }
}

@keyframes sparkleFade {
  to {
    transform: translateY(24px) scale(0);
    opacity: 0;
  }
}

@keyframes popSpark {
  to {
    transform: scale(3.4);
    opacity: 0;
  }
}

@keyframes floatUp {
  to {
    transform: translateY(-45px);
    opacity: 0;
  }
}
</style>
</head>

<body>
<div id="game">
  <div id="ui">
    Score: <span id="score">0</span><br>
    Level: <span id="level">1</span><br>
    Best: <span id="best">0</span>
  </div>

  <div id="buttons">
    <button onclick="saveGame()">💾 Save</button>
    <button onclick="resetGame()">🔄 Reset</button>
    <button onclick="goPlatform()">🌲 Platform Game</button>
  </div>

  <img id="fox" src="fox.png" alt="fox">
</div>

<audio id="music" src="pineglass.mp3" loop></audio>
<audio id="catchSound" src="catch.mp3"></audio>
<audio id="missSound" src="miss.mp3"></audio>
<audio id="levelSound" src="levelup.mp3"></audio>

<script>
const game = document.getElementById("game");
const fox = document.getElementById("fox");
const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const bestEl = document.getElementById("best");

const music = document.getElementById("music");
const catchSound = document.getElementById("catchSound");
const missSound = document.getElementById("missSound");
const levelSound = document.getElementById("levelSound");

let score = 0;
let best = 0;
let level = 1;
let speed = 2.2;
let spawnRate = 1100;
let foxX = window.innerWidth / 2;
let gameStarted = false;

const saveData = JSON.parse(localStorage.getItem("foxfireDropSave") || "{}");
score = saveData.score || 0;
best = saveData.best || 0;
level = saveData.level || 1;
speed = saveData.speed || 2.2;
spawnRate = saveData.spawnRate || 1100;

updateUI();

const imageFiles = [
  "fox.png",
  "dandelion.png",
  "rock.png",
  "sheep.png",
  "gold-sheep.png",
  "glow-sheep.png",
  "rare-sheep.png"
];

const cleanedImages = {};

async function cleanWhiteBackground(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = data.data;

      for (let i = 0; i < pixels.length; i += 4) {
        const r = pixels[i];
        const g = pixels[i + 1];
        const b = pixels[i + 2];

        if (r > 225 && g > 225 && b > 225) {
          pixels[i + 3] = 0;
        }
      }

      ctx.putImageData(data, 0, 0);
      resolve(canvas.toDataURL("image/png"));
    };

    img.onerror = () => resolve(src);
    img.src = src;
  });
}

async function prepareImages() {
  for (const file of imageFiles) {
    cleanedImages[file] = await cleanWhiteBackground(file);
  }
  fox.src = cleanedImages["fox.png"];
}

prepareImages();

function startGameOnce() {
  if (gameStarted) return;
  gameStarted = true;
  music.volume = 0.35;
  music.play().catch(() => {});
}

document.addEventListener("mousemove", e => {
  startGameOnce();
  foxX = e.clientX;
  fox.style.left = foxX + "px";
  createFoxSparkle();
});

document.addEventListener("touchmove", e => {
  startGameOnce();
  foxX = e.touches[0].clientX;
  fox.style.left = foxX + "px";
  createFoxSparkle();
}, { passive: true });

function createFoxSparkle() {
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = (foxX + (Math.random() * 50 - 25)) + "px";
  s.style.top = (window.innerHeight - 80 + Math.random() * 25) + "px";
  game.appendChild(s);
  setTimeout(() => s.remove(), 700);
}

function spawnLoop() {
  spawnItem();
  setTimeout(spawnLoop, spawnRate);
}
spawnLoop();

setInterval(() => {
  level++;
  speed += 0.35;
  spawnRate = Math.max(360, spawnRate - 65);
  levelSound.currentTime = 0;
  levelSound.play().catch(() => {});
  floatingText("Level " + level + " ✨", window.innerWidth / 2, 120);
  saveGame();
  updateUI();
}, 15000);

function spawnItem() {
  const item = document.createElement("img");
  item.className = "item";

  const roll = Math.random();
  let type, src, points;

  const rockChance = Math.min(0.18 + level * 0.025, 0.42);

  if (roll < rockChance) {
    type = "rock";
    src = "rock.png";
    points = -3;
    item.classList.add("rock");
  } else if (roll < rockChance + 0.42) {
    type = "dandelion";
    src = "dandelion.png";
    points = 1;
    item.classList.add("dandelion");
  } else {
    const sheepRoll = Math.random();

    if (sheepRoll < 0.58) {
      type = "sheep";
      src = "sheep.png";
      points = 5;
      item.classList.add("sheep");
    } else if (sheepRoll < 0.82) {
      type = "goldSheep";
      src = "gold-sheep.png";
      points = 10;
      item.classList.add("goldSheep");
    } else if (sheepRoll < 0.96) {
      type = "glowSheep";
      src = "glow-sheep.png";
      points = 15;
      item.classList.add("glowSheep");
    } else {
      type = "rareSheep";
      src = "rare-sheep.png";
      points = 25;
      item.classList.add("rareSheep");
    }
  }

  item.src = cleanedImages[src] || src;
  item.dataset.type = type;
  item.dataset.points = points;
  item.dataset.bounces = type.includes("Sheep") || type === "sheep" ? 2 : 0;

  item.style.left = Math.random() * (window.innerWidth - 90) + "px";
  item.style.top = "-100px";

  game.appendChild(item);
  fall(item);
}

function fall(item) {
  let y = parseFloat(item.style.top);
  let x = parseFloat(item.style.left);
  let direction = Math.random() < .5 ? -1 : 1;
  let localSpeed = speed + Math.random() * 1.4;

  const timer = setInterval(() => {
    y += localSpeed;

    if (item.dataset.type === "dandelion") {
      x += Math.sin(y / 30) * 0.7;
      item.style.left = x + "px";
    }

    item.style.top = y + "px";

    if (hitFox(item)) {
      catchItem(item);
      clearInterval(timer);
      item.remove();
      return;
    }

    if (y > window.innerHeight - 55) {
      clearInterval(timer);
      groundHit(item, x, direction);
      return;
    }
  }, 20);
}

function hitFox(item) {
  const a = fox.getBoundingClientRect();
  const b = item.getBoundingClientRect();

  return (
    b.bottom > a.top + 20 &&
    b.top < a.bottom &&
    b.left < a.right - 20 &&
    b.right > a.left + 20
  );
}

function catchItem(item) {
  const type = item.dataset.type;
  const points = Number(item.dataset.points);

  score += points;

  if (score < 0) score = 0;
  if (score > best) best = score;

  catchSound.currentTime = 0;
  catchSound.play().catch(() => {});

  if (type === "rock") {
    floatingText("-3 🪨", foxX, window.innerHeight - 160);
  } else {
    floatingText("+" + points + " ✨", foxX, window.innerHeight - 160);
  }

  burstSparkles(item.offsetLeft, item.offsetTop);
  updateUI();
  saveGame();
}

function groundHit(item, x, direction) {
  const type = item.dataset.type;

  if (type === "dandelion") {
    popDandelion(item);
    return;
  }

  if (type === "rock") {
    item.remove();
    return;
  }

  if (type === "sheep" || type === "goldSheep" || type === "glowSheep" || type === "rareSheep") {
    let bounces = Number(item.dataset.bounces);

    if (bounces > 0) {
      item.dataset.bounces = bounces - 1;
      item.style.top = (window.innerHeight - 115) + "px";
      item.style.transform = "scaleY(.85)";
      setTimeout(() => {
        item.style.transform = "scaleY(1)";
        bounceUp(item, x, direction);
      }, 90);
    } else {
      runAway(item, direction);
    }
  }
}

function bounceUp(item, x, direction) {
  let y = window.innerHeight - 115;
  let velocity = -11;

  const timer = setInterval(() => {
    velocity += 0.45;
    y += velocity;
    x += direction * 1.8;

    item.style.top = y + "px";
    item.style.left = x + "px";

    if (hitFox(item)) {
      catchItem(item);
      clearInterval(timer);
      item.remove();
      return;
    }

    if (velocity > 0 && y > window.innerHeight - 115) {
      clearInterval(timer);
      groundHit(item, x, direction);
    }
  }, 20);
}

function runAway(item, direction) {
  missSound.currentTime = 0;
  missSound.play().catch(() => {});

  item.style.transition = "left 1.1s ease, opacity 1.1s ease, transform 1.1s ease";
  item.style.left = direction > 0 ? window.innerWidth + "px" : "-140px";
  item.style.opacity = "0";
  item.style.transform = "rotate(8deg) scale(.9)";
  setTimeout(() => item.remove(), 1200);
}

function popDandelion(item) {
  const x = item.offsetLeft + 30;
  const y = item.offsetTop + 20;

  for (let i = 0; i < 12; i++) {
    const p = document.createElement("div");
    p.className = "popSparkle";
    p.style.left = (x + Math.random() * 40 - 20) + "px";
    p.style.top = (y + Math.random() * 40 - 20) + "px";
    game.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }

  item.remove();
}

function burstSparkles(x, y) {
  for (let i = 0; i < 10; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = (x + 30 + Math.random() * 40 - 20) + "px";
    s.style.top = (y + 30 + Math.random() * 40 - 20) + "px";
    game.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }
}

function floatingText(text, x, y) {
  const t = document.createElement("div");
  t.className = "floatingText";
  t.textContent = text;
  t.style.left = x + "px";
  t.style.top = y + "px";
  game.appendChild(t);
  setTimeout(() => t.remove(), 1000);
}

function updateUI() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  bestEl.textContent = best;
}

function saveGame() {
  localStorage.setItem("foxfireDropSave", JSON.stringify({
    score,
    best,
    level,
    speed,
    spawnRate
  }));
}

function resetGame() {
  localStorage.removeItem("foxfireDropSave");
  score = 0;
  level = 1;
  speed = 2.2;
  spawnRate = 1100;
  updateUI();
}

function goPlatform() {
  window.location.href = "platform-game.html";
}
</script>
</body>
</html>
