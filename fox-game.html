<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foxfire Forest Game | Fox Wisdom Oracle</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: Georgia, serif;
  color: #f8e8c8;
  background-image:
    linear-gradient(rgba(7, 18, 12, 0.58), rgba(7, 18, 12, 0.9)),
    url("forest-bg.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  overflow-x: hidden;
  text-align: center;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 12% 20%, rgba(255,220,130,0.15), transparent 18%),
    radial-gradient(circle at 80% 20%, rgba(255,230,170,0.12), transparent 20%),
    radial-gradient(circle at 50% 80%, rgba(255,210,120,0.09), transparent 24%);
  z-index: 0;
}

.sparkles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background-image:
    radial-gradient(circle, rgba(255,231,155,0.9) 0 2px, transparent 3px),
    radial-gradient(circle, rgba(255,245,190,0.55) 0 1.5px, transparent 3px);
  background-size: 110px 130px, 170px 210px;
  animation: sparkleFloat 12s linear infinite;
  opacity: 0.7;
}

@keyframes sparkleFloat {
  from { background-position: 0 0, 40px 80px; }
  to { background-position: 120px -180px, 220px -140px; }
}

.page {
  position: relative;
  z-index: 2;
  width: min(1220px, 100%);
  margin: 0 auto;
  padding: 18px 14px 34px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.back-link,
.sound-button {
  color: #ffe4ad;
  text-decoration: none;
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(24, 38, 22, 0.75);
  border: 1px solid rgba(255, 218, 130, 0.42);
  box-shadow: 0 0 18px rgba(255, 205, 110, 0.12), inset 0 1px 0 rgba(255,255,255,0.12);
  font-family: Georgia, serif;
  cursor: pointer;
}

.sound-controls {
  display: flex;
  gap: 8px;
  align-items: center;
}

#volumeSlider { width: 100px; }

.brand {
  color: #ffe8bd;
  font-size: 0.98rem;
  opacity: 0.95;
}

h1 {
  margin: 8px 0 4px;
  font-size: clamp(2.5rem, 7vw, 5.1rem);
  line-height: 1;
  color: #f7dfb2;
  text-shadow:
    0 0 8px rgba(255,223,160,0.3),
    0 4px 10px rgba(0,0,0,0.55);
  letter-spacing: 0.03em;
}

.intro {
  max-width: 820px;
  margin: 0 auto 18px;
  color: #fff0d8;
  font-size: clamp(1rem, 2vw, 1.18rem);
  line-height: 1.5;
  text-shadow: 0 2px 5px rgba(0,0,0,0.45);
}

.game-layout {
  display: grid;
  grid-template-columns: minmax(320px, 1fr) 300px;
  gap: 18px;
  align-items: stretch;
  margin-top: 12px;
}

.game-shell,
.side-panel,
.wood-panel,
.message-panel,
.helper-card {
  border-radius: 28px;
  border: 1px solid rgba(255, 211, 125, 0.42);
  background:
    linear-gradient(rgba(33, 25, 15, 0.86), rgba(20, 35, 20, 0.84)),
    radial-gradient(circle at top, rgba(255,225,155,0.16), transparent 36%);
  box-shadow:
    0 18px 38px rgba(0,0,0,0.35),
    inset 0 0 22px rgba(255,220,150,0.06);
  overflow: hidden;
  position: relative;
}

.game-shell::before,
.side-panel::before,
.wood-panel::before,
.message-panel::before,
.helper-card::before {
  content: "";
  position: absolute;
  inset: 8px;
  border-radius: 22px;
  border: 1px solid rgba(255, 220, 150, 0.16);
  pointer-events: none;
}

.game-shell { padding: 16px; }

.game-title-board {
  margin: 0 auto 12px;
  width: fit-content;
  max-width: 100%;
  padding: 14px 34px;
  border-radius: 24px;
  background: linear-gradient(rgba(76, 55, 29, 0.92), rgba(43, 59, 29, 0.85));
  border: 1px solid rgba(255,218,130,0.45);
  box-shadow: 0 0 22px rgba(255,210,120,0.14), inset 0 1px 0 rgba(255,255,255,0.12);
}

.game-title-board h2 {
  margin: 0;
  color: #f8dfaf;
  font-size: clamp(2rem, 5vw, 3.5rem);
  line-height: 1;
  text-shadow: 0 3px 8px rgba(0,0,0,0.42);
}

.game-title-board p {
  margin: 8px 0 0;
  color: #fff0d3;
  font-size: 1.05rem;
  line-height: 1.35;
}

.stats {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.stat-pill {
  flex: 1;
  min-width: 115px;
  padding: 9px 12px;
  border-radius: 999px;
  background: rgba(15, 33, 24, 0.86);
  border: 1px solid rgba(255, 218, 130, 0.38);
  color: #ffe6b3;
  font-size: 1rem;
  box-shadow: inset 0 0 15px rgba(255,220,150,0.05);
}

#game {
  position: relative;
  height: min(65vh, 650px);
  min-height: 560px;
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid rgba(255, 218, 130, 0.35);
  background:
    radial-gradient(circle at 50% 16%, rgba(70, 130, 120, 0.26), transparent 35%),
    linear-gradient(to top, rgba(18, 45, 25, 0.98), rgba(12, 30, 28, 0.88), rgba(5, 12, 22, 0.58));
  box-shadow:
    inset 0 -40px 70px rgba(0,0,0,0.4),
    inset 0 0 40px rgba(255,220,140,0.06);
  cursor: none;
  touch-action: none;
}

.moon {
  position: absolute;
  top: 26px;
  right: 38px;
  width: 74px;
  height: 74px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff8d8, #ecd276 66%, transparent 70%);
  box-shadow: 0 0 44px rgba(255,240,190,0.6);
  opacity: 0.75;
}

.lantern {
  position: absolute;
  width: 20px;
  height: 30px;
  border-radius: 8px 8px 12px 12px;
  background: radial-gradient(circle, #ffe391, #c87b32 60%, #48270f 70%);
  box-shadow: 0 0 25px rgba(255,190,80,0.65);
  top: 46%;
  opacity: 0.85;
}

.lantern.left { left: 7%; }
.lantern.right { right: 7%; }

.hill {
  position: absolute;
  left: -8%;
  bottom: -62px;
  width: 116%;
  height: 155px;
  background: #142a18;
  border-radius: 55% 55% 0 0;
  box-shadow: 0 -18px 36px rgba(0,0,0,0.26);
}

.tree {
  position: absolute;
  bottom: 75px;
  width: 22px;
  height: 140px;
  border-radius: 12px 12px 0 0;
  background: linear-gradient(#52301e, #1d110b);
  opacity: 0.74;
}

.tree::before {
  content: "";
  position: absolute;
  left: 50%;
  bottom: 58px;
  transform: translateX(-50%);
  width: 110px;
  height: 135px;
  background: radial-gradient(circle at 50% 18%, #426b48, #152818 70%);
  clip-path: polygon(50% 0, 100% 100%, 0 100%);
  border-radius: 18px;
}

.tree.t1 { left: 4%; transform: scale(1.15); }
.tree.t2 { left: 20%; transform: scale(0.82); opacity: 0.48; }
.tree.t3 { right: 20%; transform: scale(1.08); }
.tree.t4 { right: 4%; transform: scale(0.86); opacity: 0.5; }

.flower {
  position: absolute;
  bottom: 30px;
  font-size: 1.4rem;
  opacity: 0.8;
  filter: drop-shadow(0 0 7px rgba(255,205,120,0.22));
}

.flower.f1 { left: 12%; }
.flower.f2 { left: 28%; bottom: 52px; }
.flower.f3 { right: 17%; }
.flower.f4 { right: 35%; bottom: 46px; }

.play-overlay {
  position: absolute;
  inset: 0;
  z-index: 30;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(5, 12, 8, 0.32);
  backdrop-filter: blur(2px);
  transition: opacity 0.4s ease;
}

.play-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.big-play {
  font-size: 1.7rem;
  padding: 18px 36px;
  border-radius: 999px;
  background: linear-gradient(to bottom, #4d762e, #2e4b1f);
  border: 1px solid rgba(255,230,150,0.55);
  color: #ffe8b7;
  box-shadow: 0 0 28px rgba(255,215,130,0.3), inset 0 1px 0 rgba(255,255,255,0.18);
}

#fox {
  position: absolute;
  left: 50%;
  bottom: 28px;
  width: 170px;
  height: auto;
  transform: translateX(-50%);
  z-index: 12;
  filter:
    drop-shadow(0 18px 14px rgba(0,0,0,0.42))
    drop-shadow(0 0 18px rgba(255,195,95,0.48))
    brightness(1.12)
    contrast(1.08)
    saturate(1.1);
  transition: left 0.12s ease;
  pointer-events: none;
  user-select: none;
}

#fox.catch { animation: foxCatch 0.36s ease; }

@keyframes foxCatch {
  0% { transform: translateX(-50%) scale(1); }
  45% { transform: translateX(-50%) translateY(-8px) scale(1.08); }
  100% { transform: translateX(-50%) scale(1); }
}

.item {
  position: absolute;
  top: -90px;
  z-index: 10;
  user-select: none;
  pointer-events: none;
  animation-timing-function: linear;
  animation-fill-mode: forwards;
}

.fall-img {
  display: block;
  width: 100%;
  height: auto;
  object-fit: contain;
  pointer-events: none;
  user-select: none;
  filter:
    drop-shadow(0 0 12px rgba(255,220,130,0.45))
    brightness(1.08)
    contrast(1.08)
    saturate(1.08);
}

.dandelion-item {
  width: 78px;
  filter: drop-shadow(0 0 18px rgba(255,230,150,0.9));
  animation-name: dandelionFloat;
}

.dandelion-item::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 46px;
  width: 2px;
  height: 62px;
  transform: translateX(-50%);
  background: linear-gradient(to bottom, rgba(255,240,190,0.78), transparent);
  filter: blur(1px);
  opacity: 0.8;
  pointer-events: none;
}

@keyframes dandelionFloat {
  0% { transform: translateX(-50%) translateX(0) rotate(0deg) scale(1); }
  25% { transform: translateX(-50%) translateX(28px) rotate(8deg) scale(1.04); }
  50% { transform: translateX(-50%) translateX(-24px) rotate(-7deg) scale(1); }
  75% { transform: translateX(-50%) translateX(20px) rotate(6deg) scale(0.96); }
  100% { top: calc(100% + 110px); transform: translateX(-50%) translateX(-10px) rotate(-5deg) scale(0.92); }
}

.sheep-item {
  width: 92px;
  filter: drop-shadow(0 0 14px rgba(255,245,220,0.5)) drop-shadow(0 8px 10px rgba(0,0,0,0.28));
  animation-name: sheepTumble;
}

@keyframes sheepTumble {
  0% { transform: translateX(-50%) translateY(0) rotate(0deg) scale(1); }
  20% { transform: translateX(-50%) translateY(10px) rotate(72deg) scale(1.06); }
  40% { transform: translateX(-50%) translateY(-4px) rotate(144deg) scale(1); }
  60% { transform: translateX(-50%) translateY(12px) rotate(216deg) scale(1.06); }
  80% { transform: translateX(-50%) translateY(-2px) rotate(288deg) scale(1); }
  100% { top: calc(100% + 110px); transform: translateX(-50%) translateY(8px) rotate(360deg) scale(1.04); }
}

.rock-item {
  width: 86px;
  filter: drop-shadow(0 8px 12px rgba(0,0,0,0.55));
  animation-name: rockFall;
}

.rock-item::before,
.sheep-item::before {
  content: "";
  position: absolute;
  left: 50%;
  top: -48px;
  width: 4px;
  height: 78px;
  transform: translateX(-50%);
  background: linear-gradient(to bottom, rgba(255,210,110,0), rgba(255,210,110,0.72), transparent);
  filter: blur(1.5px);
  opacity: 0.75;
  z-index: -1;
}

@keyframes rockFall {
  0% { transform: translateX(-50%) rotate(0deg); }
  100% { top: calc(100% + 110px); transform: translateX(-50%) rotate(140deg); }
}

.side-panel {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.helper-card {
  padding: 18px 14px;
  min-height: 285px;
}

.speech {
  margin-bottom: 15px;
  padding: 12px;
  background: #fff0cf;
  color: #3b2416;
  border-radius: 20px;
}

.helper-fox-img {
  width: 180px;
  display: block;
  margin: auto;
}

.how-item {
  display: grid;
  grid-template-columns: 58px 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.how-icon-img {
  width: 58px;
}

.points { color: #bfff82; }
.bad-points { color: #ff9a80; }

</style>
</head>

<body>
<div class="sparkles"></div>

<main class="page">
  <div class="top-bar">
    <a class="back-link" href="index.html">← Back</a>
    <div class="sound-controls">
      <button id="muteBtn">🔊</button>
      <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.6">
    </div>
  </div>

  <h1>Foxfire Forest</h1>

  <section class="game-layout">
    <section class="game-shell">
      <div class="game-title-board">
        <h2>Foxfire Forest</h2>
        <p>Catch wishes and sheep, avoid rocks, and follow the glow.</p>
      </div>

      <div class="stats">
        <div class="stat-pill">Score: <span id="score">0</span></div>
        <div class="stat-pill">Hearts: <span id="hearts">3</span></div>
        <div class="stat-pill">Time: <span id="time">45</span></div>
      </div>

      <div id="game">
        <div class="moon"></div>
        <div class="lantern left"></div>
        <div class="lantern right"></div>
        <div class="tree t1"></div>
        <div class="tree t2"></div>
        <div class="tree t3"></div>
        <div class="tree t4"></div>
        <div class="flower f1">✿</div>
        <div class="flower f2">❀</div>
        <div class="flower f3">✿</div>
        <div class="flower f4">❀</div>
        <div class="hill"></div>

        <img id="fox" alt="Cute fox player">

        <div id="playOverlay" class="play-overlay">
          <button class="big-play" onclick="startGame()">🐾 Play Game 🐾</button>
        </div>
      </div>
    </section>

    <aside class="side-panel">
      <div class="helper-card">
        <div class="speech" id="foxSpeech">Catch the wishes ✨</div>
        <img class="helper-fox-img" alt="Friendly fox helper">
      </div>

      <div class="wood-panel">
        <h2>How to Play</h2>

        <div class="how-item">
          <img class="how-icon-img" data-src="dandelion-new.png" alt="Dandelion wish">
          <div><strong>Dandelion</strong><span class="points">+10</span></div>
        </div>

        <div class="how-item">
          <img class="how-icon-img" data-src="sheep-new.png" alt="Fluffy sheep">
          <div><strong>Sheep</strong><span class="points">+50</span></div>
        </div>

        <div class="how-item">
          <img class="how-icon-img" data-src="rock-new.png" alt="Falling rock">
          <div><strong>Rock</strong><span class="bad-points">-1</span></div>
        </div>
      </div>
    </aside>
  </section>
</main>

<script>
const game = document.getElementById("game");
const fox = document.getElementById("fox");
const helperFox = document.querySelector(".helper-fox-img");
const playOverlay = document.getElementById("playOverlay");
const scoreEl = document.getElementById("score");
const heartsEl = document.getElementById("hearts");
const timeEl = document.getElementById("time");
const foxSpeech = document.getElementById("foxSpeech");
const muteBtn = document.getElementById("muteBtn");
const volumeSlider = document.getElementById("volumeSlider");

let score = 0;
let hearts = 3;
let timeLeft = 45;
let foxPercent = 50;
let gameRunning = false;
let spawnTimer = null;
let countdownTimer = null;
let soundOn = true;
let masterVolume = 0.6;
let moveLeft = false;
let moveRight = false;

const cleanCache = {};

function cleanImage(src, callback) {
  if (cleanCache[src]) {
    callback(cleanCache[src]);
    return;
  }

  const img = new Image();
  img.src = src;

  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;

    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      if (r > 205 && g > 205 && b > 205) {
        data[i + 3] = 0;
      }
    }

    ctx.putImageData(imageData, 0, 0);
    const cleaned = canvas.toDataURL("image/png");
    cleanCache[src] = cleaned;
    callback(cleaned);
  };

  img.onerror = () => callback(src);
}

function setCleanImage(el, src) {
  cleanImage(src, cleaned => {
    el.src = cleaned;
  });
}

setCleanImage(fox, "foxy-player-new.png");
setCleanImage(helperFox, "foxy-helper-new.png");

document.querySelectorAll(".how-icon-img").forEach(icon => {
  setCleanImage(icon, icon.dataset.src);
});

const sounds = {
  bg: new Audio("forest-ambience.mp3"),
  catch: new Audio("sparkle-chime.mp3"),
  miss: new Audio("soft-poof.mp3"),
  special: new Audio("magical-shimmer.mp3"),
  sheep: new Audio("sheep-baa.mp3")
};

sounds.bg.loop = true;

const baseVolumes = {
  bg: 0.28,
  catch: 0.55,
  miss: 0.45,
  special: 0.7,
  sheep: 0.65
};

function updateVolumes() {
  sounds.bg.volume = soundOn ? baseVolumes.bg * masterVolume : 0;
  sounds.catch.volume = soundOn ? baseVolumes.catch * masterVolume : 0;
  sounds.miss.volume = soundOn ? baseVolumes.miss * masterVolume : 0;
  sounds.special.volume = soundOn ? baseVolumes.special * masterVolume : 0;
  sounds.sheep.volume = soundOn ? baseVolumes.sheep * masterVolume : 0;
}

function playSound(sound) {
  if (!soundOn) return;
  const s = sound.cloneNode();
  s.volume = sound.volume;
  s.play().catch(() => {});
}

updateVolumes();

muteBtn.addEventListener("click", () => {
  soundOn = !soundOn;
  muteBtn.textContent = soundOn ? "🔊" : "🔇";
  updateVolumes();

  if (!soundOn) {
    sounds.bg.pause();
  } else if (gameRunning) {
    sounds.bg.play().catch(() => {});
  }
});

volumeSlider.addEventListener("input", () => {
  masterVolume = Number(volumeSlider.value);
  updateVolumes();
});

function startGame() {
  clearInterval(spawnTimer);
  clearInterval(countdownTimer);
  document.querySelectorAll(".item, .sparkle-burst, .floating-score").forEach(el => el.remove());

  score = 0;
  hearts = 3;
  timeLeft = 45;
  foxPercent = 50;
  gameRunning = true;

  scoreEl.textContent = score;
  heartsEl.textContent = hearts;
  timeEl.textContent = timeLeft;
  fox.style.left = foxPercent + "%";
  foxSpeech.textContent = "Catch the glowing wishes, little one. ✨";

  playOverlay.classList.add("hidden");

  sounds.bg.currentTime = 0;
  sounds.bg.play().catch(() => {});

  spawnTimer = setInterval(spawnItem, 850);
  countdownTimer = setInterval(() => {
    if (!gameRunning) return;
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) finishGame();
  }, 1000);

  requestAnimationFrame(gameLoop);
}

function spawnItem() {
  if (!gameRunning) return;

  const item = document.createElement("div");
  item.classList.add("item");

  const img = document.createElement("img");
  img.className = "fall-img";

  const chance = Math.random();

  if (chance < 0.58) {
    item.dataset.type = "dandelion";
    item.classList.add("dandelion-item");
    setCleanImage(img, "dandelion-new.png");
    item.style.animationDuration = "5.6s";
  } else if (chance < 0.82) {
    item.dataset.type = "sheep";
    item.classList.add("sheep-item");
    setCleanImage(img, "sheep-new.png");
    item.style.animationDuration = "5.2s";
    playSound(sounds.sheep);
  } else {
    item.dataset.type = "rock";
    item.classList.add("rock-item");
    setCleanImage(img, "rock-new.png");
    item.style.animationDuration = "4.7s";
  }

  item.appendChild(img);
  item.style.left = Math.random() * 86 + 7 + "%";
  game.appendChild(item);

  item.addEventListener("animationend", () => {
    if (item.parentElement) item.remove();
  });
}

function gameLoop() {
  if (!gameRunning) return;

  if (moveLeft) foxPercent -= 1.1;
  if (moveRight) foxPercent += 1.1;

  foxPercent = Math.max(8, Math.min(92, foxPercent));
  fox.style.left = foxPercent + "%";

  checkCollisions();
  requestAnimationFrame(gameLoop);
}

function checkCollisions() {
  const foxRect = fox.getBoundingClientRect();
  document.querySelectorAll(".item").forEach(item => {
    const itemRect = item.getBoundingClientRect();

    if (
      itemRect.bottom > foxRect.top + 28 &&
      itemRect.top < foxRect.bottom - 12 &&
      itemRect.right > foxRect.left + 28 &&
      itemRect.left < foxRect.right - 28
    ) {
      catchItem(item);
    }
  });
}

function catchItem(item) {
  if (!item.parentElement) return;

  const type = item.dataset.type;

  if (type === "dandelion") {
    score += 10;
    playSound(sounds.catch);
    foxSpeech.textContent = "A wish was caught! ✨";
  }

  if (type === "sheep") {
    score += 50;
    playSound(sounds.sheep);
    playSound(sounds.special);
    foxSpeech.textContent = "You caught a fluffy sheep! 🐑";
  }

  if (type === "rock") {
    hearts--;
    playSound(sounds.miss);
    foxSpeech.textContent = "Careful, little fox! Dodge the rocks.";

    if (hearts <= 0) finishGame();
  }

  scoreEl.textContent = score;
  heartsEl.textContent = hearts;

  fox.classList.add("catch");
  setTimeout(() => fox.classList.remove("catch"), 360);

  item.remove();
}

function finishGame() {
  gameRunning = false;
  clearInterval(spawnTimer);
  clearInterval(countdownTimer);
  sounds.bg.pause();

  document.querySelectorAll(".item").forEach(el => el.remove());

  foxSpeech.textContent = "The forest is resting now. Press play to try again. 🌙";
  playOverlay.classList.remove("hidden");
  playOverlay.innerHTML = `<button class="big-play" onclick="startGame()">🌙 Play Again — Score ${score} 🌙</button>`;
}

function moveFox(clientX) {
  const rect = game.getBoundingClientRect();
  foxPercent = ((clientX - rect.left) / rect.width) * 100;
  foxPercent = Math.max(8, Math.min(92, foxPercent));
  fox.style.left = foxPercent + "%";
}

game.addEventListener("mousemove", e => moveFox(e.clientX));

game.addEventListener("touchmove", e => {
  if (e.touches.length > 0) moveFox(e.touches[0].clientX);
}, { passive: true });

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") moveLeft = true;
  if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") moveRight = true;
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") moveLeft = false;
  if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") moveRight = false;
});
</script>
</body>
</html>
