<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxfire Forest Game</title>

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  color:#f5e9c8;
  text-align:center;
  background:
    linear-gradient(rgba(16,22,16,0.7), rgba(16,22,16,0.9)),
    url("forest-bg.jpg");
  background-size:cover;
}

/* Game area */
#game{
  position:relative;
  width:100%;
  height:80vh;
  overflow:hidden;
}

/* Fox */
#fox{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:60px;
}

/* Falling items */
.item{
  position:absolute;
  top:-50px;
  font-size:30px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{ top:100%; }
}

/* Score */
#score{
  margin:10px;
  font-size:20px;
}

/* Message */
#messageBox{
  display:none;
  margin:20px auto;
  max-width:500px;
  padding:20px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.2);
}

button{
  padding:10px 20px;
  border:none;
  border-radius:999px;
  background:#c99278;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<a href="index.html" style="position:absolute;left:20px;top:20px;color:#fff;">
← Return to Forest
</a>

<h1>🦊 Foxfire Forest</h1>
<div id="score">Score: 0</div>

<div id="game">
  <div id="fox">🦊</div>
</div>

<div id="messageBox">
  <h2 id="msgTitle"></h2>
  <p id="msgText"></p>
  <button onclick="restart()">Play Again</button>
</div>

<script>
let score = 0;
let gameRunning = true;

const messages = [
  {title:"The Gentle Path", text:"You do not need to rush. What is meant for you will not pass you by."},
  {title:"Fox Wisdom", text:"Trust your instincts. You already know the way."},
  {title:"Soft Courage", text:"Even the smallest steps forward are acts of bravery."},
  {title:"Forest Whisper", text:"Something quiet is guiding you. Listen closely."},
  {title:"Hidden Magic", text:"There is more unfolding than you can see right now."}
];

// Move fox
document.addEventListener("mousemove", e=>{
  document.getElementById("fox").style.left = e.clientX + "px";
});

// Spawn items
setInterval(()=>{
  if(!gameRunning) return;

  let item = document.createElement("div");
  item.classList.add("item");

  let rand = Math.random();

  if(rand < 0.6){
    item.innerHTML = "🌼"; // dandelion
    item.dataset.type = "good";
  } else if(rand < 0.85){
    item.innerHTML = "🐑"; // sheep
    item.dataset.type = "bonus";
  } else {
    item.innerHTML = "🪨"; // rock
    item.dataset.type = "bad";
  }

  item.style.left = Math.random()*window.innerWidth + "px";
  item.style.animationDuration = (3 + Math.random()*2) + "s";

  document.getElementById("game").appendChild(item);

  // Collision
  let check = setInterval(()=>{
    if(!gameRunning){ clearInterval(check); return; }

    let fox = document.getElementById("fox").getBoundingClientRect();
    let it = item.getBoundingClientRect();

    if(!(it.right < fox.left || it.left > fox.right || it.bottom < fox.top || it.top > fox.bottom)){
      if(item.dataset.type === "good") score += 1;
      if(item.dataset.type === "bonus") score += 3;
      if(item.dataset.type === "bad") score -= 2;

      document.getElementById("score").innerText = "Score: " + score;

      item.remove();
      clearInterval(check);
    }
  },50);

  item.addEventListener("animationend", ()=> item.remove());

},700);

// End game
setTimeout(()=>{
  gameRunning = false;

  let msg = messages[Math.floor(Math.random()*messages.length)];

  document.getElementById("msgTitle").innerText = msg.title;
  document.getElementById("msgText").innerText = msg.text;

  document.getElementById("messageBox").style.display = "block";

},30000);

function restart(){
  location.reload();
}
</script>

</body>
</html>
