<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Foxfire Forest Drop Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  overflow: hidden;
  font-family: Georgia, serif;
  background: #102815;
  color: white;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at top, rgba(255, 232, 145, 0.18), transparent 35%),
    linear-gradient(#0b2013, #23441f 70%, #122d14);
}

#scoreBoard {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 20;
  font-size: 20px;
  background: rgba(0,0,0,0.35);
  padding: 10px 15px;
  border-radius: 16px;
}

#soundPanel {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 30;
  background: rgba(0,0,0,0.35);
  padding: 10px 14px;
  border-radius: 16px;
  display: flex;
  gap: 10px;
  align-items: center;
}

#volumeSlider {
  width: 100px;
}

button {
  font-family: Georgia, serif;
  font-size: 18px;
  padding: 9px 18px;
  border: none;
  border-radius: 999px;
  background: #ffd86b;
  color: #3b2600;
  cursor: pointer;
  box-shadow: 0 0 18px rgba(255,216,107,0.55);
}

#startScreen {
  position: absolute;
  inset: 0;
  z-index: 50;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 25px;
}

#startBox {
  max-width: 430px;
  background: rgba(18, 43, 25, 0.96);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 26px;
  padding: 30px;
  box-shadow: 0 0 45px rgba(255, 225, 145, 0.24);
}

#fox {
  position: absolute;
  bottom: 18px;
  left: 50%;
  width: 120px;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
  filter: drop-shadow(0 0 16px rgba(255, 170, 70, 0.95));
}

.falling {
  position: absolute;
  width: 64px;
  height: 64px;
  object-fit: contain;
  z-index: 5;
  animation: itemGlow 1.4s infinite alternate;
}

.special {
  width: 76px;
  height: 76px;
  filter: drop-shadow(0 0 20px gold);
}

.sheep {
  width: 78px;
  height: 78px;
  filter: drop-shadow(0 0 16px white);
}

@keyframes itemGlow {
  from { filter: drop-shadow(0 0 5px rgba(255,255,180,0.5)); }
  to { filter: drop-shadow(0 0 17px rgba(255,255,180,0.95)); }
}

.sparkle {
  position: absolute;
  width: 8px;
  height: 8px;
  background: #fff3ad;
  border-radius: 50%;
  pointer-events: none;
  z-index: 15;
  box-shadow: 0 0 12px #fff3ad;
  animation: sparkleFade 700ms forwards;
}

@keyframes sparkleFade {
  from {
    opacity: 1;
    transform: scale(1);
  }
  to {
    opacity: 0;
    transform: scale(3.2) translateY(-25px);
  }
}

.magicRing {
  position: absolute;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,240,160,0.9);
  border-radius: 50%;
  pointer-events: none;
  z-index: 14;
  animation: ringFade 650ms forwards;
}

@keyframes ringFade {
  to {
    opacity: 0;
    transform: scale(4);
  }
}
</style>
</head>

<body>

<div id="game">

  <div id="scoreBoard">
    Score: <span id="score">0</span> |
    Missed: <span id="missed">0</span>
  </div>

  <div id="soundPanel">
    <button id="muteBtn">🔊</button>
    <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.6">
  </div>

  <div id="startScreen">
    <div id="startBox">
      <h1>🦊 Foxfire Forest</h1>
      <p>Catch the glowing dandelions and magical treasures.</p>
      <p>Listen for sheep arriving in the enchanted forest.</p>
      <button id="startBtn">Start Game</button>
    </div>
  </div>

  <img id="fox" src="foxy-player-new.png" alt="fox">

</div>

<script>
const game = document.getElementById("game");
const fox = document.getElementById("fox");
const scoreText = document.getElementById("score");
const missedText = document.getElementById("missed");
const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const muteBtn = document.getElementById("muteBtn");
const volumeSlider = document.getElementById("volumeSlider");

let score = 0;
let missed = 0;
let foxX = window.innerWidth / 2;
let gameRunning = false;
let dropInterval = null;
let moveLeft = false;
let moveRight = false;
let muted = false;
let masterVolume = 0.6;

const sounds = {
  bg: new Audio("forest-ambience.mp3"),
  catch: new Audio("sparkle-chime.mp3"),
  miss: new Audio("soft-poof.mp3"),
  special: new Audio("magical-shimmer.mp3"),
  sheep: new Audio("sheep-baa.mp3")
};

sounds.bg.loop = true;

const baseVolumes = {
  bg: 0.35,
  catch: 0.55,
  miss: 0.45,
  special: 0.7,
  sheep: 0.65
};

function updateVolumes() {
  sounds.bg.volume = muted ? 0 : baseVolumes.bg * masterVolume;
  sounds.catch.volume = muted ? 0 : baseVolumes.catch * masterVolume;
  sounds.miss.volume = muted ? 0 : baseVolumes.miss * masterVolume;
  sounds.special.volume = muted ? 0 : baseVolumes.special * masterVolume;
  sounds.sheep.volume = muted ? 0 : baseVolumes.sheep * masterVolume;
}

updateVolumes();

volumeSlider.addEventListener("input", () => {
  masterVolume = Number(volumeSlider.value);
  updateVolumes();
});

muteBtn.addEventListener("click", () => {
  muted = !muted;
  muteBtn.textContent = muted ? "🔇" : "🔊";
  updateVolumes();

  if (muted) {
    sounds.bg.pause();
  } else if (gameRunning) {
    sounds.bg.play().catch(() => {});
  }
});

function playLayeredSound(originalSound) {
  if (muted) return;

  const layered = originalSound.cloneNode();
  layered.volume = originalSound.volume;
  layered.play().catch(() => {});
}

function startGame() {
  score = 0;
  missed = 0;
  scoreText.textContent = score;
  missedText.textContent = missed;

  document.querySelectorAll(".falling, .sparkle, .magicRing").forEach(el => el.remove());

  startScreen.style.display = "none";
  gameRunning = true;

  sounds.bg.currentTime = 0;
  sounds.bg.play().catch(() => {});

  clearInterval(dropInterval);
  dropInterval = setInterval(createFallingItem, 850);

  requestAnimationFrame(gameLoop);
}

startBtn.addEventListener("click", startGame);

function createFallingItem() {
  if (!gameRunning) return;

  const item = document.createElement("img");
  item.classList.add("falling");

  const chance = Math.random();

  if (chance < 0.12) {
    item.src = "sheep-new.png";
    item.dataset.type = "sheep";
    item.classList.add("sheep");

    playLayeredSound(sounds.sheep);
    entranceSparkles(window.innerWidth * Math.random(), 30);

  } else if (chance < 0.28) {
    item.src = "dandelion-new.png";
    item.dataset.type = "special";
    item.classList.add("special");
  } else {
    item.src = "dandelion.png";
    item.dataset.type = "normal";
  }

  item.style.left = Math.random() * (window.innerWidth - 90) + "px";
  item.style.top = "-90px";

  game.appendChild(item);
}

function gameLoop() {
  if (!gameRunning) return;

  moveFox();
  moveItems();

  requestAnimationFrame(gameLoop);
}

function moveFox() {
  if (moveLeft) foxX -= 8;
  if (moveRight) foxX += 8;

  foxX = Math.max(55, Math.min(window.innerWidth - 55, foxX));
  fox.style.left = foxX + "px";

  if (moveLeft || moveRight) {
    createSparkle(foxX + random(-22, 22), window.innerHeight - 55 + random(-10, 10));
  }
}

function moveItems() {
  const items = document.querySelectorAll(".falling");

  items.forEach(item => {
    let y = parseFloat(item.style.top);
    y += item.dataset.type === "sheep" ? 3.5 : 4.7;
    item.style.top = y + "px";

    const itemRect = item.getBoundingClientRect();
    const foxRect = fox.getBoundingClientRect();

    if (isColliding(itemRect, foxRect)) {
      catchItem(item);
      item.remove();
      return;
    }

    if (y > window.innerHeight + 20) {
      missItem(item);
      item.remove();
    }
  });
}

function isColliding(a, b) {
  return !(
    a.bottom < b.top ||
    a.top > b.bottom ||
    a.right < b.left ||
    a.left > b.right
  );
}

function catchItem(item) {
  const rect = item.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;

  if (item.dataset.type === "special") {
    score += 5;
    playLayeredSound(sounds.special);
    burstSparkles(x, y, 24);
    magicRing(x, y);
  } else if (item.dataset.type === "sheep") {
    score += 2;
    playLayeredSound(sounds.sheep);
    burstSparkles(x, y, 18);
    magicRing(x, y);
  } else {
    score += 1;
    playLayeredSound(sounds.catch);
    burstSparkles(x, y, 14);
  }

  scoreText.textContent = score;
}

function missItem(item) {
  missed += 1;
  missedText.textContent = missed;

  playLayeredSound(sounds.miss);

  const rect = item.getBoundingClientRect();
  burstSparkles(rect.left + rect.width / 2, window.innerHeight - 30, 8);

  if (missed >= 10) {
    endGame();
  }
}

function endGame() {
  gameRunning = false;
  clearInterval(dropInterval);

  sounds.bg.pause();

  document.querySelectorAll(".falling").forEach(el => el.remove());

  startScreen.style.display = "flex";
  document.getElementById("startBox").innerHTML = `
    <h1>Game Over 🦊</h1>
    <p>Your score was <strong>${score}</strong>.</p>
    <p>The forest is glowing softly, waiting for you to try again.</p>
    <button onclick="location.reload()">Play Again</button>
  `;
}

function createSparkle(x, y) {
  const sparkle = document.createElement("div");
  sparkle.className = "sparkle";
  sparkle.style.left = x + "px";
  sparkle.style.top = y + "px";
  game.appendChild(sparkle);

  setTimeout(() => sparkle.remove(), 750);
}

function burstSparkles(x, y, amount) {
  for (let i = 0; i < amount; i++) {
    createSparkle(
      x + random(-32, 32),
      y + random(-32, 32)
    );
  }
}

function entranceSparkles(x, y) {
  for (let i = 0; i < 12; i++) {
    createSparkle(
      x + random(-40, 40),
      y + random(-20, 40)
    );
  }
}

function magicRing(x, y) {
  const ring = document.createElement("div");
  ring.className = "magicRing";
  ring.style.left = (x - 10) + "px";
  ring.style.top = (y - 10) + "px";
  game.appendChild(ring);

  setTimeout(() => ring.remove(), 700);
}

function random(min, max) {
  return Math.random() * (max - min) + min;
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") moveLeft = true;
  if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") moveRight = true;
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") moveLeft = false;
  if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") moveRight = false;
});

game.addEventListener("mousemove", e => {
  foxX = e.clientX;
});

game.addEventListener("touchmove", e => {
  foxX = e.touches[0].clientX;
});
</script>

</body>
</html>
