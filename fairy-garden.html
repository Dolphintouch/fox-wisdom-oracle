<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairy Garden Keeper</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Georgia, serif;
  background:black;
}

/* GAME */
#game{
  width:100vw;
  height:100vh;
  background:url("level1-whispering-meadow.png") center/cover no-repeat;
  position:relative;
  overflow:hidden;
}

/* START SCREEN (CLEAN VERSION) */
#startScreen{
  position:absolute;
  inset:0;
  background:url("fairy-start.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-bottom:50px;
  z-index:100;
  transition:opacity 1.2s ease;
}

#startBtn{
  padding:16px 40px;
  font-size:18px;
  border-radius:30px;
  border:none;
  background:linear-gradient(#fff3a8,#ffd45a);
  color:#4a3210;
  font-weight:bold;
  cursor:pointer;
  box-shadow:
    0 0 18px gold,
    0 0 35px rgba(255,230,120,.75);
}

/* FAIRY */
#fairy{
  position:absolute;
  width:220px;
  height:260px;
  background:url("fairy-idle.png") center/contain no-repeat;
  filter:drop-shadow(0 0 15px gold);
}

/* UI */
#ui{
  position:absolute;
  top:15px;
  left:15px;
  color:#fff6c9;
  background:rgba(0,0,0,.5);
  padding:12px;
  border-radius:15px;
}

#message{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.5);
  padding:12px 20px;
  border-radius:20px;
  color:#fff4c2;
}

#singBtn{
  position:absolute;
  right:20px;
  bottom:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="game">
  <div id="fairy"></div>

  <div id="ui">
    Points: <span id="score">0</span><br>
    <button id="soundBtn">Sound: Off</button>
  </div>

  <div id="message">The meadow is waiting for your song...</div>
  <button id="singBtn">✨ Sing ✨</button>
</div>

<div id="startScreen">
  <button id="startBtn">✨ Enter the Fairy Garden ✨</button>
</div>

<script>
const fairy = document.getElementById("fairy");
const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const soundBtn = document.getElementById("soundBtn");
const singBtn = document.getElementById("singBtn");
const scoreBox = document.getElementById("score");

let x = window.innerWidth * 0.45;
let y = window.innerHeight * 0.6;
let score = 0;
let soundOn = false;

/* SOUNDS */
const sounds = {
  fairy: new Audio("fairy-bells.mp3"),
  grow: new Audio("plant-grow.mp3"),
  music: new Audio("fairy-music.mp3")
};

sounds.music.loop = true;
sounds.music.volume = 0.2;

function playSound(s){
  if(!soundOn) return;
  s.currentTime = 0;
  s.play().catch(()=>{});
}

/* START */
startBtn.onclick = () => {
  soundOn = true;
  playSound(sounds.fairy);
  sounds.music.play().catch(()=>{});

  startScreen.style.opacity = "0";
  setTimeout(()=>startScreen.style.display="none",1000);

  update();
};

/* SOUND BUTTON */
soundBtn.onclick = () => {
  soundOn = !soundOn;
  soundBtn.innerText = soundOn ? "Sound: On" : "Sound: Off";

  if(soundOn){
    sounds.music.play().catch(()=>{});
  } else {
    sounds.music.pause();
  }
};

/* FAIRY POSITION */
function update(){
  fairy.style.left = x + "px";
  fairy.style.top = y + "px";
}

/* MOVEMENT */
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight") x+=15;
  if(e.key==="ArrowLeft") x-=15;
  if(e.key==="ArrowUp") y-=15;
  if(e.key==="ArrowDown") y+=15;

  x=Math.max(0,Math.min(window.innerWidth-200,x));
  y=Math.max(0,Math.min(window.innerHeight-200,y));

  update();
});

/* SING */
function sing(){
  fairy.style.backgroundImage = 'url("fairy-fly.png")'; // clean image (no white box)
  playSound(sounds.fairy);
  playSound(sounds.grow);

  score+=10;
  scoreBox.innerText=score;

  setTimeout(()=>{
    fairy.style.backgroundImage = 'url("fairy-idle.png")';
  },600);
}

singBtn.onclick = sing;

update();
</script>

</body>
</html>
