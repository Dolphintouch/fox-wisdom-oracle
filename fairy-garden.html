<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairy Garden</title>

<style>
body{margin:0;overflow:hidden;font-family:Georgia}

#startScreen{
  position:absolute;
  width:100%;
  height:100%;
  background:url("fairy-start.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:flex-end;
}

#startBtn{
  margin-bottom:60px;
  padding:15px 30px;
  font-size:20px;
  border-radius:20px;
  border:none;
  background:gold;
  cursor:pointer;
}

#game{
  display:none;
  width:100vw;
  height:100vh;
  background:url("level1-whispering-meadow.png") center/cover no-repeat;
  position:relative;
}

#fairy{
  position:absolute;
  width:130px;
  height:130px;
  left:45%;
  top:60%;
  background:url("fairy-idle.png") center/contain no-repeat;
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
}

button{
  position:absolute;
  bottom:20px;
  right:20px;
  padding:10px 20px;
}
</style>
</head>

<body>

<div id="startScreen">
  <button id="startBtn">Begin</button>
</div>

<div id="game">
  <div id="fairy"></div>

  <div id="ui">
    Points: <span id="score">0</span>
  </div>

  <button onclick="sing()">Sing</button>
</div>

<script>
let fairy=document.getElementById("fairy");
let score=0;
let x=window.innerWidth*0.45;
let y=window.innerHeight*0.6;

function sprite(img){
  fairy.style.backgroundImage=`url("${img}")`;
}

function update(){
  fairy.style.left=x+"px";
  fairy.style.top=y+"px";
}

function sing(){
  sprite("fairy-sing.png");
  score+=10;
  document.getElementById("score").innerText=score;

  setTimeout(()=>{
    if(score>50){
      sprite("fairy-happy.png");
    } else {
      sprite("fairy-idle.png");
    }
  },800);
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){x+=10;sprite("fairy-run.png")}
  if(e.key==="ArrowLeft"){x-=10;sprite("fairy-run.png")}
  if(e.key==="ArrowUp"){y-=10;sprite("fairy-jump.png")}
  if(e.key==="ArrowDown"){y+=10;sprite("fairy-fly.png")}
  if(e.key==="s"){sing()}
  update();
});

document.getElementById("startBtn").onclick=()=>{
  document.getElementById("startScreen").style.display="none";
  document.getElementById("game").style.display="block";
};

update();
</script>

</body>
</html>
