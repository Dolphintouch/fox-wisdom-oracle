<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairy Garden Keeper</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Georgia, serif;
  background:black;
}

/* START SCREEN */
#startScreen{
  position:absolute;
  inset:0;
  background:url("fairy-start.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:100;
}

#startScreen::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.25);
}

#startContent{
  position:relative;
  text-align:center;
  z-index:10;
  color:white;
  padding:25px;
  border-radius:25px;
  background:rgba(0,0,0,0.18);
  box-shadow:0 0 35px rgba(255,220,120,.45);
}

#title{
  font-size:48px;
  color:#fff2b5;
  text-shadow:
    0 0 10px gold,
    0 0 25px rgba(255,220,120,.8);
  margin-bottom:18px;
}

#startText{
  font-size:22px;
  color:#fff6c9;
  text-shadow:0 0 10px gold;
  margin-bottom:35px;
  animation:glow 2.5s ease-in-out infinite alternate;
}

#startBtn{
  padding:15px 35px;
  font-size:20px;
  border-radius:25px;
  border:none;
  background:linear-gradient(gold,#ffd86b);
  cursor:pointer;
  box-shadow:0 0 18px gold;
  transition:.3s;
  font-weight:bold;
}

#startBtn:hover{
  transform:scale(1.1);
  box-shadow:0 0 28px gold;
}

@keyframes glow{
  from{opacity:.72}
  to{opacity:1}
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  background:url("level1-whispering-meadow.png") center/cover no-repeat;
  position:relative;
  overflow:hidden;
}

/* FAIRY */
#fairy{
  position:absolute;
  width:155px;
  height:185px;
  background:url("fairy-idle.png") center/contain no-repeat;
  filter:
    drop-shadow(0 0 10px gold)
    drop-shadow(0 0 22px rgba(255,230,120,.75))
    brightness(1.12)
    contrast(1.18);
  z-index:10;
  transition:filter .2s ease;
}

#fairy.singing{
  filter:
    drop-shadow(0 0 18px gold)
    drop-shadow(0 0 35px rgba(255,240,150,.95))
    brightness(1.25)
    contrast(1.18);
}

/* UI */
#ui{
  position:absolute;
  top:15px;
  left:15px;
  color:#fff6c9;
  background:rgba(0,0,0,.5);
  padding:12px 15px;
  border-radius:15px;
  z-index:30;
  box-shadow:0 0 18px rgba(255,230,120,.35);
  line-height:1.5;
}

#message{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:#fff4c2;
  background:rgba(0,0,0,.48);
  padding:12px 20px;
  border-radius:20px;
  z-index:30;
  text-align:center;
  box-shadow:0 0 18px rgba(255,230,120,.35);
  max-width:85vw;
}

#singBtn{
  position:absolute;
  right:20px;
  bottom:22px;
  padding:13px 24px;
  border-radius:25px;
  border:none;
  background:#ffe98a;
  font-weight:bold;
  font-size:17px;
  z-index:40;
  box-shadow:0 0 18px gold;
  cursor:pointer;
}

#soundBtn{
  margin-top:8px;
  padding:8px 14px;
  border-radius:18px;
  border:none;
  background:#d9fff1;
  font-weight:bold;
  cursor:pointer;
}

/* PLANTS */
.plantSprite{
  position:absolute;
  width:95px;
  height:95px;
  object-fit:contain;
  filter:drop-shadow(0 0 14px #eaff8a);
  animation:plantGrow .8s ease forwards;
  z-index:7;
}

.plantFallback{
  position:absolute;
  font-size:58px;
  filter:drop-shadow(0 0 14px #eaff8a);
  animation:plantGrow .8s ease forwards;
  z-index:7;
}

@keyframes plantGrow{
  from{transform:scale(.2);opacity:.2}
  to{transform:scale(1);opacity:1}
}

/* EFFECTS */
.note{
  position:absolute;
  font-size:32px;
  color:#fff6a8;
  text-shadow:0 0 12px gold;
  animation:noteFloat 1.6s ease-out forwards;
  z-index:20;
}

.sparkle{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 14px white;
  animation:sparkleFloat 1s ease-out forwards;
  z-index:20;
}

.bird{
  position:absolute;
  font-size:34px;
  animation:birdFloat 3s ease forwards;
  z-index:18;
}

.fairyGlow{
  position:absolute;
  width:170px;
  height:170px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,245,170,.45), transparent 70%);
  pointer-events:none;
  animation:glowBurst 1s ease-out forwards;
  z-index:8;
}

@keyframes noteFloat{
  to{transform:translateY(-90px);opacity:0}
}

@keyframes sparkleFloat{
  to{transform:translateY(-45px) scale(2);opacity:0}
}

@keyframes birdFloat{
  to{transform:translateX(120px) translateY(-20px);opacity:0}
}

@keyframes glowBurst{
  from{transform:scale(.4);opacity:1}
  to{transform:scale(1.6);opacity:0}
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div id="startContent">
    <div id="title">Fairy Garden Keeper</div>
    <div id="startText">
      The meadow is sleeping beneath the moonlight.<br>
      Wake it with soft fairy bells.
    </div>
    <button id="startBtn">Begin</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="fairy"></div>

  <div id="ui">
    Points: <span id="score">0</span><br>
    Move: Arrow Keys<br>
    Sing: S or button<br>
    <button id="soundBtn">Sound: Off</button>
  </div>

  <div id="message">The meadow is waiting for your song...</div>

  <button id="singBtn">✨ Sing ✨</button>
</div>

<script>
const fairy = document.getElementById("fairy");
const game = document.getElementById("game");
const scoreBox = document.getElementById("score");
const message = document.getElementById("message");
const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const singBtn = document.getElementById("singBtn");
const soundBtn = document.getElementById("soundBtn");

let score = 0;
let x = window.innerWidth * 0.45;
let y = window.innerHeight * 0.58;
let facing = 1;
let singing = false;
let plantStage = 0;
let soundOn = false;

/* YOUR UPLOADED SOUNDS */
const sounds = {
  fairy: new Audio("fairy-bells.mp3"),
  grow: new Audio("plant-grow.mp3"),
  bloom: new Audio("plant-bloom.mp3"),
  sparkle: new Audio("magic-sparkle.mp3")
};

sounds.fairy.volume = 0.55;
sounds.grow.volume = 0.5;
sounds.bloom.volume = 0.65;
sounds.sparkle.volume = 0.45;

function unlockSounds(){
  Object.values(sounds).forEach(s => {
    s.play().then(() => {
      s.pause();
      s.currentTime = 0;
    }).catch(() => {});
  });
}

function playSound(sound){
  if(!soundOn) return;
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

soundBtn.onclick = () => {
  soundOn = !soundOn;
  soundBtn.innerText = soundOn ? "Sound: On" : "Sound: Off";
  unlockSounds();
};

document.addEventListener("click", unlockSounds, { once:true });
document.addEventListener("touchstart", unlockSounds, { once:true });

/* SPRITES */
function sprite(img){
  fairy.style.backgroundImage = `url("${img}")`;
}

function update(){
  fairy.style.left = x + "px";
  fairy.style.top = y + "px";
  fairy.style.transform = `scaleX(${facing})`;
}

/* PLANTS */
const plantImages = [
  "plant-seedling.png",
  "plant-small.png",
  "plant-growing.png",
  "plant-bloom.png",
  "plant-glow-bloom.png"
];

function growPlant(){
  const img = plantImages[Math.min(plantStage, plantImages.length - 1)];

  const plant = document.createElement("img");
  plant.src = img;
  plant.className = "plantSprite";
  plant.style.left = (x + Math.random() * 180 - 50) + "px";
  plant.style.top = (y + 118 + Math.random() * 38) + "px";

  plant.onerror = () => {
    const fallback = document.createElement("div");
    fallback.className = "plantFallback";
    fallback.innerHTML = plantStage < 2 ? "🌱" : plantStage < 4 ? "🌿" : "🌸";
    fallback.style.left = plant.style.left;
    fallback.style.top = plant.style.top;
    game.appendChild(fallback);
    plant.remove();
  };

  game.appendChild(plant);

  if(plantStage < 3){
    playSound(sounds.grow);
  } else {
    playSound(sounds.bloom);
  }

  plantStage++;
}

/* EFFECTS */
function sparkle(){
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = (x + 70 + Math.random() * 70 - 35) + "px";
  s.style.top = (y + 55 + Math.random() * 70 - 35) + "px";
  game.appendChild(s);
  setTimeout(() => s.remove(), 1000);
}

function note(px = x, py = y){
  const n = document.createElement("div");
  n.className = "note";
  n.innerHTML = ["♪","♫","♬"][Math.floor(Math.random() * 3)];
  n.style.left = (px + 55 + Math.random() * 30) + "px";
  n.style.top = (py + 20 + Math.random() * 30) + "px";
  game.appendChild(n);
  setTimeout(() => n.remove(), 1600);
}

function glowBurst(){
  const g = document.createElement("div");
  g.className = "fairyGlow";
  g.style.left = (x - 10) + "px";
  g.style.top = (y - 5) + "px";
  game.appendChild(g);
  setTimeout(() => g.remove(), 1000);
}

function bird(){
  const b = document.createElement("div");
  b.className = "bird";
  b.innerHTML = "🐦";
  b.style.left = (x + 40) + "px";
  b.style.top = (y - 90) + "px";
  game.appendChild(b);

  for(let i = 0; i < 4; i++){
    setTimeout(() => note(x, y - 95), i * 300);
  }

  setTimeout(() => b.remove(), 3000);
}

/* SING */
function sing(){
  if(singing) return;

  singing = true;
  fairy.classList.add("singing");
  sprite("fairy-sing.png");

  playSound(sounds.fairy);
  glowBurst();

  score += 10;
  scoreBox.innerText = score;

  for(let i = 0; i < 10; i++){
    setTimeout(sparkle, i * 80);
  }

  for(let i = 0; i < 5; i++){
    setTimeout(() => note(x, y), i * 150);
  }

  setTimeout(() => {
    growPlant();
    playSound(sounds.sparkle);
  }, 350);

  if(score % 20 === 0){
    setTimeout(bird, 700);
  }

  if(score < 40){
    message.innerText = "A tiny song wakes the earth...";
  } else if(score < 80){
    message.innerText = "The plants are growing...";
  } else if(score < 120){
    message.innerText = "The birds are returning...";
  } else {
    message.innerText = "The forest is alive with magic!";
  }

  setTimeout(() => {
    singing = false;
    fairy.classList.remove("singing");
    sprite("fairy-idle.png");
  }, 900);
}

/* CONTROLS */
document.addEventListener("keydown", e => {
  if(e.key === "ArrowRight"){
    x += 12;
    facing = 1;
    if(!singing) sprite("fairy-run.png");
  }

  if(e.key === "ArrowLeft"){
    x -= 12;
    facing = -1;
    if(!singing) sprite("fairy-run.png");
  }

  if(e.key === "ArrowUp"){
    y -= 12;
    if(!singing) sprite("fairy-jump.png");
  }

  if(e.key === "ArrowDown"){
    y += 12;
    if(!singing) sprite("fairy-fly.png");
  }

  if(e.key.toLowerCase() === "s"){
    sing();
  }

  x = Math.max(20, Math.min(window.innerWidth - 180, x));
  y = Math.max(40, Math.min(window.innerHeight - 210, y));

  update();
});

document.addEventListener("keyup", () => {
  if(!singing){
    sprite("fairy-idle.png");
  }
});

singBtn.onclick = sing;

/* START */
startBtn.onclick = () => {
  unlockSounds();
  startScreen.style.display = "none";
  game.style.display = "block";
  sprite("fairy-idle.png");
  update();
};

window.addEventListener("resize", () => {
  x = Math.max(20, Math.min(window.innerWidth - 180, x));
  y = Math.max(40, Math.min(window.innerHeight - 210, y));
  update();
});

update();
</script>

</body>
</html>
