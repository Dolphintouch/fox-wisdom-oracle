<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairy Garden</title>

<style>
body{margin:0;overflow:hidden;font-family:Georgia}

/* START SCREEN */
#startScreen{
  position:absolute;
  width:100%;
  height:100%;
  background:url("fairy-start.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* DARK OVERLAY */
#startScreen::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.25);
}

/* CONTENT */
#startContent{
  position:relative;
  text-align:center;
  z-index:10;
  color:white;
}

/* TITLE */
#title{
  font-size:48px;
  color:#fff2b5;
  text-shadow:
    0 0 10px gold,
    0 0 25px rgba(255,220,120,.7);
  margin-bottom:20px;
}

/* MAGIC TEXT */
#startText{
  font-size:22px;
  color:#fff6c9;
  text-shadow:0 0 10px gold;
  margin-bottom:40px;
  animation:glow 2.5s ease-in-out infinite alternate;
}

/* BUTTON */
#startBtn{
  padding:15px 35px;
  font-size:20px;
  border-radius:25px;
  border:none;
  background:linear-gradient(gold,#ffd86b);
  cursor:pointer;
  box-shadow:0 0 15px gold;
  transition:.3s;
}

#startBtn:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px gold;
}

/* GLOW ANIMATION */
@keyframes glow{
  from{opacity:.7}
  to{opacity:1}
}

/* GAME */
#game{
  display:none;
  width:100vw;
  height:100vh;
  background:url("level1-whispering-meadow.png") center/cover no-repeat;
  position:relative;
}

/* FAIRY */
#fairy{
  position:absolute;
  width:170px;
  height:170px;
  background:center/contain no-repeat;
  transform-origin:center;
  filter:
    drop-shadow(0 0 10px gold)
    drop-shadow(0 0 22px rgba(255,230,120,.75))
    brightness(1.12)
    contrast(1.18);
  z-index:10;
}

/* UI */
#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  background:rgba(0,0,0,.5);
  padding:10px;
  border-radius:10px;
}

/* BUTTON */
#singBtn{
  position:absolute;
  right:20px;
  bottom:20px;
  padding:12px 22px;
  border-radius:18px;
  border:none;
  background:#ffe98a;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div id="startContent">

    <div id="title">Fairy Garden Keeper</div>

    <div id="startText">
      Restore the meadow with your song.
    </div>

    <button id="startBtn">Begin</button>

  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="fairy"></div>

  <div id="ui">
    Points: <span id="score">0</span>
  </div>

  <button id="singBtn" onclick="sing()">✨ Sing ✨</button>
</div>

<script>

let fairy=document.getElementById("fairy");
let score=0;
let x=window.innerWidth*.45;
let y=window.innerHeight*.6;
let facing=1;

/* SPRITE */
function sprite(img){
  fairy.style.backgroundImage=`url("${img}")`;
}

/* UPDATE */
function update(){
  fairy.style.left=x+"px";
  fairy.style.top=y+"px";
  fairy.style.transform=`scaleX(${facing})`;
}

/* SING */
function sing(){
  sprite("fairy-sing-v2.png"); // use cleaned version
  score+=10;
  document.getElementById("score").innerText=score;

  setTimeout(()=>{
    if(score>50) sprite("fairy-happy.png");
    else sprite("fairy-idle.png");
  },800);
}

/* CONTROLS */
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){x+=10;facing=1;sprite("fairy-run.png")}
  if(e.key==="ArrowLeft"){x-=10;facing=-1;sprite("fairy-run.png")}
  if(e.key==="ArrowUp"){y-=10;sprite("fairy-jump.png")}
  if(e.key==="ArrowDown"){y+=10;sprite("fairy-fly.png")}
  if(e.key.toLowerCase()==="s") sing();
  update();
});

/* START */
document.getElementById("startBtn").onclick=()=>{
  startScreen.style.display="none";
  game.style.display="block";
  sprite("fairy-idle.png");
  update();
};

update();

</script>

</body>
</html>
