<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairy Garden Keeper</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Georgia, serif;
  background:black;
}

/* GAME */
#game{
  display:block;
  width:100vw;
  height:100vh;
  background:url("level1-whispering-meadow.png") center/cover no-repeat;
  position:relative;
  overflow:hidden;
}

/* START SCREEN */
#startScreen{
  position:absolute;
  inset:0;
  background:url("fairy-start.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:100;
  opacity:1;
  transition:opacity 1.2s ease;
}

#startScreen::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(255,238,180,.18), transparent 35%),
    rgba(0,0,0,0.28);
}

#startContent{
  position:relative;
  text-align:center;
  z-index:10;
  color:white;
  padding:28px 30px;
  border-radius:28px;
  background:rgba(0,0,0,0.20);
  box-shadow:0 0 35px rgba(255,220,120,.50);
}

#title{
  font-size:48px;
  color:#fff2b5;
  text-shadow:0 0 10px gold, 0 0 25px rgba(255,220,120,.85);
}

#startText{
  font-size:22px;
  color:#fff6c9;
  margin:20px 0;
}

/* FAIRY */
#fairy{
  position:absolute;
  width:220px;
  height:260px;
  background:url("fairy-idle.png") center/contain no-repeat;
  background-color:transparent;
  filter:
    drop-shadow(0 0 10px gold)
    drop-shadow(0 0 22px rgba(255,230,120,.75))
    brightness(1.15)
    contrast(1.2)
    saturate(1.2);
}

/* UI */
#ui{
  position:absolute;
  top:15px;
  left:15px;
  color:#fff6c9;
  background:rgba(0,0,0,.5);
  padding:12px;
  border-radius:15px;
}

#message{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.5);
  padding:12px 20px;
  border-radius:20px;
}

/* BUTTON */
button{
  padding:10px 20px;
  border-radius:20px;
  border:none;
  background:gold;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="game">
  <div id="fairy"></div>

  <div id="ui">
    Points: <span id="score">0</span><br>
    <button id="soundBtn">Sound: Off</button>
  </div>

  <div id="message">The meadow is waiting for your song...</div>
  <button id="singBtn">✨ Sing ✨</button>
</div>

<div id="startScreen">
  <div id="startContent">
    <div id="title">Fairy Garden Keeper</div>
    <div id="startText">
      In the hush between petals and moonlight,<br>
      the garden waits for your soft fairy bells.
    </div>
    <button id="startBtn">Enter the Garden</button>
  </div>
</div>

<script>
const fairy = document.getElementById("fairy");
const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const soundBtn = document.getElementById("soundBtn");
const scoreBox = document.getElementById("score");

let score = 0;
let soundOn = false;

/* SOUNDS */
const sounds = {
  fairy: new Audio("fairy-bells.mp3"),
  grow: new Audio("plant-grow.mp3"),
  bloom: new Audio("plant-bloom.mp3"),
  sparkle: new Audio("magic-sparkle.mp3")
};

function playSound(s){
  if(!soundOn) return;
  s.currentTime = 0;
  s.play();
}

soundBtn.onclick = () => {
  soundOn = !soundOn;
  soundBtn.innerText = soundOn ? "Sound: On" : "Sound: Off";
};

/* START */
startBtn.onclick = () => {
  soundOn = true;
  playSound(sounds.fairy);

  startScreen.style.opacity = "0";
  setTimeout(()=>{
    startScreen.style.display = "none";
  },1000);
};

/* SING */
document.getElementById("singBtn").onclick = () => {
  playSound(sounds.fairy);
  playSound(sounds.grow);

  score += 10;
  scoreBox.innerText = score;
};
</script>

</body>
</html>
