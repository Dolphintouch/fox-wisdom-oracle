<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairy Garden Level 1</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: Georgia;
}

#game {
  width:100vw;
  height:100vh;
  background:url("level1-forest.png") center/cover no-repeat;
  position:relative;
}

#fairy {
  position:absolute;
  width:120px;
  height:120px;
  background:url("fairy-idle.png") center/contain no-repeat;
  left:50%;
  top:60%;
  transform:translate(-50%,-50%);
}

#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
}

button {
  position:absolute;
  bottom:20px;
  right:20px;
  padding:10px 20px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="game">
  <div id="fairy"></div>

  <div id="ui">
    Level 1: Singing Forest<br>
    Points: <span id="score">0</span>
  </div>

  <button onclick="sing()">Sing</button>
</div>

<script>
let fairy = document.getElementById("fairy");
let score = 0;

function setSprite(name){
  fairy.style.backgroundImage = `url(${name})`;
}

function sing(){
  setSprite("fairy-sing.png");
  score += 10;
  document.getElementById("score").innerText = score;

  setTimeout(()=>{
    if(score >= 50){
      setSprite("fairy-happy.png");
    } else {
      setSprite("fairy-idle.png");
    }
  }, 800);
}

document.addEventListener("keydown", (e)=>{
  if(e.key === "ArrowRight"){
    setSprite("fairy-run.png");
    fairy.style.left = (fairy.offsetLeft + 10) + "px";
  }
  if(e.key === "ArrowLeft"){
    setSprite("fairy-run.png");
    fairy.style.left = (fairy.offsetLeft - 10) + "px";
  }
  if(e.key === "ArrowUp"){
    setSprite("fairy-jump.png");
    fairy.style.top = (fairy.offsetTop - 10) + "px";
  }
  if(e.key === "ArrowDown"){
    setSprite("fairy-fly.png");
    fairy.style.top = (fairy.offsetTop + 10) + "px";
  }
  if(e.key === "s"){
    sing();
  }
});

document.addEventListener("keyup", ()=>{
  if(score < 50){
    setSprite("fairy-idle.png");
  }
});
</script>

</body>
</html>
