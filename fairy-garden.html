<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairy Garden Keeper</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Georgia, serif;
  background:black;
}

#game{
  width:100vw;
  height:100vh;
  background:url("level1-whispering-meadow.png") center/cover no-repeat;
  position:relative;
  overflow:hidden;
}

/* CLEAN START SCREEN - IMAGE DOES THE TALKING */
#startScreen{
  position:absolute;
  inset:0;
  background:url("fairy-start.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-bottom:50px;
  z-index:100;
  transition:opacity 1.2s ease;
}

#startBtn{
  padding:16px 40px;
  font-size:18px;
  border-radius:30px;
  border:none;
  background:linear-gradient(#fff3a8,#ffd45a);
  color:#4a3210;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 18px gold,0 0 35px rgba(255,230,120,.75);
}

/* FAIRY */
#fairy{
  position:absolute;
  width:220px;
  height:260px;
  background:url("fairy-idle.png") center/contain no-repeat;
  background-color:transparent;
  filter:
    drop-shadow(0 0 12px gold)
    drop-shadow(0 0 24px rgba(255,230,120,.75))
    brightness(1.12)
    contrast(1.15);
  z-index:10;
  pointer-events:none;
  transform-origin:center center;
}

#fairy.singing{
  filter:
    drop-shadow(0 0 18px gold)
    drop-shadow(0 0 35px rgba(255,240,150,.95))
    brightness(1.25)
    contrast(1.18);
}

/* UI */
#ui{
  position:absolute;
  top:15px;
  left:15px;
  color:#fff6c9;
  background:rgba(0,0,0,.5);
  padding:12px;
  border-radius:15px;
  z-index:30;
}

#message{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.5);
  padding:12px 20px;
  border-radius:20px;
  color:#fff4c2;
  z-index:30;
  text-align:center;
}

#singBtn{
  position:absolute;
  right:20px;
  bottom:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
  z-index:30;
  box-shadow:0 0 18px gold;
}

button{
  font-family:Georgia, serif;
}

/* SIMPLE MAGIC EFFECTS */
.sparkle{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 14px white;
  animation:sparkleFloat 1s ease-out forwards;
  z-index:20;
}

.note{
  position:absolute;
  font-size:32px;
  color:#fff6a8;
  text-shadow:0 0 12px gold;
  animation:noteFloat 1.6s ease-out forwards;
  z-index:20;
}

.plantFallback{
  position:absolute;
  font-size:58px;
  filter:drop-shadow(0 0 14px #eaff8a);
  animation:plantGrow .8s ease forwards;
  z-index:7;
}

@keyframes sparkleFloat{
  to{transform:translateY(-45px) scale(2);opacity:0}
}

@keyframes noteFloat{
  to{transform:translateY(-90px);opacity:0}
}

@keyframes plantGrow{
  from{transform:scale(.2);opacity:.2}
  to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div id="game">
  <div id="fairy"></div>

  <div id="ui">
    Points: <span id="score">0</span><br>
    Move: Arrow Keys<br>
    Sing: S or button<br>
    <button id="soundBtn">Sound: Off</button>
  </div>

  <div id="message">The meadow is waiting for your song...</div>
  <button id="singBtn">✨ Sing ✨</button>
</div>

<div id="startScreen">
  <button id="startBtn">✨ Enter the Fairy Garden ✨</button>
</div>

<script>
const fairy = document.getElementById("fairy");
const game = document.getElementById("game");
const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const soundBtn = document.getElementById("soundBtn");
const singBtn = document.getElementById("singBtn");
const scoreBox = document.getElementById("score");
const message = document.getElementById("message");

let x = window.innerWidth * 0.45;
let y = window.innerHeight * 0.55;
let score = 0;
let soundOn = false;
let singing = false;

/*
IMPORTANT:
Most fairy sprites face RIGHT by default.
facing = 1 means right.
facing = -1 means left.
This fixes the backwards walking/flying problem.
*/
let facing = 1;

const sounds = {
  fairy: new Audio("fairy-bells.mp3"),
  grow: new Audio("plant-grow.mp3"),
  bloom: new Audio("plant-bloom.mp3"),
  sparkle: new Audio("magic-sparkle.mp3"),
  music: new Audio("fairy-music.mp3")
};

sounds.music.loop = true;
sounds.music.volume = 0.2;
sounds.fairy.volume = 0.55;
sounds.grow.volume = 0.5;
sounds.bloom.volume = 0.65;
sounds.sparkle.volume = 0.45;

function unlockSounds(){
  Object.values(sounds).forEach(s => {
    s.play().then(() => {
      s.pause();
      s.currentTime = 0;
    }).catch(()=>{});
  });
}

function playSound(s){
  if(!soundOn) return;
  s.currentTime = 0;
  s.play().catch(()=>{});
}

function sprite(img){
  fairy.style.backgroundImage = `url("${img}")`;
}

function update(){
  x = Math.max(0, Math.min(window.innerWidth - fairy.offsetWidth, x));
  y = Math.max(0, Math.min(window.innerHeight - fairy.offsetHeight, y));

  fairy.style.left = x + "px";
  fairy.style.top = y + "px";

  /* THIS IS THE TURNING FIX */
  fairy.style.transform = `scaleX(${facing})`;
}

function startMusic(){
  if(soundOn){
    sounds.music.play().catch(()=>{});
  }
}

startBtn.onclick = () => {
  soundOn = true;
  soundBtn.innerText = "Sound: On";

  unlockSounds();
  playSound(sounds.fairy);
  startMusic();

  startScreen.style.opacity = "0";
  setTimeout(() => {
    startScreen.style.display = "none";
    update();
  }, 1000);
};

soundBtn.onclick = () => {
  soundOn = !soundOn;
  soundBtn.innerText = soundOn ? "Sound: On" : "Sound: Off";
  unlockSounds();

  if(soundOn){
    startMusic();
  } else {
    sounds.music.pause();
  }
};

/* SPARKLES */
function sparkle(){
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = (x + fairy.offsetWidth * .5 + Math.random() * 70 - 35) + "px";
  s.style.top = (y + fairy.offsetHeight * .35 + Math.random() * 70 - 35) + "px";
  game.appendChild(s);
  setTimeout(() => s.remove(), 1000);
}

function note(){
  const n = document.createElement("div");
  n.className = "note";
  n.innerHTML = ["♪","♫","♬"][Math.floor(Math.random() * 3)];
  n.style.left = (x + fairy.offsetWidth * .5 + Math.random() * 35) + "px";
  n.style.top = (y + fairy.offsetHeight * .25 + Math.random() * 30) + "px";
  game.appendChild(n);
  setTimeout(() => n.remove(), 1600);
}

function growPlant(){
  const p = document.createElement("div");
  p.className = "plantFallback";

  if(score < 40){
    p.innerHTML = "🌱";
    playSound(sounds.grow);
  } else if(score < 90){
    p.innerHTML = "🌿";
    playSound(sounds.grow);
  } else {
    p.innerHTML = "🌸";
    playSound(sounds.bloom);
  }

  p.style.left = (x + fairy.offsetWidth * .45 + Math.random() * 130 - 65) + "px";
  p.style.top = (y + fairy.offsetHeight - 45 + Math.random() * 30) + "px";
  game.appendChild(p);
}

function sing(){
  if(singing) return;

  singing = true;
  fairy.classList.add("singing");

  /*
  Uses fairy-fly.png instead of fairy-sing.png because fairy-sing had the white square.
  It still faces the correct direction because update() keeps scaleX(facing).
  */
  sprite("fairy-fly.png");
  update();

  playSound(sounds.fairy);

  score += 10;
  scoreBox.innerText = score;

  for(let i = 0; i < 10; i++){
    setTimeout(sparkle, i * 80);
  }

  for(let i = 0; i < 5; i++){
    setTimeout(note, i * 150);
  }

  setTimeout(() => {
    growPlant();
    playSound(sounds.sparkle);
  }, 350);

  if(score < 40){
    message.innerText = "A tiny song wakes the earth...";
  } else if(score < 80){
    message.innerText = "The plants are growing...";
  } else if(score < 120){
    message.innerText = "The birds are returning...";
  } else {
    message.innerText = "The forest is alive with magic!";
  }

  setTimeout(() => {
    singing = false;
    fairy.classList.remove("singing");
    sprite("fairy-idle.png");
    update();
  }, 850);
}

function moveFairy(dx, dy, moveSprite){
  if(dx > 0) facing = 1;
  if(dx < 0) facing = -1;

  x += dx;
  y += dy;

  if(!singing){
    sprite(moveSprite);
  }

  update();
}

/* KEYBOARD CONTROLS */
document.addEventListener("keydown", e => {
  if(e.key === "ArrowRight"){
    e.preventDefault();
    moveFairy(16, 0, "fairy-run.png");
  }

  if(e.key === "ArrowLeft"){
    e.preventDefault();
    moveFairy(-16, 0, "fairy-run.png");
  }

  if(e.key === "ArrowUp"){
    e.preventDefault();
    moveFairy(0, -16, "fairy-fly.png");
  }

  if(e.key === "ArrowDown"){
    e.preventDefault();
    moveFairy(0, 16, "fairy-fly.png");
  }

  if(e.key.toLowerCase() === "s"){
    e.preventDefault();
    sing();
  }
});

document.addEventListener("keyup", () => {
  if(!singing){
    sprite("fairy-idle.png");
    update();
  }
});

singBtn.onclick = sing;

window.addEventListener("resize", update);

document.addEventListener("click", unlockSounds, { once:true });
document.addEventListener("touchstart", unlockSounds, { once:true });

update();
</script>

</body>
</html>
