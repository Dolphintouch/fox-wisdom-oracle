<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fairy Garden Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Georgia, serif;
    background:
      radial-gradient(circle at top, rgba(255,255,255,0.35), transparent 35%),
      linear-gradient(#8166a8, #405f51 45%, #203b2e);
    color: white;
    overflow: hidden;
  }

  #gameWrap {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #ui {
    position: absolute;
    top: 15px;
    left: 15px;
    right: 15px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    pointer-events: none;
  }

  .panel {
    background: rgba(38, 29, 55, 0.65);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 18px;
    padding: 12px 16px;
    box-shadow: 0 0 25px rgba(255, 220, 255, 0.25);
    backdrop-filter: blur(6px);
    pointer-events: auto;
  }

  button {
    border: 0;
    border-radius: 999px;
    padding: 10px 16px;
    background: linear-gradient(135deg, #f8dfff, #d7fff0);
    color: #35402f;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(255,255,255,0.6);
  }

  button:hover {
    transform: scale(1.04);
  }

  #message {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: min(90%, 650px);
    text-align: center;
    background: rgba(22, 35, 28, 0.75);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 22px;
    padding: 16px;
    font-size: 18px;
    box-shadow: 0 0 30px rgba(255, 230, 255, 0.35);
  }
</style>
</head>

<body>
<div id="gameWrap">
  <canvas id="game"></canvas>

  <div id="ui">
    <div class="panel">
      🌸 Garden Magic: <span id="score">0</span><br>
      🌱 Plants Restored: <span id="restored">0</span>/6
    </div>

    <div class="panel">
      <button id="soundBtn">Sound: Off</button>
      <button id="singBtn">🧚 Sing Fairy Bells</button>
    </div>
  </div>

  <div id="message">
    Restore the meadow before your reading…  
    Tap or click near the sleeping plants and let the fairy bells wake them.
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const scoreEl = document.getElementById("score");
const restoredEl = document.getElementById("restored");
const messageEl = document.getElementById("message");
const soundBtn = document.getElementById("soundBtn");
const singBtn = document.getElementById("singBtn");

let soundOn = false;
let score = 0;
let restored = 0;
let particles = [];
let fireflies = [];

// 🌿 YOUR UPLOADED SOUNDS
const sounds = {
  fairy: new Audio("fairy-bells.mp3"),
  grow: new Audio("plant-grow.mp3"),
  bloom: new Audio("plant-bloom.mp3"),
  sparkle: new Audio("magic-sparkle.mp3")
};

sounds.fairy.volume = 0.55;
sounds.grow.volume = 0.5;
sounds.bloom.volume = 0.65;
sounds.sparkle.volume = 0.45;

function unlockSounds() {
  Object.values(sounds).forEach(sound => {
    sound.play().then(() => {
      sound.pause();
      sound.currentTime = 0;
    }).catch(() => {});
  });
}

function playSound(sound) {
  if (!soundOn) return;
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

soundBtn.addEventListener("click", () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? "Sound: On" : "Sound: Off";
  unlockSounds();
});

document.addEventListener("click", unlockSounds, { once: true });
document.addEventListener("touchstart", unlockSounds, { once: true });

const fairy = {
  x: 140,
  y: 260,
  glow: 0
};

const plants = [
  { x: 280, y: 0.78, stage: 0 },
  { x: 470, y: 0.72, stage: 0 },
  { x: 650, y: 0.80, stage: 0 },
  { x: 850, y: 0.70, stage: 0 },
  { x: 1040, y: 0.78, stage: 0 },
  { x: 1220, y: 0.74, stage: 0 }
];

for (let i = 0; i < 45; i++) {
  fireflies.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 1,
    speed: Math.random() * 0.4 + 0.1,
    glow: Math.random() * Math.PI * 2
  });
}

function addParticles(x, y, amount = 18) {
  for (let i = 0; i < amount; i++) {
    particles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 3 - 1,
      life: 60,
      size: Math.random() * 4 + 2
    });
  }
}

function fairySing(targetPlant = null) {
  playSound(sounds.fairy);
  fairy.glow = 40;
  addParticles(fairy.x, fairy.y, 28);

  if (targetPlant) {
    setTimeout(() => {
      growPlant(targetPlant);
    }, 350);
  }
}

function growPlant(plant) {
  if (plant.stage >= 3) return;

  plant.stage++;

  if (plant.stage === 1 || plant.stage === 2) {
    playSound(sounds.grow);
  }

  if (plant.stage === 3) {
    playSound(sounds.bloom);
    restored++;
    restoredEl.textContent = restored;
  }

  playSound(sounds.sparkle);
  score += 10;
  scoreEl.textContent = score;

  const py = canvas.height * plant.y;
  addParticles(plant.x, py - 40, 35);

  if (restored >= plants.length) {
    messageEl.innerHTML =
      "🌸 The garden is restored.<br>Oracle Message: The smallest song can wake a sleeping world.";
  } else {
    messageEl.textContent = "The fairy bells drift through the garden… something begins to grow.";
  }
}

singBtn.addEventListener("click", () => {
  const sleeping = plants.find(p => p.stage < 3);
  fairySing(sleeping);
});

canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let closest = null;
  let closestDist = 9999;

  plants.forEach(plant => {
    const px = plant.x;
    const py = canvas.height * plant.y;
    const d = Math.hypot(mx - px, my - py);
    if (d < closestDist) {
      closestDist = d;
      closest = plant;
    }
  });

  if (closest && closestDist < 120) {
    fairy.x += (closest.x - fairy.x) * 0.45;
    fairy.y += ((canvas.height * closest.y) - 120 - fairy.y) * 0.45;
    fairySing(closest);
  }
});

function drawBackground() {
  const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grd.addColorStop(0, "#8d74b8");
  grd.addColorStop(0.45, "#577868");
  grd.addColorStop(1, "#203b2e");
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // moon glow
  ctx.beginPath();
  ctx.arc(canvas.width - 140, 110, 70, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,245,220,0.45)";
  ctx.fill();

  // hills
  ctx.fillStyle = "rgba(30, 71, 50, 0.65)";
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.72);
  ctx.quadraticCurveTo(canvas.width * 0.3, canvas.height * 0.55, canvas.width * 0.6, canvas.height * 0.73);
  ctx.quadraticCurveTo(canvas.width * 0.8, canvas.height * 0.86, canvas.width, canvas.height * 0.65);
  ctx.lineTo(canvas.width, canvas.height);
  ctx.lineTo(0, canvas.height);
  ctx.fill();

  // ground
  ctx.fillStyle = "#243f2d";
  ctx.fillRect(0, canvas.height * 0.82, canvas.width, canvas.height * 0.18);
}

function drawFireflies() {
  fireflies.forEach(f => {
    f.glow += 0.04;
    f.y -= f.speed;
    f.x += Math.sin(f.glow) * 0.25;

    if (f.y < -10) {
      f.y = canvas.height + 10;
      f.x = Math.random() * canvas.width;
    }

    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r + Math.sin(f.glow) * 1.2, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 244, 180, 0.65)";
    ctx.shadowColor = "rgba(255, 244, 180, 0.9)";
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawFairy() {
  ctx.save();
  ctx.translate(fairy.x, fairy.y);

  if (fairy.glow > 0) {
    ctx.beginPath();
    ctx.arc(0, 0, fairy.glow * 2, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 230, 255, 0.18)";
    ctx.fill();
    fairy.glow *= 0.92;
  }

  // wings
  ctx.fillStyle = "rgba(220, 255, 255, 0.45)";
  ctx.beginPath();
  ctx.ellipse(-24, -8, 22, 42, -0.5, 0, Math.PI * 2);
  ctx.ellipse(24, -8, 22, 42, 0.5, 0, Math.PI * 2);
  ctx.fill();

  // dress/body
  ctx.fillStyle = "#f5d4ff";
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(-22, 36);
  ctx.lineTo(22, 36);
  ctx.closePath();
  ctx.fill();

  // head
  ctx.beginPath();
  ctx.arc(0, -34, 14, 0, Math.PI * 2);
  ctx.fillStyle = "#ffe7cf";
  ctx.fill();

  // hair
  ctx.beginPath();
  ctx.arc(0, -42, 15, Math.PI, 0);
  ctx.fillStyle = "#f6e1a8";
  ctx.fill();

  // wand
  ctx.strokeStyle = "#fff9bf";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(18, -5);
  ctx.lineTo(45, -32);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(48, -35, 5, 0, Math.PI * 2);
  ctx.fillStyle = "#fff6a8";
  ctx.shadowColor = "#fff6a8";
  ctx.shadowBlur = 15;
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawPlant(plant) {
  const x = plant.x;
  const groundY = canvas.height * plant.y;

  ctx.save();
  ctx.translate(x, groundY);

  ctx.strokeStyle = "#9be88f";
  ctx.lineCap = "round";
  ctx.lineWidth = 5;

  if (plant.stage === 0) {
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fillStyle = "#6c4d36";
    ctx.fill();
  }

  if (plant.stage >= 1) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -45);
    ctx.stroke();

    ctx.fillStyle = "#9be88f";
    ctx.beginPath();
    ctx.ellipse(-14, -25, 16, 8, -0.6, 0, Math.PI * 2);
    ctx.ellipse(14, -35, 16, 8, 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  if (plant.stage >= 2) {
    ctx.beginPath();
    ctx.moveTo(0, -45);
    ctx.lineTo(0, -80);
    ctx.stroke();

    ctx.fillStyle = "#b8ff9f";
    ctx.beginPath();
    ctx.ellipse(-18, -58, 18, 9, -0.5, 0, Math.PI * 2);
    ctx.ellipse(18, -68, 18, 9, 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  if (plant.stage >= 3) {
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 / 8) * i;
      ctx.beginPath();
      ctx.ellipse(
        Math.cos(angle) * 13,
        -95 + Math.sin(angle) * 13,
        10,
        18,
        angle,
        0,
        Math.PI * 2
      );
      ctx.fillStyle = "#ffd8fb";
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(0, -95, 10, 0, Math.PI * 2);
    ctx.fillStyle = "#fff4a8";
    ctx.shadowColor = "#fff4a8";
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.015;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 235, 180, ${p.life / 60})`;
    ctx.shadowColor = "rgba(255, 230, 170, 0.9)";
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function gameLoop() {
  drawBackground();
  drawFireflies();

  plants.forEach(drawPlant);
  drawFairy();
  drawParticles();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
