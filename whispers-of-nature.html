<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispers of Nature Oracle</title>

<style>
body{
  font-family: Georgia, serif;
  text-align:center;
  background-image:linear-gradient(rgba(12,20,14,0.6), rgba(12,20,14,0.8)), url("forest-bg-new.jpg");
  background-size:cover;
  background-attachment:fixed;
  color:#f3ead6;
  margin:0;
  padding:20px;
}

h1{font-size:3em;}

.welcome-card{
  width:260px;
  border-radius:18px;
  cursor:pointer;
  transition:0.8s;
}

.button-row{
  margin:20px;
}

button{
  padding:12px 18px;
  margin:6px;
  border-radius:30px;
  border:none;
  background:#6f8f72;
  color:white;
  cursor:pointer;
}

.shop-links{
  margin:20px;
}

.link-button{
  display:inline-block;
  margin:8px;
  padding:12px 20px;
  border-radius:30px;
  background:#4f694f;
  color:white;
  text-decoration:none;
}

.cards-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  width:180px;
}

.card img{
  width:100%;
  border-radius:14px;
}

.message-box{
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.1);
  border-radius:14px;
}
</style>
</head>

<body>

<h1>Whispers of Nature Oracle</h1>

<img id="mainCard" class="welcome-card"
src="whispers-card-back.jpg"
onclick="drawDailyCard()">

<div class="button-row">
<button onclick="drawDailyCard()">Daily</button>
<button onclick="drawThree()">3 Card Spread</button>
<button onclick="drawCross()">Cross Reading</button>
</div>

<div class="shop-links">
<a class="link-button"
href="https://journey-through-the-mushroom-trip-oracle.my.canva.site/whispers-of-nature-oracle-"
target="_blank">Open Book</a>

<a class="link-button"
href="https://www.amazon.com/dp/B0GWWD9D4C?ref=sp_email"
target="_blank">Amazon Book</a>
</div>

<div id="cards" class="cards-grid"></div>

<div id="message" class="message-box"></div>

<script>

const whispersCards = [
{title:"Roots", image:"roots.jpg", message:"Go deeper before reaching higher."},
{title:"Inner Peace", image:"inner-peace.jpg", message:"Peace is growing beneath the noise."},
{title:"Follow the Sun", image:"follow-the-sun.jpg", message:"Turn toward what warms you."},
{title:"Trust the Journey", image:"trust-the-journey.jpg", message:"The path is forming beneath your feet."},
{title:"You Are Held", image:"you-are-held.jpg", message:"Something loving is holding you."}
];

function getRandom(exclude=[]){
let pool=whispersCards.filter(c=>!exclude.includes(c.title));
return pool[Math.floor(Math.random()*pool.length)];
}

function drawDailyCard(){
let card=getRandom();
document.getElementById("mainCard").src=card.image;
document.getElementById("cards").innerHTML="";
document.getElementById("message").innerHTML=
"<h3>"+card.title+"</h3><p>"+card.message+"</p>";
}

function drawThree(){
let c1=getRandom();
let c2=getRandom([c1.title]);
let c3=getRandom([c1.title,c2.title]);

showSpread([c1,c2,c3],["Past","Present","Future"]);
}

function drawCross(){
let picked=[];
while(picked.length<5){
let c=getRandom(picked.map(x=>x.title));
picked.push(c);
}

showSpread(picked,[
"Where you are",
"Hidden",
"Nourishment",
"Block",
"Path"
]);
}

function showSpread(cards,labels){
let html="";
cards.forEach((c,i)=>{
html+=`
<div class="card">
<h4>${labels[i]}</h4>
<img src="${c.image}">
<p>${c.title}</p>
</div>`;
});
document.getElementById("cards").innerHTML=html;

let msg="";
cards.forEach((c,i)=>{
msg+=labels[i]+": "+c.message+"<br><br>";
});
document.getElementById("message").innerHTML=msg;
}

</script>

</body>
</html>
