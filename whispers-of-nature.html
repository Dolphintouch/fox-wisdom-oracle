<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispers of Nature Oracle</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
padding:16px;
font-family:Georgia,serif;
text-align:center;
color:#eef4ea;

/* ✅ FIXED BACKGROUND PATH */
background:
linear-gradient(rgba(18,34,24,0.55), rgba(18,34,24,0.85)),
url("forest-bg.jpg");  /* <-- make sure this file exists in SAME folder */

background-size:cover;
background-position:center;
background-attachment:fixed;
}

.page-wrap{max-width:1100px;margin:auto;}

h1{font-size:2.6rem;}

.welcome-flip{
width:300px;
max-width:80vw;
perspective:1200px;
cursor:pointer;
}

.welcome-inner{
position:relative;
width:100%;
height:420px;
transform-style:preserve-3d;
transition:transform 1.2s ease;
}

.welcome-flip.flipped .welcome-inner{
transform:rotateY(180deg);
}

.welcome-front,.welcome-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
overflow:hidden;
}

.welcome-back{transform:rotateY(180deg);}

.welcome-front img,.welcome-back img{
width:100%;
height:100%;
object-fit:cover;
}

.tap-note{
animation:pulseText 2s infinite;
}

@keyframes pulseText{
0%,100%{opacity:0.6;}
50%{opacity:1;}
}

button,.link-button{
padding:12px 20px;
border-radius:30px;
border:none;
color:white;
background:#58755d;
cursor:pointer;
margin:6px;
}

.link-button{background:#374737;}

.cards-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card-slot{width:200px;}

.flip-card{
width:100%;
perspective:1000px;
}

.flip-card-inner{
position:relative;
width:100%;
height:320px;
transform-style:preserve-3d;
transition:transform 1.4s ease;
}

.flip-card.flipped .flip-card-inner{
transform:rotateY(180deg);
}

.flip-front,.flip-back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:15px;
overflow:hidden;
}

.flip-back{transform:rotateY(180deg);}

.flip-front img,.flip-back img{
width:100%;
height:100%;
object-fit:cover;
}

/* ✨ glow */
.flip-card.flipped .flip-back{
box-shadow:0 0 25px rgba(186,255,178,0.6);
}

/* ✨ scroll whisper */
.scroll-note{
display:none;
opacity:0;
margin-top:20px;
}

.scroll-note.show{
display:block;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* ✨ fireflies */
.firefly{
position:fixed;
width:6px;
height:6px;
background:#d4ffb5;
border-radius:50%;
box-shadow:0 0 10px #d4ffb5;
opacity:0;
animation:fly linear infinite;
}

@keyframes fly{
0%{transform:translateY(0); opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-200px); opacity:0;}
}

.message-box{
display:none;
margin-top:20px;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
white-space:pre-line;
}

.message-box.show{display:block;}
</style>
</head>

<body>

<div class="page-wrap">

<h1>Whispers of Nature Oracle</h1>

<div class="welcome-flip" id="welcomeFlip" onclick="drawFromWelcomeCard()">
<div class="welcome-inner">
<div class="welcome-front">
<img src="whispers-card-back.jpg">
</div>
<div class="welcome-back">
<img id="welcomeRevealImage" src="whispers-card-back.jpg">
</div>
</div>
</div>

<div class="tap-note">Tap the card to reveal your message</div>

<div>
<button onclick="startReading('daily')">Daily</button>
<button onclick="startReading('three')">3 Card</button>
<button onclick="startReading('cross')">Cross</button>
<button onclick="window.location.href='index.html'">Back</button>
</div>

<div id="cards" class="cards-grid"></div>

<div id="scrollNote" class="scroll-note">
The path continues below… scroll to reveal your reading
</div>

<div id="messageBox" class="message-box">
<h3 id="title"></h3>
<p id="message"></p>
</div>

</div>

<script>

/* ✨ fireflies */
for(let i=0;i<12;i++){
let f=document.createElement("div");
f.className="firefly";
f.style.left=Math.random()*100+"vw";
f.style.top=(70+Math.random()*30)+"vh";
f.style.animationDuration=(6+Math.random()*6)+"s";
f.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(f);
}

const CARD_BACK="whispers-card-back.jpg";

/* ✅ CLEAN WHISPERS ONLY */
const cards=[
{title:"Follow the Sun",image:"follow-the-sun.jpg",message:"Turn toward what helps you grow."},
{title:"Inner Peace",image:"inner-peace.jpg",message:"Return to your centre."},
{title:"Trust the Journey",image:"trust-the-journey.jpg",message:"Not all is revealed at once."},
{title:"Whispering Grove",image:"whispering-grove.jpg",message:"Nature is speaking to you."},
{title:"White Light of Love",image:"white-light-of-love.jpg",message:"Compassion surrounds you."}
];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function drawFromWelcomeCard(){
let draw=shuffle([...cards]).slice(0,1);
let card=draw[0];

let welcome=document.getElementById("welcomeFlip");
let img=document.getElementById("welcomeRevealImage");

img.src=card.image;

setTimeout(()=>{welcome.classList.add("flipped");},50);

setTimeout(()=>{
showCards(draw,"daily");
welcome.classList.remove("flipped");
img.src=CARD_BACK;
},3000);
}

function startReading(type){
let draw=[];
if(type==="daily")draw=shuffle([...cards]).slice(0,1);
if(type==="three")draw=shuffle([...cards]).slice(0,3);
if(type==="cross")draw=shuffle([...cards]).slice(0,5);

showCards(draw,type);
}

function showCards(draw,type){

let container=document.getElementById("cards");
let scroll=document.getElementById("scrollNote");

container.innerHTML="";

draw.forEach((c,i)=>{
container.innerHTML+=`
<div class="card-slot">
<div class="flip-card" id="flip-${i}">
<div class="flip-card-inner">
<div class="flip-front"><img src="${CARD_BACK}"></div>
<div class="flip-back"><img src="${c.image}"></div>
</div>
</div>
</div>`;
});

draw.forEach((_,i)=>{
setTimeout(()=>{
document.getElementById("flip-"+i).classList.add("flipped");
},400+(i*400));
});

setTimeout(()=>{scroll.classList.add("show");},1200);

let box=document.getElementById("messageBox");
box.classList.add("show");

if(type==="daily"){
title.innerText=draw[0].title;
message.innerText=draw[0].message;
}else{
title.innerText="Your Reading";
message.innerText=draw.map(c=>c.title+" — "+c.message).join("\n\n");
}
}

</script>

</body>
</html>
