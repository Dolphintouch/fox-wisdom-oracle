<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispers of Nature Oracle</title>

<style>
body {
  font-family: Georgia, serif;
  text-align: center;
  background: linear-gradient(rgba(12,20,14,0.6), rgba(12,20,14,0.8)),
              url("forest-bg-new.jpg");
  background-size: cover;
  background-attachment: fixed;
  color: #f3ead6;
  margin: 0;
}

/* ✨ Fireflies */
.light {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #e6ffd9;
  box-shadow: 0 0 10px #cfffaa;
  animation: floatLight linear infinite;
}
@keyframes floatLight {
  0% { transform: translateY(0); opacity:0;}
  50% {opacity:1;}
  100% { transform: translateY(-200px); opacity:0;}
}

/* ✨ Main Card */
.welcome-card {
  width: 300px;
  border-radius: 20px;
  margin-top: 20px;
  cursor: pointer;
  transition: transform 1.2s ease;
  box-shadow: 0 0 20px rgba(200,255,200,0.2);
}

.welcome-card.glow {
  animation: glowPulse 2.5s infinite;
}

@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 20px rgba(200,255,200,0.2);}
  50% { box-shadow: 0 0 40px rgba(200,255,200,0.5);}
}

/* ✨ Mist */
.mist {
  position:absolute;
  width:400px;
  height:200px;
  background: radial-gradient(circle, rgba(200,255,200,0.2), transparent);
  filter: blur(40px);
  opacity:0;
}
.mist.show {
  animation: mistMove 3s ease;
}
@keyframes mistMove {
  0% {opacity:0;}
  30% {opacity:1;}
  100% {opacity:0; transform: translateY(-50px);}
}

/* ✨ Buttons */
button {
  padding:12px 20px;
  margin:5px;
  border-radius:30px;
  border:none;
  background:#6f8f72;
  color:white;
  cursor:pointer;
}

/* ✨ Message */
#messageBox {
  margin-top:20px;
  display:none;
}
</style>
</head>

<body>

<h1>Whispers of Nature Oracle</h1>

<div id="mist" class="mist"></div>

<img id="mainCard"
     class="welcome-card"
     src="whispers-card-back.jpg"
     onclick="drawCard()">

<br>

<button onclick="startReading('daily')">Daily</button>
<button onclick="startReading('three')">3 Card</button>
<button onclick="startReading('cross')">Cross Spread</button>

<br><br>

<!-- 🌿 YOUR CANVA BOOK LINK -->
<a href="https://journey-through-the-mushroom-trip-oracle.my.canva.site/whispers-of-nature-oracle-"
   target="_blank">
   <button>Open the Whispers Book</button>
</a>

<div id="messageBox">
  <h3 id="title"></h3>
  <p id="message"></p>
</div>

<audio id="whisper">
  <source src="whisper.mp3" type="audio/mpeg">
</audio>

<script>

/* 🌿 SAFE DECK NAME */
const whispersCards = [
{title:"Roots", image:"roots.jpg", message:"Go deeper before reaching higher."},
{title:"Inner Peace", image:"inner-peace.jpg", message:"Peace grows in stillness."},
{title:"Follow the Sun", image:"follow-the-sun.jpg", message:"Turn toward warmth."},
{title:"You Are Held", image:"you-are-held.jpg", message:"You are supported."},
{title:"Trust the Journey", image:"trust-the-journey.jpg", message:"The path unfolds."}
];

let busy = false;

/* ✨ MAIN DRAW */
function drawCard() {
  if(busy) return;
  busy = true;

  const card = whispersCards[Math.floor(Math.random()*whispersCards.length)];
  const img = document.getElementById("mainCard");
  const mist = document.getElementById("mist");

  img.classList.add("glow");
  mist.classList.add("show");

  document.getElementById("whisper").play().catch(()=>{});

  setTimeout(()=>{
    img.style.transform="rotateY(90deg)";
    setTimeout(()=>{
      img.src = card.image;
      img.style.transform="rotateY(0deg)";

      document.getElementById("title").innerText = card.title;
      document.getElementById("message").innerText = card.message;
      document.getElementById("messageBox").style.display="block";

      setTimeout(()=>{
        img.style.transform="rotateY(90deg)";
        setTimeout(()=>{
          img.src="whispers-card-back.jpg";
          img.style.transform="rotateY(0deg)";
          busy=false;
        },300);
      },5000);

    },300);
  },800);
}

/* ✨ BUTTONS SAFE */
function startReading(type){
  drawCard();
}

</script>

</body>
</html>
