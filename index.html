<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Wisdom Oracle</title>

<style>
*{box-sizing:border-box;}

body{
  font-family:Georgia, serif;
  text-align:center;
  background:
    linear-gradient(rgba(16,22,16,0.56), rgba(16,22,16,0.76)),
    url("forest-bg.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  margin:0;
  padding:16px;
  color:#f5e9c8;
}

/* Floating lights */
.soft-lights{position:fixed; inset:0; pointer-events:none;}
.light{
  position:absolute;
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,234,173,0.9);
  box-shadow:0 0 12px rgba(255,232,180,0.85);
  animation:floatLight linear infinite;
}
.light:nth-child(1){left:10%;top:80%;animation-duration:12s;}
.light:nth-child(2){left:70%;top:85%;animation-duration:14s;}
@keyframes floatLight{
  0%{transform:translateY(0);opacity:0;}
  30%{opacity:1;}
  100%{transform:translateY(-200px);opacity:0;}
}

.page-wrap{max-width:1000px;margin:auto;}

h1{font-size:2.5rem;margin:10px 0;}
.blessing{margin-bottom:20px;line-height:1.6;}

.welcome-card{
  width:280px;
  border-radius:18px;
  cursor:pointer;
  animation:pulse 4s infinite;
}
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.03);}
  100%{transform:scale(1);}
}

.button-row{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0;
}

button{
  padding:12px 18px;
  border-radius:999px;
  border:none;
  background:#b77d64;
  color:white;
  cursor:pointer;
}

.shop-links{
  display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:20px 0;
}

.link-button{
  padding:14px 24px;
  border-radius:999px;
  background:#5a5136;
  color:#fff;
  text-decoration:none;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

/* ✨ Sparkle effect */
.sparkle-btn::before{
  content:"✨";
  position:absolute;
  left:-20px;
  top:50%;
  transform:translateY(-50%);
  opacity:0;
}

.sparkle-btn:hover::before{
  animation:sparkleMove 1.2s ease forwards;
}

@keyframes sparkleMove{
  0%{left:-20px;opacity:0;}
  20%{opacity:1;}
  100%{left:110%;opacity:0;}
}

/* 🌿 Overlay */
.overlay-book{
  position:fixed;
  inset:0;
  background:rgba(10,15,10,0.85);
  backdrop-filter:blur(6px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.overlay-content{
  width:90%;
  height:90%;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  animation:fadeIn 0.8s ease;
}

.overlay-content iframe{
  width:100%;
  height:100%;
  border:none;
}

.close-overlay{
  position:absolute;
  top:10px;
  right:16px;
  font-size:24px;
  cursor:pointer;
  color:white;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(0.95);}
  to{opacity:1;transform:scale(1);}
}

.message-box{
  margin-top:20px;
  display:none;
}
</style>
</head>

<body>

<div class="soft-lights">
  <div class="light"></div>
  <div class="light"></div>
</div>

<div class="page-wrap">

<h1>Fox Wisdom Oracle</h1>

<div class="blessing">
Pause beneath the trees.<br>
Listen for what stirs in the quiet.
</div>

<img src="fox-welcome-page.jpg" class="welcome-card" onclick="drawCard()">

<div class="button-row">
<button onclick="drawCard()">Daily Fox Message</button>
<button onclick="drawThree()">Three Card Spread</button>
</div>

<div class="shop-links">
<a class="link-button" href="https://www.amazon.com/dp/B0GSWQJ65W" target="_blank">
Buy the Book
</a>

<a class="link-button sparkle-btn" onclick="openFoxBook()">
✨ Step Into the Fox Book
</a>
</div>

<div id="messageBox" class="message-box"></div>

</div>

<!-- 🌿 Overlay -->
<div id="foxOverlay" class="overlay-book">
  <div class="overlay-content">
    <span class="close-overlay" onclick="closeFoxBook()">✕</span>
    <iframe src="https://journey-through-the-mushroom-trip-oracle.my.canva.site/fox-wisdom-oracle-book-5-125-x-8-25-in"></iframe>
  </div>
</div>

<script>
const cards = [
{title:"Hidden Path",message:"A new path is opening."},
{title:"Quiet Observation",message:"Watch and wait."},
{title:"Autumn Wisdom",message:"Release what is ready."}
];

function drawCard(){
  const c = cards[Math.floor(Math.random()*cards.length)];
  document.getElementById("messageBox").style.display="block";
  document.getElementById("messageBox").innerHTML=
  "<h3>"+c.title+"</h3><p>"+c.message+"</p>";
}

function drawThree(){
  drawCard();
}

/* 🌿 Overlay functions */
function openFoxBook(){
  document.getElementById("foxOverlay").style.display="flex";
}

function closeFoxBook(){
  document.getElementById("foxOverlay").style.display="none";
}
</script>

</body>
</html>
