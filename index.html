<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Wisdom Oracle</title>

<style>
body{
  font-family:Georgia, serif;
  text-align:center;
  background:
    linear-gradient(rgba(16,22,16,0.6), rgba(16,22,16,0.85)),
    url("forest-bg.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  margin:0;
  color:#f5e9c8;
}

h1{
  font-size:3rem;
  margin-top:20px;
}

.blessing{
  max-width:700px;
  margin:10px auto;
  line-height:1.6;
}

.welcome-card{
  width:280px;
  border-radius:20px;
  margin-top:20px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}
.welcome-card:hover{
  transform:scale(1.03);
}

.button-row{
  margin-top:20px;
}
button{
  margin:6px;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#b77d64;
  color:white;
  cursor:pointer;
}

.shop-links{
  margin-top:25px;
}

.link-button{
  display:inline-block;
  margin:8px;
  padding:14px 22px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:#6b6241;
  transition:0.3s;
}
.link-button:hover{
  transform:translateY(-3px);
}

.message-box{
  margin-top:25px;
}
</style>
</head>

<body>

<h1>Fox Wisdom Oracle</h1>

<div class="blessing">
Pause beneath the trees.<br>
Listen for what stirs in the quiet.<br>
When you are ready, choose your path.
</div>

<img
  id="mainCard"
  class="welcome-card"
  src="fox-welcome-page.jpg"
  onclick="drawCard()"
>

<div class="button-row">
  <button onclick="drawCard()">Daily Message</button>
  <button onclick="window.location.href='guidebook.html'">Guidebook</button>
</div>

<div class="shop-links">

  <a class="link-button"
     href="https://www.amazon.com/dp/B0GSWQJ65W"
     target="_blank">
     📖 Buy the Book
  </a>

  <a class="link-button"
     href="https://www.printerstudio.com/sell/designs/fox-wisdom-oracle.html"
     target="_blank">
     🦊 Physical Card Deck
  </a>

  <a class="link-button"
     href="https://dolphintouch.github.io/whispers-of-nature-oracle/"
     target="_blank">
     🌿 Whispers of Nature Oracle
  </a>

</div>

<div class="message-box">
  <h3 id="title">Your Message</h3>
  <p id="message">Tap the card above</p>
</div>

<script>
const cards = [
  {
    title: "Quiet Observation",
    image: "quiet observation.jpg",
    message: "Stillness brings wisdom. Watch before acting."
  },
  {
    title: "Hidden Path",
    image: "hidden path.jpg",
    message: "Not everything is meant to be seen at once."
  },
  {
    title: "Moonlight Trail",
    image: "moonlight trail.jpg",
    message: "Trust the gentle pull forward."
  }
];

function drawCard(){
  const card = cards[Math.floor(Math.random()*cards.length)];

  document.getElementById("mainCard").src = card.image;
  document.getElementById("title").innerText = card.title;
  document.getElementById("message").innerText = card.message;
}
</script>

</body>
</html>
