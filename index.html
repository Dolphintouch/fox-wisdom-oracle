<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fox Wisdom Oracle</title>

  <style>
    *{box-sizing:border-box;}
    body{
      font-family:Georgia, serif;
      text-align:center;
      background-image:
        linear-gradient(rgba(16,22,16,0.56), rgba(16,22,16,0.76)),
        url("forest-bg.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      padding:16px;
      margin:0;
      color:#f5e9c8;
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,220,140,0.07), transparent 20%),
        radial-gradient(circle at 80% 25%, rgba(255,230,170,0.06), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(255,240,190,0.05), transparent 24%);
      pointer-events:none;
      z-index:0;
    }

    .soft-lights{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;}
    .light{
      position:absolute; width:7px; height:7px; border-radius:50%;
      background:rgba(255,234,173,0.9);
      box-shadow:0 0 12px rgba(255,232,180,0.85);
      animation:floatLight linear infinite; opacity:0.7;
    }

    @keyframes floatLight{
      0%{transform:translateY(0) translateX(0) scale(0.8); opacity:0;}
      20%{opacity:0.75;}
      70%{opacity:0.85;}
      100%{transform:translateY(-220px) translateX(24px) scale(1.25); opacity:0;}
    }

    .page-wrap{position:relative; z-index:2; max-width:1100px; margin:0 auto; padding-bottom:60px;}

    .top-credit{font-size:1rem; color:#f2dcc4; margin:10px;}
    h1{font-size:clamp(2.3rem,6vw,4.4rem); color:#f2dfcb;}

    .button-row{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin:20px auto;
    }

    button{
      padding:13px 20px;
      border-radius:999px;
      background:linear-gradient(to bottom, #c99278, #b77d64);
      color:#fff4eb;
      border:none;
      cursor:pointer;
    }

    .sparkle-btn{position:relative;}
  </style>
</head>

<body>

<div class="page-wrap">

<h1>Fox Wisdom Oracle</h1>

<div class="button-row">
  <button onclick="startReading('daily')">Daily Fox Message</button>
  <button onclick="startReading('hidden')">Three Card Spread</button>
  <button onclick="startReading('cross')">Ancient Forest Woodland Cross</button>
  <button onclick="window.location.href='guidebook.html'">Fox Guidebook</button>

  <!-- ✨ NEW BUTTON -->
  <button class="sparkle-btn" onclick="window.location.href='in-between-moments.html'">
    ✨ In-Between Moments Oracle
  </button>

  <button onclick="window.location.href='fungal-realms.html'">🍄 Fungal Realms</button>
  <button onclick="window.location.href='between-you-and-them.html'">Between You and Them</button>
  <button onclick="window.location.href='cottage-garden/'">🌿 Cottage Garden Oracle</button>
  <button onclick="window.location.href='whispers-of-nature.html'">🌿 Whispers of Nature</button>
  <button onclick="toggleSound()" id="soundButton">Forest Sounds: Off</button>
</div>

</div>

</body>
</html>
