<!DOCTYPE html>
<html>
<head>
<title>Fox Wisdom Oracle</title>

<style>

body{
font-family: Georgia, serif;
text-align:center;
background-image:url("forest-bg.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
padding:30px;
margin:0;
color:#f5e9c8;
}

h1{
color:#f0d890;
}

.hidden{
display:none;
}

.button{
font-size:20px;
padding:14px 24px;
margin:10px;
cursor:pointer;
border:none;
border-radius:10px;
background:#f2e1b0;
}

.button:hover{
transform:scale(1.05);
}

.card{
width:280px;
max-width:90%;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.4);
cursor:pointer;
transition:transform 0.4s;
}

.card:hover{
transform:scale(1.03);
}

.small-card{
width:200px;
}

.card-row{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:25px;
}

.label{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

</style>

</head>

<body>

<div id="home-screen">

<h1>Fox Wisdom Oracle</h1>

<img src="fox-home.jpg" style="width:360px; max-width:90%; border-radius:14px; box-shadow:0 6px 18px rgba(0,0,0,0.35);">

<p>
Pause for a moment.<br>
Ask your question.<br>
Choose your reading.
</p>

<button class="button" onclick="showSingle()">Single Card</button>
<button class="button" onclick="showThree()">Three Card Spread</button>
<button class="button" onclick="showDaily()">Daily Fox Message</button>

</div>

<div id="single-screen" class="hidden">

<h1>Single Card Reading</h1>

<p>Tap the card to reveal your fox message</p>

<img id="single-card" class="card" src="card back.jpg" onclick="drawSingle()">

<br><br>

<button class="button" onclick="resetSingle()">Shuffle Again</button>
<button class="button" onclick="goHome()">Back</button>

</div>

<div id="three-screen" class="hidden">

<h1>Three Card Spread</h1>

<p>Tap each card to reveal your message</p>

<div class="card-row">

<div>
<div class="label">Past</div>
<img id="past" class="card small-card" src="card back.jpg" onclick="drawThree('past')">
</div>

<div>
<div class="label">Present</div>
<img id="present" class="card small-card" src="card back.jpg" onclick="drawThree('present')">
</div>

<div>
<div class="label">Future</div>
<img id="future" class="card small-card" src="card back.jpg" onclick="drawThree('future')">
</div>

</div>

<br>

<button class="button" onclick="resetThree()">Shuffle Again</button>
<button class="button" onclick="goHome()">Back</button>

</div>

<div id="daily-screen" class="hidden">

<h1>Daily Fox Message</h1>

<p>Your fox message for today</p>

<img id="daily-card" class="card">

<br><br>

<button class="button" onclick="showDaily()">Refresh</button>
<button class="button" onclick="goHome()">Back</button>

</div>

<script>

var cards = [

"autumn wisdom.jpg",
"crossing paths.jpg",
"dancing shadows.jpg",
"ember eyes.jpg",
"fern shadows.jpg",
"forest instinct.jpg",
"forest secrets.jpg",
"fox fire.jpg",
"gentle cunning.jpg",
"hidden path.jpg",
"hidden shelter.jpg",
"moonlight trail.jpg",
"moonlit watch.jpg",
"morning tracks.jpg",
"quiet observation.jpg",
"quiet territory.jpg",
"rustling leaves.jpg",
"silent steps1.jpg",
"the clever escape.jpg",
"the clever plan.jpg",
"the forest edge.jpg",
"the guiding paw.jpg",
"the hidden den.jpg",
"the old trail.jpg",
"the patient hunter.jpg",
"the returning path.jpg",
"the silent clearing.jpg",
"the turning season.jpg",
"the twilight path.jpg",
"the wandering fox.jpg",
"watcher.jpg",
"the listening hollow.jpg"

];

function randomCard(){
return cards[Math.floor(Math.random()*cards.length)];
}

function hideAll(){
document.getElementById("home-screen").classList.add("hidden");
document.getElementById("single-screen").classList.add("hidden");
document.getElementById("three-screen").classList.add("hidden");
document.getElementById("daily-screen").classList.add("hidden");
}

function goHome(){
hideAll();
document.getElementById("home-screen").classList.remove("hidden");
}

function showSingle(){
hideAll();
document.getElementById("single-screen").classList.remove("hidden");
resetSingle();
}

function drawSingle(){
document.getElementById("single-card").src=randomCard();
}

function resetSingle(){
document.getElementById("single-card").src="card back.jpg";
}

function showThree(){
hideAll();
document.getElementById("three-screen").classList.remove("hidden");
resetThree();
}

function drawThree(card){
document.getElementById(card).src=randomCard();
}

function resetThree(){
document.getElementById("past").src="card back.jpg";
document.getElementById("present").src="card back.jpg";
document.getElementById("future").src="card back.jpg";
}

function showDaily(){

hideAll();
document.getElementById("daily-screen").classList.remove("hidden");

var today=new Date();
var key=today.getFullYear()+""+today.getMonth()+""+today.getDate();

var hash=0;

for(var i=0;i<key.length;i++){
hash=key.charCodeAt(i)+((hash<<5)-hash);
}

var index=Math.abs(hash)%cards.length;

document.getElementById("daily-card").src=cards[index];

}

</script>

</body>
</html>
