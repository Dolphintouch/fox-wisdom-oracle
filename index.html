<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fox Wisdom Oracle</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      text-align: center;
      color: #fff;
      background: url('forest-bg.jpg') center/cover no-repeat fixed;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      z-index: -1;
    }

    .floating {
      position: fixed;
      width: 8px;
      height: 8px;
      background: rgba(255, 220, 140, 0.85);
      border-radius: 50%;
      animation: floatUp linear infinite;
      pointer-events: none;
      box-shadow: 0 0 12px rgba(255, 220, 140, 0.7);
      z-index: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }

    .page-content {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    .hero {
      width: 90%;
      max-width: 700px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 2.6rem;
      margin: 20px 0 10px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .intro {
      max-width: 720px;
      margin: 0 auto 20px;
      font-size: 1.1rem;
      line-height: 1.6;
      text-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }

    .welcome {
      width: 260px;
      max-width: 80vw;
      margin: 30px auto 15px;
      cursor: pointer;
      border-radius: 20px;
      display: block;
      animation: glow 3s infinite;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    @keyframes glow {
      0%, 100% {
        box-shadow: 0 0 12px rgba(255, 240, 180, 0.45), 0 8px 24px rgba(0,0,0,0.35);
      }
      50% {
        box-shadow: 0 0 28px rgba(255, 215, 120, 0.8), 0 8px 24px rgba(0,0,0,0.35);
      }
    }

    .welcome-text {
      margin-bottom: 22px;
      font-size: 1rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }

    .controls {
      margin: 10px 0 24px;
    }

    button {
      margin: 6px;
      padding: 11px 18px;
      border-radius: 22px;
      border: none;
      cursor: pointer;
      font-size: 0.98rem;
      font-family: Georgia, serif;
      background: rgba(255,255,255,0.9);
      color: #4a2f1d;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.32);
    }

    .spread {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 20px;
      min-height: 220px;
    }

    .card {
      width: 180px;
      max-width: 42vw;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      display: block;
    }

    .card p {
      margin-top: 8px;
      font-size: 0.98rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .portal {
      margin-top: 40px;
    }

    .portal h3 {
      margin-bottom: 15px;
      font-size: 1.3rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }

    .portal a {
      display: inline-block;
      text-decoration: none;
    }

    .portal img {
      width: 250px;
      max-width: 80vw;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(220, 255, 180, 0.3), 0 8px 24px rgba(0,0,0,0.35);
      transition: transform 0.25s ease;
    }

    .portal img:hover {
      transform: translateY(-4px) scale(1.02);
    }

    .footer {
      margin: 40px 0 20px;
      font-size: 0.95rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 20;
    }

    .modal-content {
      background: rgba(35, 24, 18, 0.95);
      border-radius: 20px;
      max-width: 850px;
      width: 100%;
      padding: 22px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      color: #fff;
      box-shadow: 0 12px 36px rgba(0,0,0,0.4);
      position: relative;
    }

    .modal-content img {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .modal-text {
      text-align: left;
      align-self: center;
    }

    .modal-text h2 {
      margin-top: 0;
      font-size: 2rem;
    }

    .modal-text p {
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: none;
    }

    @media (max-width: 700px) {
      .modal-content {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .modal-text {
        text-align: center;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <div class="page-content">
    <img src="fox-home.jpg" class="hero" alt="Fox Wisdom Oracle">

    <h1>Fox Wisdom Oracle</h1>

    <p class="intro">
      Follow the quiet knowing. Trust the unseen path. Let fox wisdom guide you
      through hidden trails, soft instincts, and the hush of the woodland heart.
    </p>

    <img src="fox-welcome-page.jpg" class="welcome" alt="Fox Welcome Card" onclick="drawOne()">

    <div class="welcome-text">Tap the glowing card to begin your reading.</div>

    <div class="controls">
      <button onclick="drawOne()">Draw One Card</button>
      <button onclick="drawThree()">3 Card Spread</button>
      <button onclick="drawSeven()">7 Card Spread</button>
      <button onclick="clearCards()">Clear</button>
    </div>

    <div id="reading" class="spread"></div>

    <div class="portal">
      <h3>Step into another deck</h3>
      <a href="whispers-of-nature.html">
        <img src="whispers-home.jpg" alt="Whispers of Nature">
      </a>
    </div>

    <div class="footer">Created with love by Dolphintouch</div>
  </div>

  <div id="cardModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModalButton()">&times;</button>
      <img id="modalImg" src="" alt="">
      <div class="modal-text">
        <h2 id="modalTitle"></h2>
        <p id="modalMessage"></p>
      </div>
    </div>
  </div>

  <script>
    setInterval(() => {
      const f = document.createElement("div");
      f.className = "floating";
      f.style.left = Math.random() * 100 + "vw";
      f.style.animationDuration = (5 + Math.random() * 6) + "s";
      document.body.appendChild(f);

      setTimeout(() => f.remove(), 9000);
    }, 550);

    const cards = [
      {
        name: "Autumn Wisdom",
        img: "autumn wisdom.jpg",
        meaning: "Change is not the end of your beauty. What falls away now is making room for a deeper becoming."
      },
      {
        name: "Moonlit Trail",
        img: "moonlit trail.jpg",
        meaning: "Even in uncertainty, there is still a path. Trust what softly glows ahead."
      },
      {
        name: "Hidden Path",
        img: "hidden path.jpg",
        meaning: "Not all answers arrive at once. Some truths reveal themselves only as you begin to move."
      },
      {
        name: "Quiet Observation",
        img: "quiet observation.jpg",
        meaning: "There is power in watching before acting. What you notice now may change everything."
      },
      {
        name: "Winter Watch",
        img: "winter watch.jpg",
        meaning: "Rest is not wasted time. Sacred stillness prepares you for what must come next."
      },
      {
        name: "Foxfire",
        img: "foxfire.jpg",
        meaning: "A spark is returning to you. Follow the ember of excitement, even if it begins very small."
      },
      {
        name: "The Listening Hollow",
        img: "the listening hollow.jpg",
        meaning: "The forest speaks in silence. Make room to hear what your deeper self has been trying to tell you."
      }
    ];

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function drawOne() {
      clearCards();
      const chosen = cards[Math.floor(Math.random() * cards.length)];
      showCards([chosen]);
    }

    function drawThree() {
      clearCards();
      showCards(shuffle(cards).slice(0, 3));
    }

    function drawSeven() {
      clearCards();
      showCards(shuffle(cards).slice(0, 7));
    }

    function showCards(list) {
      const area = document.getElementById("reading");

      list.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <img src="${card.img}" alt="${card.name}">
          <p>${card.name}</p>
        `;
        div.onclick = () => openModal(card);
        area.appendChild(div);
      });
    }

    function clearCards() {
      document.getElementById("reading").innerHTML = "";
    }

    function openModal(card) {
      document.getElementById("modalImg").src = card.img;
      document.getElementById("modalImg").alt = card.name;
      document.getElementById("modalTitle").textContent = card.name;
      document.getElementById("modalMessage").textContent = card.meaning;
      document.getElementById("cardModal").style.display = "flex";
    }

    function closeModal(event) {
      if (event.target.id === "cardModal") {
        document.getElementById("cardModal").style.display = "none";
      }
    }

    function closeModalButton() {
      document.getElementById("cardModal").style.display = "none";
    }
  </script>

</body>
</html>
