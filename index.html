<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fox Wisdom Oracle</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      font-family:Georgia, serif;
      text-align:center;
      background-image:
        linear-gradient(rgba(16,22,16,0.55), rgba(16,22,16,0.72)),
        url("forest-bg.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      padding:16px;
      margin:0;
      color:#f5e9c8;
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,220,140,0.07), transparent 20%),
        radial-gradient(circle at 80% 25%, rgba(255,230,170,0.06), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(255,240,190,0.05), transparent 24%);
      pointer-events:none;
      z-index:0;
    }

    .soft-lights{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .light{
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:rgba(255,234,173,0.9);
      box-shadow:0 0 12px rgba(255,232,180,0.85);
      animation:floatLight linear infinite;
      opacity:0.7;
    }

    .light:nth-child(1){ left:8%; top:85%; animation-duration:12s; animation-delay:0s; }
    .light:nth-child(2){ left:20%; top:75%; animation-duration:14s; animation-delay:2s; }
    .light:nth-child(3){ left:30%; top:88%; animation-duration:13s; animation-delay:4s; }
    .light:nth-child(4){ left:45%; top:78%; animation-duration:16s; animation-delay:1s; }
    .light:nth-child(5){ left:60%; top:85%; animation-duration:14s; animation-delay:3s; }
    .light:nth-child(6){ left:74%; top:79%; animation-duration:15s; animation-delay:5s; }
    .light:nth-child(7){ left:86%; top:86%; animation-duration:12s; animation-delay:6s; }
    .light:nth-child(8){ left:54%; top:70%; animation-duration:17s; animation-delay:2.5s; }

    @keyframes floatLight{
      0%{
        transform:translateY(0) translateX(0) scale(0.8);
        opacity:0;
      }
      20%{
        opacity:0.75;
      }
      70%{
        opacity:0.85;
      }
      100%{
        transform:translateY(-220px) translateX(24px) scale(1.25);
        opacity:0;
      }
    }

    .page-wrap{
      position:relative;
      z-index:1;
      max-width:1200px;
      margin:0 auto;
      padding-bottom:40px;
    }

    .top-credit{
      font-size:1rem;
      color:#f2dcc4;
      margin-top:4px;
      margin-bottom:10px;
      text-shadow:0 1px 3px rgba(0,0,0,0.45);
    }

    h1{
      margin:10px 0 10px;
      font-size:clamp(2.2rem, 6vw, 4.3rem);
      line-height:1.08;
      color:#f2dfcb;
      text-shadow:0 2px 8px rgba(0,0,0,0.35);
    }

    .hero-wrap{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      margin:18px auto 16px;
      min-height:260px;
    }

    .hero-mist{
      position:absolute;
      width:430px;
      height:430px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,240,205,0.18) 0%, rgba(255,232,185,0.10) 28%, rgba(255,225,165,0.04) 48%, transparent 72%);
      filter:blur(42px);
      animation:mistGlow 7s ease-in-out infinite alternate;
      opacity:0.72;
      z-index:1;
    }

    .hero-fox{
      position:relative;
      z-index:2;
      max-width:380px;
      width:85%;
      display:block;
      margin:0 auto;
      border-radius:20px;
      box-shadow:
        0 0 22px rgba(255,220,150,0.22),
        0 0 40px rgba(255,220,150,0.18),
        0 10px 30px rgba(0,0,0,0.35);
      opacity:0.96;
      animation:heroBreath 5.5s ease-in-out infinite;
    }

    @keyframes heroBreath{
      0%{
        transform:scale(1);
        box-shadow:
          0 0 18px rgba(255,220,150,0.16),
          0 0 34px rgba(255,220,150,0.12),
          0 10px 30px rgba(0,0,0,0.35);
      }
      50%{
        transform:scale(1.02);
        box-shadow:
          0 0 28px rgba(255,225,165,0.26),
          0 0 54px rgba(255,225,165,0.20),
          0 14px 34px rgba(0,0,0,0.38);
      }
      100%{
        transform:scale(1);
        box-shadow:
          0 0 18px rgba(255,220,150,0.16),
          0 0 34px rgba(255,220,150,0.12),
          0 10px 30px rgba(0,0,0,0.35);
      }
    }

    .blessing{
      max-width:760px;
      margin:0 auto 22px;
      color:#f6ead8;
      font-size:clamp(1.02rem, 2.2vw, 1.35rem);
      line-height:1.8;
      text-shadow:0 1px 4px rgba(0,0,0,0.38);
    }

    .blessing em{
      font-style:normal;
      color:#fff4e8;
    }

    .card-area{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:440px;
      margin-top:6px;
      margin-bottom:10px;
    }

    .mist{
      position:absolute;
      width:440px;
      height:440px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,240,205,0.19) 0%, rgba(255,232,185,0.10) 28%, rgba(255,225,165,0.04) 48%, transparent 72%);
      filter:blur(42px);
      animation:mistGlow 7s ease-in-out infinite alternate;
      opacity:0.72;
      z-index:1;
    }

    .mist::before,
    .mist::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,245,220,0.12), transparent 68%);
      filter:blur(30px);
    }

    .mist::before{
      transform:translate(-18px, 12px) scale(0.92);
    }

    .mist::after{
      transform:translate(16px, -10px) scale(1.06);
    }

    @keyframes mistGlow{
      0%{
        transform:scale(0.95);
        opacity:0.45;
      }
      100%{
        transform:scale(1.16);
        opacity:0.9;
      }
    }

    .draw-card{
      position:relative;
      z-index:2;
      width:min(280px, 72vw);
      max-width:280px;
      border-radius:18px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.14),
        0 12px 24px rgba(0,0,0,0.28),
        0 0 34px rgba(255,223,160,0.10);
      cursor:pointer;
      transition:
        transform 0.35s ease,
        box-shadow 0.35s ease,
        filter 0.35s ease;
      filter:brightness(0.98);
      user-select:none;
      -webkit-user-drag:none;
    }

    .draw-card:hover{
      transform:translateY(-4px) scale(1.02);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 18px 38px rgba(0,0,0,0.30),
        0 0 42px rgba(255,226,168,0.20);
      filter:brightness(1.03);
    }

    .draw-card.shuffling{
      animation:deckShuffle 0.8s ease-in-out 3;
    }

    @keyframes deckShuffle{
      0%{ transform:translateX(0) rotate(0deg) scale(1); }
      20%{ transform:translateX(-14px) rotate(-4deg) scale(1.01); }
      40%{ transform:translateX(14px) rotate(4deg) scale(1.01); }
      60%{ transform:translateX(-10px) rotate(-3deg) scale(1.01); }
      80%{ transform:translateX(10px) rotate(3deg) scale(1.01); }
      100%{ transform:translateX(0) rotate(0deg) scale(1); }
    }

    .button-row{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin:18px auto 18px;
      max-width:1100px;
    }

    button{
      border:none;
      padding:13px 20px;
      border-radius:999px;
      background:linear-gradient(to bottom, #c99278, #b77d64);
      color:#fff4eb;
      font-family:Georgia, serif;
      font-size:1rem;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(255,255,255,0.22);
      transition:transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 14px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.24);
    }

    .oracle-card{
      position:relative;
      z-index:2;
      width:min(280px, 72vw);
      max-width:280px;
      border-radius:18px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.14),
        0 12px 24px rgba(0,0,0,0.28),
        0 0 34px rgba(255,223,160,0.10);
      opacity:0.75;
      transform:translateY(14px) scale(0.94);
      transition:
        opacity 0.9s ease,
        transform 0.9s ease,
        box-shadow 0.9s ease,
        filter 0.9s ease;
      filter:brightness(0.96);
    }

    .oracle-card.reveal{
      opacity:1;
      transform:translateY(0) scale(1.03);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 18px 38px rgba(0,0,0,0.30),
        0 0 42px rgba(255,226,168,0.28);
      filter:brightness(1.03);
    }

    .cards-grid{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:28px;
      margin-top:22px;
      padding:0 8px 30px;
    }

    .card-slot{
      width:min(280px, 84vw);
      text-align:center;
    }

    .card-slot h3{
      margin:0 0 12px;
      font-size:1.08rem;
      color:#f6e5d2;
      text-shadow:0 1px 4px rgba(0,0,0,0.35);
    }

    .card-slot .mist{
      width:300px;
      height:300px;
    }

    .card-slot .card-area{
      min-height:360px;
      margin-top:0;
    }

    .message-box{
      max-width:900px;
      margin:20px auto 0;
      padding:18px 20px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.16);
      background:rgba(255,255,255,0.09);
      backdrop-filter:blur(3px);
      -webkit-backdrop-filter:blur(3px);
      box-shadow:0 6px 16px rgba(0,0,0,0.15);
      display:none;
      white-space:pre-line;
    }

    .message-box.show{
      display:block;
    }

    .message-box h3{
      margin:0 0 10px;
      font-size:1.45rem;
      color:#f7e8d6;
    }

    .message-box p{
      margin:0;
      font-size:1.06rem;
      line-height:1.7;
      color:#fff3e8;
    }

    .footer-note{
      margin-top:26px;
      font-size:0.92rem;
      color:#ead8c8;
      opacity:0.95;
    }

    @media (max-width:700px){
      body{
        padding:12px 10px;
      }

      .hero-wrap{
        min-height:220px;
      }

      .hero-mist{
        width:320px;
        height:320px;
      }

      .card-area{
        min-height:360px;
      }

      button{
        width:100%;
        max-width:360px;
      }

      .cards-grid{
        gap:22px;
      }

      .message-box p{
        font-size:1rem;
      }
    }
  </style>
</head>
<body>

  <div class="soft-lights">
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
  </div>

  <div class="page-wrap">
    <div class="top-credit">@Dolphintouch (Michelle Billiau-Morseu)</div>

    <h1>Fox Wisdom Oracle</h1>

    <div class="hero-wrap">
      <div class="hero-mist"></div>
      <img src="fox-home.jpg" class="hero-fox" alt="Fox Spirit of the Forest">
    </div>

    <div class="blessing">
      <em>Pause beneath the trees.</em><br>
      <em>Listen for what stirs in the quiet.</em><br>
      <em>When you are ready, tap the card.</em>
    </div>

    <div id="readingArea">
      <div class="card-area">
        <div class="mist"></div>
        <img id="mainDeckCard" class="draw-card" src="card back.jpg" alt="Tap to draw your daily fox message" onclick="drawDailyCardFromCard()">
      </div>
    </div>

    <div class="button-row">
      <button onclick="drawDailyCard()">Daily Fox Message</button>
      <button onclick="drawHiddenPath()">Hidden Path Spread</button>
      <button onclick="drawWoodlandCross()">Ancient Forest Woodland Cross</button>
      <button onclick="toggleSound()" id="soundButton">Forest Sounds: Off</button>
    </div>

    <div id="messageBox" class="message-box">
      <h3 id="messageTitle">Your Fox Message</h3>
      <p id="messageText"></p>
    </div>

    <div class="footer-note">
      Fox Wisdom Oracle © Dolphintouch
    </div>
  </div>

  <audio id="forestAudio" loop>
    <source src="forest.mp3.mp3" type="audio/mpeg">
  </audio>

  <script>

      },
      {

      },
      {
        title: "Fox Fire",

      },
      {

        image: "the listening hollow.jpg",

      },
      {

        image: "rustling leaves.jpg",
        message: "Subtle movement surrounds you. Pay attention to whispers, signs, and shifting energy."
      },
      {

        image: "crossing paths.jpg",
        message: "An important meeting, choice, or turning point is near. Walk with awareness."
      },
      {

        message: "Past wisdom still has something to offer. Return to what once grounded you and see it with fresh eyes."
      },
      {

        image: "autumn wisdom.jpg",
        message: "There is beauty in letting go. Release what has completed its season and trust what remains."
      },
      {
        title: "Dancing Shadows",
        image: "dancing shadows.jpg",
        message: "Movement in the unseen may be calling your attention. Watch what flickers at the edge."
      },
      {
        title: "Ember Eyes",
        image: "ember eyes.jpg",
        message: "A quiet fire still burns. Your vision is stronger than you realize."
      },
      {
        title: "Fern Shadows",
        image: "fern shadows.jpg",
        message: "Not all truths stand in full light. Some reveal themselves gently through quiet observation."
      },
      {
        title: "Forest Instinct",
        image: "forest insitinct.jpg",
        message: "Trust what your deeper nature already knows."
      },
      {
        title: "Forest Secrets",
        image: "forest secrets.jpg",
        message: "Something hidden is waiting to be understood. Stay close to your intuition."
      },
      {
        title: "Gentle Cunning",
        image: "gentle cunning.jpg",
        message: "Wisdom does not always arrive loudly. Quiet intelligence may serve you best now."

      {

      {

        image: "morninng tracks.jpg",
        message: "Fresh signs are appearing. A new beginning is leaving footprints."
      },
      {
        title: "Quiet Territory",
        image: "quiet territory.jpg",
        message: "Guard your peace. Not every space is meant for everyone."
      },
      {

        image: "silent steps1.jpg",
        message: "Move quietly and with care. Gentle progress is still progress."

      {

        message: "A way through exists. Trust your instinct and move with grace."
      },
      {

        image: "the clever plan.jpg",

      },
      {

      },
      {

      },
      {

        message: "There is strength in privacy, safety, and sacred inner space."
      },
      {
        title: "The Patient Hunter",
        image: "the patient hunter.jpg",
        message: "Timing matters. Wait until the moment is truly right."
      },
      {

      },
      {

        message: "Peace can be found in still places. Pause and breathe."

        message: "You do not need full daylight to begin. Trust the dim glow ahead."

      {

        message: "Exploration has purpose. Not all wandering is being lost."

        message: "Stay observant. Something important is revealing itself slowly."
      }
    ];

    let soundOn = false;
    let isDrawing = false;

    function getRandomCard(excludeTitles = []) {
      const available = cards.filter(card => !excludeTitles.includes(card.title));
      return available[Math.floor(Math.random() * available.length)];
    }

    function getDailyCard() {
      const today = new Date().toDateString();
      const savedDate = localStorage.getItem("foxDailyDate");
      let dailyCard;

      if (savedDate === today) {
        const savedTitle = localStorage.getItem("foxDailyCardTitle");
        dailyCard = cards.find(card => card.title === savedTitle) || getRandomCard();
      } else {
        dailyCard = getRandomCard();
        localStorage.setItem("foxDailyDate", today);
        localStorage.setItem("foxDailyCardTitle", dailyCard.title);
      }

      return dailyCard;
    }

    function revealCardImage(imgElement, imageSrc, altText) {
      imgElement.classList.remove("reveal");
      imgElement.src = "card back.jpg";
      imgElement.alt = "Fox Wisdom Oracle card back";

      setTimeout(() => {
        const tempImg = new Image();

        tempImg.onload = () => {
          imgElement.src = imageSrc;
          imgElement.alt = altText;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              imgElement.classList.add("reveal");
            });
          });
        };

        tempImg.onerror = () => {
          imgElement.src = "card back.jpg";
          imgElement.alt = "Image not found";
          imgElement.classList.add("reveal");
        };

        tempImg.src = imageSrc;
      }, 220);
    }

    function shuffleDeckThenReveal(card) {
      if (isDrawing) return;
      isDrawing = true;

      const deckCard = document.getElementById("mainDeckCard");
      if (!deckCard) {
        isDrawing = false;
        showSingleCard(card, "Daily Fox Message");
        return;
      }

      deckCard.classList.add("shuffling");

      setTimeout(() => {
        deckCard.classList.remove("shuffling");
        showSingleCard(card, "Daily Fox Message");
        isDrawing = false;
      }, 2400);
    }

    function drawDailyCardFromCard() {
      const dailyCard = getDailyCard();
      shuffleDeckThenReveal(dailyCard);
    }

    function drawDailyCard() {
      const dailyCard = getDailyCard();
      showSingleCard(dailyCard, "Daily Fox Message");
    }

    function showSingleCard(card, headingText) {
      const readingArea = document.getElementById("readingArea");
      readingArea.innerHTML = `
        <div class="card-area">
          <div class="mist"></div>
          <img id="mainCard" class="oracle-card" src="card back.jpg" alt="Fox Wisdom Oracle card back">
        </div>
      `;

      const messageBox = document.getElementById("messageBox");
      const messageTitle = document.getElementById("messageTitle");
      const messageText = document.getElementById("messageText");

      messageTitle.textContent = headingText + ": " + card.title;
      messageText.textContent = card.message;
      messageBox.classList.add("show");

      const img = document.getElementById("mainCard");
      setTimeout(() => {
        revealCardImage(img, card.image, card.title);
      }, 250);
    }

    function showMultiCardSpread(spreadTitle, spreadCards) {
      const readingArea = document.getElementById("readingArea");

      let html = `<div class="cards-grid">`;

      spreadCards.forEach((item, index) => {
        html += `
          <div class="card-slot">
            <h3>${item.position}</h3>
            <div class="card-area">
              <div class="mist"></div>
              <img id="spreadCard${index}" class="oracle-card" src="card back.jpg" alt="Fox Wisdom Oracle card back">
            </div>
          </div>
        `;
      });

      html += `</div>`;
      readingArea.innerHTML = html;

      const messageBox = document.getElementById("messageBox");
      const messageTitle = document.getElementById("messageTitle");
      const messageText = document.getElementById("messageText");

      messageTitle.textContent = spreadTitle;

      let fullMessage = "";
      spreadCards.forEach(item => {
        fullMessage += item.position + " — " + item.card.title + ": " + item.card.message + "\n\n";
      });

      messageText.innerText = fullMessage.trim();
      messageBox.classList.add("show");

      spreadCards.forEach((item, index) => {
        const img = document.getElementById("spreadCard" + index);
        setTimeout(() => {
          revealCardImage(img, item.card.image, item.card.title);
        }, 250 + (index * 350));
      });
    }

    function drawHiddenPath() {
      const first = getRandomCard();
      const second = getRandomCard([first.title]);
      const third = getRandomCard([first.title, second.title]);

      showMultiCardSpread("Hidden Path Spread", [
        { position: "What you may not yet see", card: first },
        { position: "What path is opening", card: second },
        { position: "The wisdom of the fox", card: third }
      ]);
    }

    function drawWoodlandCross() {
      const picked = [];
      while (picked.length < 5) {
        const card = getRandomCard(picked.map(c => c.title));
        picked.push(card);
      }

      showMultiCardSpread("Ancient Forest Woodland Cross", [
        { position: "Your present energy", card: picked[0] },
        { position: "What is hidden", card: picked[1] },
        { position: "What guides you", card: picked[2] },
        { position: "What challenges you", card: picked[3] },
        { position: "Where the path leads", card: picked[4] }
      ]);
    }

    function toggleSound() {
      const audio = document.getElementById("forestAudio");
      const button = document.getElementById("soundButton");

      if (!soundOn) {
        audio.play().then(() => {
          soundOn = true;
          button.textContent = "Forest Sounds: On";
        }).catch(() => {
          alert("Your browser blocked autoplay. Tap the button again after interacting with the page.");
        });
      } else {
        audio.pause();
        soundOn = false;
        button.textContent = "Forest Sounds: Off";
      }
    }
  </script>

</body>
</html>
