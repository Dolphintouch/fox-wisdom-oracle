<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Between You and Them Oracle</title>

<style>

body {
  margin: 0;
  font-family: Georgia, serif;
  background: url('forest-bg.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #f5f0e6;
  text-align: center;
}

/* Overlay for soft mystical feel */
.overlay {
  background: rgba(0,0,0,0.55);
  min-height: 100vh;
  padding: 40px 20px;
}

/* Title */
h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

/* Subtitle text */
.subtitle {
  font-size: 18px;
  line-height: 1.6;
  margin-bottom: 30px;
}

/* Card styling */
.card {
  width: 260px;
  border-radius: 15px;
  box-shadow: 0 0 30px rgba(255, 215, 150, 0.35);
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 45px rgba(255, 215, 150, 0.6);
}

/* Hidden section */
.hidden {
  display: none;
}

/* Buttons */
button {
  margin-top: 25px;
  padding: 12px 26px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #e6c07b, #d4af37);
  color: black;
  font-size: 16px;
  cursor: pointer;
}

/* Footer buttons row */
.button-row {
  margin-top: 40px;
}

.button-row a {
  text-decoration: none;
}

.button-row button {
  margin: 5px;
}

/* Tagline */
.tagline {
  margin-top: 25px;
  font-style: italic;
  opacity: 0.8;
}

</style>
</head>

<body>

<div class="overlay">

<h1>Between You and Them</h1>

<p class="subtitle">
Your love is the bridge.<br>
And it has never broken.<br><br>
When you are ready, choose your message.
</p>

<!-- WELCOME CARD -->
<img id="welcomeCard" class="card"
src="between-you-and-them-welcome-page.jpg"
onclick="drawCard()">

<!-- DRAWN CARD -->
<div id="cardSection" class="hidden">
  <img id="cardImage" class="card">
  <br>
  <button onclick="drawCard()">Draw Another Message</button>
</div>

<!-- BUTTON ROW -->
<div class="button-row">

<a href="index.html">
<button>Return Home</button>
</a>

<a href="guidebook.html">
<button>Open Guidebook</button>
</a>

</div>

<p class="tagline">Bring the journey home</p>

</div>

<script>

const cards = [

"carry the light.jpg",
"come back to the heart.jpg",
"come sit with me.jpg",
"i am part of you now.jpg",
"i speak in whispers.jpg",
"i stepped back because i love you.jpg",
"i walk beside you still.jpg",
"i want you to live fully.jpg",
"light a candle for me.jpg",
"the signs were real.jpg",
"the thread still holds.jpg",
"what you build from here.jpg",
"white-light-of-love.jpg",
"you are the light now.jpg",
"you dont have to try so hard.jpg",
"you were never without me.jpg",
"you were there at the end.jpg",
"your laughter still echoes.jpg",
"youre not making it up.jpg",
"youve become the safe place.jpg"

];

function drawCard() {

  const randomCard = cards[Math.floor(Math.random() * cards.length)];

  document.getElementById("welcomeCard").style.display = "none";
  document.getElementById("cardSection").classList.remove("hidden");

  document.getElementById("cardImage").src = randomCard;

}

</script>

</body>
</html>
