<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Between You and Them</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      font-family:Georgia, serif;
      text-align:center;
      background-image:
        linear-gradient(rgba(16,22,16,0.56), rgba(16,22,16,0.78)),
        url("forest-bg.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      padding:16px;
      margin:0;
      color:#f5e9c8;
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,220,140,0.07), transparent 20%),
        radial-gradient(circle at 80% 25%, rgba(255,230,170,0.06), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(255,240,190,0.05), transparent 24%);
      pointer-events:none;
      z-index:0;
    }

    .soft-lights{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .light{
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:rgba(255,234,173,0.9);
      box-shadow:0 0 12px rgba(255,232,180,0.85);
      animation:floatLight linear infinite;
      opacity:0.7;
    }

    .light:nth-child(1){ left:8%; top:85%; animation-duration:12s; animation-delay:0s; }
    .light:nth-child(2){ left:20%; top:75%; animation-duration:14s; animation-delay:2s; }
    .light:nth-child(3){ left:30%; top:88%; animation-duration:13s; animation-delay:4s; }
    .light:nth-child(4){ left:45%; top:78%; animation-duration:16s; animation-delay:1s; }
    .light:nth-child(5){ left:60%; top:85%; animation-duration:14s; animation-delay:3s; }
    .light:nth-child(6){ left:74%; top:79%; animation-duration:15s; animation-delay:5s; }
    .light:nth-child(7){ left:86%; top:86%; animation-duration:12s; animation-delay:6s; }
    .light:nth-child(8){ left:54%; top:70%; animation-duration:17s; animation-delay:2.5s; }

    @keyframes floatLight{
      0%{
        transform:translateY(0) translateX(0) scale(0.8);
        opacity:0;
      }
      20%{ opacity:0.75; }
      70%{ opacity:0.85; }
      100%{
        transform:translateY(-220px) translateX(24px) scale(1.25);
        opacity:0;
      }
    }

    .page-wrap{
      position:relative;
      z-index:2;
      max-width:1100px;
      margin:0 auto;
      padding-bottom:60px;
    }

    .top-credit{
      font-size:1rem;
      color:#f2dcc4;
      margin-top:4px;
      margin-bottom:10px;
      text-shadow:0 1px 3px rgba(0,0,0,0.45);
    }

    h1{
      margin:10px 0 14px;
      font-size:clamp(2.1rem, 6vw, 4.1rem);
      line-height:1.08;
      color:#f2dfcb;
      text-shadow:0 2px 8px rgba(0,0,0,0.35);
    }

    .blessing{
      max-width:800px;
      margin:0 auto 18px;
      color:#f6ead8;
      font-size:clamp(1rem, 2vw, 1.2rem);
      line-height:1.8;
      text-shadow:0 1px 4px rgba(0,0,0,0.38);
    }

    .welcome-card-wrap{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      margin:6px auto 26px;
      min-height:470px;
    }

    .welcome-mist{
      position:absolute;
      width:440px;
      height:440px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,240,205,0.18) 0%, rgba(255,232,185,0.10) 28%, rgba(255,225,165,0.04) 48%, transparent 72%);
      filter:blur(46px);
      animation:mistGlow 7s ease-in-out infinite alternate;
      opacity:0.62;
      z-index:1;
      transition:opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease;
    }

    .welcome-mist.active{
      opacity:0.95;
      transform:scale(1.08);
      filter:blur(54px);
    }

    .welcome-halo{
      position:absolute;
      width:360px;
      height:360px;
      border-radius:50%;
      z-index:1;
      background:radial-gradient(circle, rgba(255,223,160,0.18) 0%, rgba(255,223,160,0.08) 35%, transparent 70%);
      filter:blur(24px);
      animation:haloPulse 6s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes haloPulse{
      0%{
        opacity:0.45;
        transform:scale(0.96);
      }
      50%{
        opacity:0.85;
        transform:scale(1.06);
      }
      100%{
        opacity:0.45;
        transform:scale(0.96);
      }
    }

    .welcome-card{
      position:relative;
      z-index:2;
      width:min(310px, 78vw);
      max-width:310px;
      border-radius:20px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.14),
        0 14px 28px rgba(0,0,0,0.30),
        0 0 30px rgba(255,223,160,0.14);
      cursor:pointer;
      transition:
        transform 0.35s ease,
        box-shadow 0.35s ease,
        filter 0.35s ease;
      filter:brightness(0.99);
      animation:welcomePulse 4.6s ease-in-out infinite;
      user-select:none;
      -webkit-user-drag:none;
    }

    .welcome-card:hover{
      transform:translateY(-5px) scale(1.02);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 18px 36px rgba(0,0,0,0.32),
        0 0 42px rgba(255,226,168,0.24);
      filter:brightness(1.04);
    }

    .welcome-card.shuffling{
      animation:deckShuffle 0.8s ease-in-out 3;
    }

    @keyframes welcomePulse{
      0%{
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.14),
          0 14px 28px rgba(0,0,0,0.30),
          0 0 30px rgba(255,223,160,0.12);
        transform:scale(1);
      }
      50%{
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.16),
          0 18px 34px rgba(0,0,0,0.32),
          0 0 42px rgba(255,226,168,0.22);
        transform:scale(1.015);
      }
      100%{
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.14),
          0 14px 28px rgba(0,0,0,0.30),
          0 0 30px rgba(255,223,160,0.12);
        transform:scale(1);
      }
    }

    @keyframes deckShuffle{
      0%{ transform:translateX(0) rotate(0deg) scale(1); }
      20%{ transform:translateX(-14px) rotate(-4deg) scale(1.01); }
      40%{ transform:translateX(14px) rotate(4deg) scale(1.01); }
      60%{ transform:translateX(-10px) rotate(-3deg) scale(1.01); }
      80%{ transform:translateX(10px) rotate(3deg) scale(1.01); }
      100%{ transform:translateX(0) rotate(0deg) scale(1); }
    }

    .button-row{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin:20px auto 18px;
      max-width:980px;
    }

    button{
      border:none;
      padding:13px 20px;
      border-radius:999px;
      background:linear-gradient(to bottom, #c99278, #b77d64);
      color:#fff4eb;
      font-family:Georgia, serif;
      font-size:1rem;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(255,255,255,0.22);
      transition:transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 14px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.24);
    }

    .shop-invite{
      margin:10px auto 14px;
      font-size:1.25rem;
      color:#f3ead0;
      text-shadow:
        0 0 8px rgba(196, 172, 96, 0.28),
        0 0 16px rgba(196, 172, 96, 0.12),
        0 1px 4px rgba(0,0,0,0.45);
      font-style:italic;
      letter-spacing:0.4px;
      max-width:780px;
    }

    .shop-links{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:14px;
      margin:0 auto 30px;
      max-width:1000px;
    }

    .link-button{
      position:relative;
      display:inline-block;
      padding:14px 24px;
      border-radius:999px;
      text-decoration:none;
      font-family:Georgia, serif;
      font-size:1rem;
      color:#f8f4e6;
      background:
        linear-gradient(
          to bottom,
          #7d7350 0%,
          #6b6241 24%,
          #564e35 50%,
          #4a442d 72%,
          #3f3a27 100%
        );
      border:1px solid rgba(210,190,126,0.42);
      box-shadow:
        0 0 0 1px rgba(225,205,145,0.10),
        0 8px 18px rgba(0,0,0,0.30),
        0 0 10px rgba(200,175,95,0.15),
        0 0 22px rgba(200,175,95,0.10),
        inset 0 1px 0 rgba(255,245,210,0.18),
        inset 0 -2px 6px rgba(18,20,14,0.28);
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        filter 0.22s ease;
      overflow:hidden;
      min-width:220px;
      letter-spacing:0.2px;
    }

    .link-button::before{
      content:"";
      position:absolute;
      top:-60%;
      left:-35%;
      width:38%;
      height:220%;
      background:linear-gradient(
        to right,
        rgba(255,255,255,0),
        rgba(233,219,172,0.28),
        rgba(255,255,255,0)
      );
      transform:rotate(18deg);
      pointer-events:none;
    }

    .link-button::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:999px;
      box-shadow:0 0 14px rgba(191,167,96,0.12);
      opacity:0.9;
      pointer-events:none;
    }

    .link-button:hover{
      transform:translateY(-3px) scale(1.03);
      filter:brightness(1.06);
      box-shadow:
        0 0 0 1px rgba(225,205,145,0.15),
        0 12px 24px rgba(0,0,0,0.34),
        0 0 14px rgba(200,175,95,0.24),
        0 0 28px rgba(200,175,95,0.14),
        inset 0 1px 0 rgba(255,245,210,0.26),
        inset 0 -2px 6px rgba(18,20,14,0.32);
    }

    .link-button:hover::before{
      animation:goldSheen 1.2s ease;
    }

    @keyframes goldSheen{
      0%{
        left:-35%;
        opacity:0;
      }
      20%{
        opacity:1;
      }
      100%{
        left:120%;
        opacity:0;
      }
    }

    .reading-stage{
      position:relative;
      margin-top:4px;
    }

    .card-area{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:440px;
      margin-top:10px;
      margin-bottom:10px;
      overflow:visible;
    }

    .mist{
      position:absolute;
      width:460px;
      height:460px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,240,205,0.19) 0%, rgba(255,232,185,0.10) 28%, rgba(255,225,165,0.04) 48%, transparent 72%);
      filter:blur(42px);
      animation:mistGlow 7s ease-in-out infinite alternate;
      opacity:0.72;
      z-index:1;
    }

    .mist::before,
    .mist::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,245,220,0.12), transparent 68%);
      filter:blur(30px);
    }

    .mist::before{
      transform:translate(-18px, 12px) scale(0.92);
    }

    .mist::after{
      transform:translate(16px, -10px) scale(1.06);
    }

    @keyframes mistGlow{
      0%{
        transform:scale(0.95);
        opacity:0.45;
      }
      100%{
        transform:scale(1.16);
        opacity:0.9;
      }
    }

    .tail-swish{
      position:absolute;
      right:50%;
      margin-right:-170px;
      top:52%;
      transform-origin:left center;
      font-size:52px;
      z-index:4;
      opacity:0;
      pointer-events:none;
    }

    .tail-swish.show{
      animation:tailSwish 1s ease-out forwards;
    }

    @keyframes tailSwish{
      0%{
        opacity:0;
        transform:translateY(0) rotate(0deg) scale(0.7);
      }
      20%{ opacity:0.9; }
      50%{
        opacity:0.95;
        transform:translateY(-2px) rotate(26deg) scale(1);
      }
      100%{
        opacity:0;
        transform:translateY(2px) rotate(-10deg) scale(0.9);
      }
    }

    .footprints{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:5;
      overflow:hidden;
    }

    .paw-print{
      position:absolute;
      font-size:24px;
      opacity:0;
      filter:drop-shadow(0 0 6px rgba(255,215,140,0.55));
      animation:pawWalk 2.8s ease-out forwards;
    }

    @keyframes pawWalk{
      0%{
        opacity:0;
        transform:scale(0.6) rotate(-8deg);
      }
      18%{ opacity:0.9; }
      70%{ opacity:0.75; }
      100%{
        opacity:0;
        transform:scale(1.1) rotate(2deg);
      }
    }

    .oracle-card{
      position:relative;
      z-index:2;
      width:min(280px, 72vw);
      max-width:280px;
      border-radius:18px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.14),
        0 12px 24px rgba(0,0,0,0.28),
        0 0 34px rgba(255,223,160,0.10);
      opacity:0;
      transform:translateY(50px) scale(0.9);
      transition:
        opacity 1s ease,
        transform 1s ease,
        box-shadow 1s ease,
        filter 1s ease;
      filter:brightness(0.96);
    }

    .oracle-card.reveal{
      opacity:1;
      transform:translateY(0) scale(1.03);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 18px 38px rgba(0,0,0,0.30),
        0 0 42px rgba(255,226,168,0.28);
      filter:brightness(1.03);
    }

    .cards-grid{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:28px;
      margin-top:22px;
      padding:0 8px 30px;
    }

    .card-slot{
      width:min(280px, 84vw);
      text-align:center;
      opacity:0;
      transform:translateY(38px);
      animation:slideForest 0.9s ease forwards;
    }

    .card-slot h3{
      margin:0 0 12px;
      font-size:1.08rem;
      color:#f6e5d2;
      text-shadow:0 1px 4px rgba(0,0,0,0.35);
    }

    .card-slot .mist{
      width:300px;
      height:300px;
    }

    .card-slot .card-area{
      min-height:360px;
      margin-top:0;
    }

    @keyframes slideForest{
      from{
        opacity:0;
        transform:translateY(42px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .message-box{
      max-width:900px;
      margin:20px auto 0;
      padding:18px 20px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.10);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      box-shadow:
        0 6px 16px rgba(0,0,0,0.15),
        0 0 28px rgba(255,225,170,0.08);
      display:none;
      white-space:pre-line;
      opacity:0;
      transform:translateY(12px);
      transition:opacity 1.2s ease, transform 1.2s ease, box-shadow 1.2s ease;
    }

    .message-box.show{
      display:block;
    }

    .message-box.fade-in{
      opacity:1;
      transform:translateY(0);
      box-shadow:
        0 8px 20px rgba(0,0,0,0.18),
        0 0 34px rgba(255,226,168,0.16);
    }

    .message-box h3{
      margin:0 0 10px;
      font-size:1.45rem;
      color:#f7e8d6;
    }

    .message-box p{
      margin:0;
      font-size:1.06rem;
      line-height:1.7;
      color:#fff3e8;
    }

    .footer-note{
      margin-top:26px;
      font-size:0.92rem;
      color:#ead8c8;
      opacity:0.95;
    }

    @media (max-width:700px){
      body{
        padding:12px 10px;
      }

      .welcome-card-wrap{
        min-height:400px;
      }

      .card-area{
        min-height:360px;
      }

      button,
      .link-button{
        width:100%;
        max-width:360px;
      }

      .cards-grid{
        gap:22px;
      }

      .message-box p{
        font-size:1rem;
      }

      .tail-swish{
        font-size:42px;
        margin-right:-145px;
      }

      .paw-print{
        font-size:20px;
      }
    }
  </style>
</head>
<body>

  <div class="soft-lights">
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
  </div>

  <div id="footprints" class="footprints"></div>

  <div class="page-wrap">
    <div class="top-credit">@Dolphintouch (Michelle Billiau-Morseu)</div>
    <h1>Between You and Them</h1>

    <div class="blessing">
      Your love is the bridge.<br>
      And it has never broken.<br>
      When you are ready, choose your message.
    </div>

    <div class="welcome-card-wrap">
      <div id="welcomeMist" class="welcome-mist"></div>
      <div class="welcome-halo"></div>
      <img
        id="mainDeckCard"
        class="welcome-card"
        src="between-you-and-them-welcome-page.jpg"
        alt="Tap to draw your message"
        onclick="drawDailyCardFromCard()"
      >
    </div>

    <div class="button-row">
      <button onclick="startReading('daily')">Daily Message</button>
      <button onclick="startReading('hidden')">Three Card Spread</button>
      <button onclick="startReading('cross')">Sacred Bridge Spread</button>
      <button onclick="window.location.href='index.html'">Return Home</button>
      <button onclick="toggleSound()" id="soundButton">Forest Sounds: Off</button>
    </div>

    <div class="shop-invite">Bring the journey home</div>

    <div class="shop-links">
      <a class="link-button" href="PASTE-YOUR-AMAZON-LINK-HERE" target="_blank">
        Buy the Book on Amazon
      </a>
      <a class="link-button" href="PASTE-YOUR-CANVA-BOOK-LINK-HERE" target="_blank">
        Open the Book Experience
      </a>
    </div>

    <div class="reading-stage">
      <div id="readingArea">
        <div class="card-area">
          <div class="mist"></div>
          <div id="tailSwish" class="tail-swish">✨</div>
        </div>
      </div>

      <div id="messageBox" class="message-box">
        <h3 id="messageTitle">Your Message</h3>
        <p id="messageText"></p>
      </div>
    </div>

    <div class="footer-note">
      Between You and Them © Dolphintouch
    </div>
  </div>

  <audio id="forestAudio" loop>
    <source src="forest.mp3.mp3" type="audio/mpeg">
  </audio>

  <script>
    const cards = [
      {
        title: "The Signs Were Real",
        image: "the signs were real.jpg",
        message: "That song, that bird, that feather—you weren’t imagining me. I’ve been speaking in whispers all along. Trust it."
      },
      {
        title: "I Stepped Back Because I Love You",
        image: "i stepped back because i love you.jpg",
        message: "I saw your pain and held my breath. I didn’t want to add to your sorrow. I waited—for your heart to soften, for the storm to still. I am still here."
      },
      {
        title: "You Were There at the End",
        image: "you were there at the end.jpg",
        message: "Even if you weren’t in the room. Even if you were miles away. Your love reached me. I knew. I felt you. And I left with your name in my heart."
      },
      {
        title: "I Speak in Whispers",
        image: "i speak in whispers.jpg",
        message: "Not all signs are loud. Sometimes I come in stillness—in a sigh, a breeze, the hush before sleep. I speak softly because I am near."
      },
      {
        title: "You’re Not Making It Up",
        image: "youre not making it up.jpg",
        message: "That sudden thought, that flicker of memory, that feeling in your chest—it’s me. Don’t doubt what you felt. Don’t talk yourself out of knowing. You were right."
      },
      {
        title: "I Want You to Live Fully",
        image: "i want you to live fully.jpg",
        message: "Your sorrow honors me, but your joy frees me. Please don’t let your love for me become a cage. I am with you—and I want to see you live."
      },
      {
        title: "You’ve Become the Safe Place",
        image: "youve become the safe place.jpg",
        message: "Once, you turned to me for strength. Now I turn to you. Your heart has become a shelter—for us both. I rest in your peace, and you rise with my love."
      },
      {
        title: "Come Back to the Heart",
        image: "come back to the heart.jpg",
        message: "When the doubt grows loud, when the world pulls you away—return to where we always meet: your heart. That is where I wait for you."
      }
    ];

    let soundOn = false;
    let isDrawing = false;

    function getRandomCard(excludeTitles = []) {
      const available = cards.filter(card => !excludeTitles.includes(card.title));
      return available[Math.floor(Math.random() * available.length)];
    }

    function getDailyCard() {
      const today = new Date().toDateString();
      const savedDate = localStorage.getItem("betweenDailyDate");
      let dailyCard;

      if (savedDate === today) {
        const savedTitle = localStorage.getItem("betweenDailyCardTitle");
        dailyCard = cards.find(card => card.title === savedTitle) || getRandomCard();
      } else {
        dailyCard = getRandomCard();
        localStorage.setItem("betweenDailyDate", today);
        localStorage.setItem("betweenDailyCardTitle", dailyCard.title);
      }

      return dailyCard;
    }

    function activateWelcomeMagic() {
      const welcomeCard = document.getElementById("mainDeckCard");
      const welcomeMist = document.getElementById("welcomeMist");

      if (welcomeMist) {
        welcomeMist.classList.add("active");
        setTimeout(() => welcomeMist.classList.remove("active"), 1200);
      }

      if (welcomeCard) {
        welcomeCard.classList.add("shuffling");
        setTimeout(() => welcomeCard.classList.remove("shuffling"), 2400);
      }
    }

    function revealMessagePanel() {
      const messageBox = document.getElementById("messageBox");
      messageBox.classList.remove("fade-in");
      setTimeout(() => {
        messageBox.classList.add("fade-in");
      }, 80);
    }

    function showTailSwish() {
      const tail = document.getElementById("tailSwish");
      if (!tail) return;
      tail.classList.remove("show");
      void tail.offsetWidth;
      tail.classList.add("show");
    }

    function showFootprints() {
      const container = document.getElementById("footprints");
      if (!container) return;

      container.innerHTML = "";

      const prints = [
        { left: "18%", top: "74%", delay: 0 },
        { left: "26%", top: "69%", delay: 120 },
        { left: "34%", top: "63%", delay: 240 },
        { left: "42%", top: "58%", delay: 360 },
        { left: "50%", top: "53%", delay: 480 },
        { left: "58%", top: "48%", delay: 600 },
        { left: "66%", top: "43%", delay: 720 },
        { left: "74%", top: "38%", delay: 840 }
      ];

      prints.forEach((print, index) => {
        const paw = document.createElement("div");
        paw.className = "paw-print";
        paw.textContent = "✨";
        paw.style.left = print.left;
        paw.style.top = print.top;
        paw.style.animationDelay = `${print.delay}ms`;
        paw.style.transform = index % 2 === 0 ? "rotate(-8deg)" : "rotate(8deg)";
        container.appendChild(paw);
      });

      setTimeout(() => {
        container.innerHTML = "";
      }, 3200);
    }

    function revealCardImage(imgElement, imageSrc, altText, showMessageAfter = false) {
      imgElement.classList.remove("reveal");
      imgElement.src = "bridge-card-back.jpg";
      imgElement.alt = "Between You and Them card back";

      setTimeout(() => {
        const tempImg = new Image();

        tempImg.onload = () => {
          imgElement.src = imageSrc;
          imgElement.alt = altText;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              imgElement.classList.add("reveal");
              showTailSwish();
              showFootprints();

              if (showMessageAfter) {
                setTimeout(() => {
                  revealMessagePanel();
                }, 450);
              }
            });
          });
        };

        tempImg.onerror = () => {
          imgElement.src = "bridge-card-back.jpg";
          imgElement.alt = "Image not found";
          imgElement.classList.add("reveal");
          showTailSwish();
          showFootprints();

          if (showMessageAfter) {
            setTimeout(() => {
              revealMessagePanel();
            }, 450);
          }
        };

        tempImg.src = imageSrc;
      }, 220);
    }

    function buildSingleCardArea() {
      return `
        <div class="card-area">
          <div class="mist"></div>
          <div id="tailSwish" class="tail-swish">✨</div>
          <img id="mainCard" class="oracle-card" src="bridge-card-back.jpg" alt="Between You and Them card back">
        </div>
      `;
    }

    function showSingleCard(card, headingText) {
      const readingArea = document.getElementById("readingArea");
      readingArea.innerHTML = buildSingleCardArea();

      const messageBox = document.getElementById("messageBox");
      const messageTitle = document.getElementById("messageTitle");
      const messageText = document.getElementById("messageText");

      messageBox.classList.remove("fade-in");
      messageTitle.textContent = headingText + ": " + card.title;
      messageText.textContent = card.message;
      messageBox.classList.add("show");

      const img = document.getElementById("mainCard");
      setTimeout(() => {
        revealCardImage(img, card.image, card.title, true);
      }, 250);
    }

    function showMultiCardSpread(spreadTitle, spreadCards) {
      const readingArea = document.getElementById("readingArea");

      let html = `<div class="cards-grid">`;

      spreadCards.forEach((item, index) => {
        html += `
          <div class="card-slot" style="animation-delay:${index * 0.16}s;">
            <h3>${item.position}</h3>
            <div class="card-area">
              <div class="mist"></div>
              <img id="spreadCard${index}" class="oracle-card" src="bridge-card-back.jpg" alt="Between You and Them card back">
            </div>
          </div>
        `;
      });

      html += `</div><div id="tailSwish" class="tail-swish">✨</div>`;
      readingArea.innerHTML = html;

      const messageBox = document.getElementById("messageBox");
      const messageTitle = document.getElementById("messageTitle");
      const messageText = document.getElementById("messageText");

      messageBox.classList.remove("fade-in");
      messageTitle.textContent = spreadTitle;

      let fullMessage = "";
      spreadCards.forEach(item => {
        fullMessage += item.position + " — " + item.card.title + ": " + item.card.message + "\n\n";
      });

      messageText.innerText = fullMessage.trim();
      messageBox.classList.add("show");

      spreadCards.forEach((item, index) => {
        const img = document.getElementById("spreadCard" + index);
        setTimeout(() => {
          revealCardImage(img, item.card.image, item.card.title, false);
        }, 250 + (index * 340));
      });

      setTimeout(() => {
        revealMessagePanel();
      }, 650 + (spreadCards.length * 340));
    }

    function drawDailyCard() {
      const dailyCard = getDailyCard();
      showSingleCard(dailyCard, "Daily Message");
    }

    function drawHiddenPath() {
      const first = getRandomCard();
      const second = getRandomCard([first.title]);
      const third = getRandomCard([first.title, second.title]);

      showMultiCardSpread("Three Card Spread", [
        { position: "What your heart needs", card: first },
        { position: "What your loved one wants you to know", card: second },
        { position: "What is healing now", card: third }
      ]);
    }

    function drawSacredBridgeSpread() {
      const picked = [];
      while (picked.length < 5) {
        const card = getRandomCard(picked.map(c => c.title));
        picked.push(card);
      }

      showMultiCardSpread("Sacred Bridge Spread", [
        { position: "Where you are now", card: picked[0] },
        { position: "What your grief is teaching", card: picked[1] },
        { position: "How love is reaching you", card: picked[2] },
        { position: "What you can release", card: picked[3] },
        { position: "What stays with you", card: picked[4] }
      ]);
    }

    function drawDailyCardFromCard() {
      if (isDrawing) return;
      isDrawing = true;

      const dailyCard = getDailyCard();
      activateWelcomeMagic();

      setTimeout(() => {
        showSingleCard(dailyCard, "Daily Message");
        setTimeout(() => {
          isDrawing = false;
        }, 1200);
      }, 2400);
    }

    function startReading(type) {
      if (isDrawing) return;
      isDrawing = true;

      const welcomeMist = document.getElementById("welcomeMist");
      if (welcomeMist) {
        welcomeMist.classList.add("active");
        setTimeout(() => welcomeMist.classList.remove("active"), 1000);
      }

      setTimeout(() => {
        if (type === "daily") {
          drawDailyCard();
        } else if (type === "hidden") {
          drawHiddenPath();
        } else if (type === "cross") {
          drawSacredBridgeSpread();
        }

        setTimeout(() => {
          isDrawing = false;
        }, 1200);
      }, 350);
    }

    function toggleSound() {
      const audio = document.getElementById("forestAudio");
      const button = document.getElementById("soundButton");

      if (!soundOn) {
        audio.play().then(() => {
          soundOn = true;
          button.textContent = "Forest Sounds: On";
        }).catch(() => {
          alert("Your browser blocked autoplay. Tap the button again after interacting with the page.");
        });
      } else {
        audio.pause();
        soundOn = false;
        button.textContent = "Forest Sounds: Off";
      }
    }
  </script>

</body>
</html>
