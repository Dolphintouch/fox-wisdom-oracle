<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Between You and Them Oracle</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: url('forest-bg.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
  text-align: center;
}

.container {
  padding: 40px 20px;
}

.card {
  width: 260px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(255,255,255,0.3);
  cursor: pointer;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
}

.hidden {
  display: none;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, gold, #d4af37);
  color: black;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Between You and Them</h1>
<p>Pause. Breathe. Ask… and receive.</p>

<!-- WELCOME CARD -->
<img id="welcomeCard" class="card"
src="between-you-and-them-welcome-page.jpg"
onclick="drawCard()">

<!-- DRAWN CARD -->
<div id="cardSection" class="hidden">
  <img id="cardImage" class="card">
  <br>
  <button onclick="drawCard()">Draw Again</button>
</div>

</div>

<script>

const cards = [

"carry the light.jpg",
"come back to the heart.jpg",
"come sit with me.jpg",
"i am part of you now.jpg",
"i speak in whispers.jpg",
"i stepped back because i love you.jpg",
"i walk beside you still.jpg",
"i want you to live fully.jpg",
"light a candle for me.jpg",
"the signs were real.jpg",
"the thread still holds.jpg",
"what you build from here.jpg",
"white-light-of-love.jpg",
"you are the light now.jpg",
"you dont have to try so hard.jpg",
"you were never without me.jpg",
"you were there at the end.jpg",
"your laughter still echoes.jpg",
"youre not making it up.jpg",
"youve become the safe place.jpg"

];

function drawCard() {

  const randomCard = cards[Math.floor(Math.random() * cards.length)];

  document.getElementById("welcomeCard").style.display = "none";
  document.getElementById("cardSection").classList.remove("hidden");

  document.getElementById("cardImage").src = randomCard;

}

</script>

</body>
</html>
